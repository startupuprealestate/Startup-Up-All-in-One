<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // ใช้ Config เดียวกับแอปหลักของพี่บิวเลยนะคะ
    const firebaseConfig = { 
        apiKey: "AIzaSyD3G2S3SBjE08Q5m-B8HQjAgV5Uj0mSgW0", 
        authDomain: "startupuprealestate-e4b0a.firebaseapp.com", 
        projectId: "startupuprealestate-e4b0a", 
        messagingSenderId: "966000130004", 
        appId: "1:966000130004:web:5318ddaf6d2225b0cc8841" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // ⛔ ไม่ได้ล็อกอิน เตะกลับหน้าแรก
            window.location.href = '/';
        } else {
            // ✅ ล็อกอินแล้ว เช็กต่อว่าเป็นพนักงานที่ได้รับอนุมัติหรือยัง
            const userRef = doc(db, "users", user.email.toLowerCase());
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists() || docSnap.data().status !== 'approved') {
                alert("คุณยังไม่ได้รับสิทธิ์เข้าใช้งานระบบสแกนหน้าค่ะ");
                window.location.href = '/';
            }
            // ถ้าผ่านหมด ก็นิ่งไว้ ปล่อยให้ระบบสแกนหน้าทำงานต่อค่ะ
        }
    });
</script>

<button onclick="window.location.href='/'" style="position:fixed; top:10px; left:10px; z-index:999; background:#0b3d1b; color:white; padding:8px 15px; border-radius:10px; border:none; font-weight:bold;">

</button>
    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: #f9fafb;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
    }

    .page-wrap {
      width: 100%; max-width: 560px;
      animation: fadeIn 0.5s ease;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 20px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #4b5563; text-decoration: none; font-size: 0.9em; font-weight: 600;
      padding: 8px 16px; border-radius: 50px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
    }
    .back-btn:hover { color: #0b3d1b; background: #f3f4f6; border-color: #d1d5db; }

    h2 { font-size: 1.2em; font-weight: 700; color: #0b3d1b; }
    .spacer { width: 80px; }

    /* Status Area */
    .status-area {
      width: 100%; text-align: center; margin-bottom: 16px;
      background: #ffffff;
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
      border: 1px solid #f3f4f6;
    }
    #main-status {
      font-size: 0.95em; color: #4b5563; font-weight: 600;
      min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #gps-status {
      font-size: 0.85em; color: #6b7280; margin-top: 8px;
      min-height: 18px;
    }

    /* GPS Alert */
    .gps-alert {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 16px; padding: 14px;
      width: 100%; margin-bottom: 16px;
      font-size: 0.9em; font-weight: 600;
      text-align: center;
      box-shadow: 0 4px 15px -2px rgba(0,0,0,0.03);
    }

    /* Scanner Container */
    .video-container {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #000000;
      border: 6px solid #ffffff;
      box-shadow: 0 4px 25px -2px rgba(0,0,0,0.1);
      min-height: 280px;
    }

    video {
      width: 100%; height: auto; display: block;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    video.active { opacity: 1; }

    /* Scanner frame corners */
    .scanner-frame {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 30px; height: 30px;
      border-color: #166534; /* Brand Light */
      border-style: solid;
      opacity: 0.9;
    }
    .corner-tl { top: 16px;    left: 16px;   border-width: 4px 0 0 4px; border-radius: 6px 0 0 0; }
    .corner-tr { top: 16px;    right: 16px;  border-width: 4px 4px 0 0; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: 16px; left: 16px;   border-width: 0 0 4px 4px; border-radius: 0 0 0 6px; }
    .corner-br { bottom: 16px; right: 16px;  border-width: 0 4px 4px 0; border-radius: 0 0 6px 0; }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute; left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #166534, transparent);
      box-shadow: 0 0 12px rgba(22, 101, 52, 0.8);
      z-index: 6;
      animation: scanMove 2s ease-in-out infinite;
    }
    .scan-line.active { display: block; }

    /* Overlay status badge */
    #overlay-status {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      color: #1f2937;
      padding: 6px 20px; border-radius: 30px;
      z-index: 10; white-space: nowrap; font-size: 0.85em; font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Start Button */
    #btnStart {
      display: none;
      background: #0b3d1b;
      color: white; border: none; border-radius: 50px;
      padding: 16px 44px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Prompt', sans-serif;
      box-shadow: 0 4px 15px rgba(11, 61, 27, 0.2);
      margin: 20px auto 0;
      transition: all 0.3s ease;
      animation: btnPulse 2s ease-in-out infinite;
    }
    #btnStart:hover {
      background: #166534;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(22, 101, 52, 0.3);
      animation: none;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: #ffffff;
      padding: 32px 28px;
      border-radius: 24px;
      width: 90%; max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; align-items: center;
      animation: modalSlideUp 0.35s ease;
    }
    .modal-avatar {
      font-size: 56px;
      background: #ebfbf1;
      border: 3px solid #bbf7d0;
      border-radius: 50%;
      width: 86px; height: 86px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .modal-title { font-size: 0.85em; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .user-name {
      font-size: 24px; color: #1f2937; font-weight: 700;
      margin-bottom: 14px;
    }
    .time-badge {
      background: #dcfce7;
      color: #065f46;
      padding: 8px 22px; border-radius: 30px;
      font-size: 15px; font-weight: 700;
      margin-bottom: 8px;
    }
    .score-text { color: #6b7280; font-size: 13px; margin-bottom: 24px; }

    .btn {
      border: none; border-radius: 16px; cursor: pointer; width: 100%;
      margin: 6px 0; font-family: 'Prompt', sans-serif;
      transition: all 0.25s ease;
    }
    .btn-confirm {
      background: #0b3d1b;
      color: white;
      padding: 16px; font-size: 16px; font-weight: 700;
      box-shadow: 0 4px 15px rgba(11, 61, 27, 0.2);
      margin-bottom: 10px;
    }
    .btn-confirm:hover:not(:disabled) {
      background: #166534;
      box-shadow: 0 6px 20px rgba(22, 101, 52, 0.3);
      transform: translateY(-2px);
    }
    .btn-confirm:disabled { background: #e5e7eb; color: #9ca3af; box-shadow: none; }
    
    .btn-cancel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      color: #4b5563;
      padding: 12px; font-size: 14px; font-weight: 600;
    }
    .btn-cancel:hover { background: #f9fafb; color: #ef4444; border-color: #fca5a5; }

    /* Note Input & Close Btn */
    .close-modal-btn {
      position: absolute; top: 16px; right: 16px;
      background: #f3f4f6; border: none; color: #6b7280;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 16px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .close-modal-btn:hover { background: #e5e7eb; color: #1f2937; }

    .note-input {
      width: 100%; padding: 12px 16px;
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px;
      color: #1f2937; font-size: 14px; font-family: 'Prompt', sans-serif;
      outline: none; transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    .note-input:focus {
      border-color: #0b3d1b; background: #ffffff;
      box-shadow: 0 0 0 3px rgba(11, 61, 27, 0.1);
    }

    /* Animations */
    @keyframes fadeIn      { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes btnPulse    { 0%,100% { box-shadow: 0 4px 15px rgba(11, 61, 27, 0.2); } 50% { box-shadow: 0 4px 25px rgba(11, 61, 27, 0.4); } }
    @keyframes scanMove    { 0% { top: 12%; } 50% { top: 82%; } 100% { top: 12%; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>
    <h2>📷 สแกนเข้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="status-area">
    <div id="main-status">⏳ กำลังเตรียมระบบ...</div>
    <div id="gps-status"></div>
  </div>

  <div id="gps-alert-box" class="gps-alert">
    ⚠️ คุณอยู่นอกพื้นที่ที่กำหนด!<br>กรุณาเข้าใกล้จุดเช็คอินแล้วรีเฟรชหน้าจอ
  </div>

  <button id="btnStart" onclick="startCamera()">📷 แตะเพื่อเริ่มสแกน</button>

  <div class="video-container">
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div id="overlay-status">รอโหลด...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>

</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-content" style="position: relative;">
    <button class="close-modal-btn" onclick="cancelAttendance()">✕</button>
    <div class="modal-avatar">🙋</div>
    <p class="modal-title">ตรวจพบบุคคล</p>
    <div class="user-name" id="modalName">...</div>
    <div id="modalTime" class="time-badge">00:00</div>
    <div id="modalScore" class="score-text"></div>
    
    <input type="text" id="noteInput" class="note-input" placeholder="ใส่หมายเหตุที่นี่ (ถ้ามี)...">

    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน (สแกนใหม่)</button>
  </div>
</div>

<script>
  // 💡 1. เพิ่มตัวดักจับ URL ไว้บนสุดเลย
  const urlParams = new URLSearchParams(window.location.search);
  const checkInType = urlParams.get('type') || 'work';

  const API_URL        = localStorage.getItem('gasApiUrl') || GAS_API_URL;
  const video          = document.getElementById('video');
  const mainStatus     = document.getElementById('main-status');
  const overlayStatus  = document.getElementById('overlay-status');
  const confirmModal   = document.getElementById('confirmModal');
  const gpsStatus      = document.getElementById('gps-status');
  const gpsAlertBox    = document.getElementById('gps-alert-box');
  const btnStart       = document.getElementById('btnStart');

  const MATCH_THRESHOLD = 0.45;

  let knownFaces   = [];
  let scanInterval = null;
  let currentMatch = null;
  let currentLat   = null;
  let currentLng   = null;

  // 💡 2. เปลี่ยนหัวเว็บตามประเภทที่กดมา
  window.addEventListener('DOMContentLoaded', () => {
      if (checkInType === 'site') {
          document.querySelector('h2').innerText = '📍 เช็กอินหน้างาน';
          document.title = 'เช็กอินหน้างาน';
      }
  });

  if (!API_URL) {
    showError('ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#d97706">ไปตั้งค่า</a>');
  } else {
    window.addEventListener('load', init);
  }

  async function init() {
    try {
      mainStatus.innerText = '1/4 ตรวจสอบ GPS...';
      await checkGPS();
    } catch (e) {
      showError(e.message);
    }
  }

  function checkGPS() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Browser ไม่รองรับ GPS'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;

          try {
            const config = await fetch(API_URL + '?action=getConfig').then(r => r.json());

            if (!config.lat || !config.lng || config.radius == 0) {
              gpsStatus.innerHTML = '<span style="color:#059669; font-weight:600;">📍 GPS: ไม่จำกัดพื้นที่</span>';
              resolve();
              initFaceSystem();
              return;
            }

            const dist = haversineKm(currentLat, currentLng, config.lat, config.lng);

            if (dist <= config.radius) {
              gpsStatus.innerHTML = '<span style="color:#059669; font-weight:600;">📍 GPS: OK (ห่างเป้าหมาย ' + dist.toFixed(3) + ' km)</span>';
              resolve();
              initFaceSystem();
            } else {
              gpsStatus.innerHTML = '<span style="color:#dc2626; font-weight:600;">📍 GPS: ห่างเกินไป (' + dist.toFixed(3) + ' km / กำหนด ' + config.radius + ' km)</span>';
              gpsAlertBox.style.display = 'block';
              mainStatus.innerText = '⛔ ไม่อนุญาตให้สแกน';
              overlayStatus.innerText = 'Out of Range';
            }
          } catch (e) {
            reject(new Error('เชื่อมต่อ API ไม่ได้: ' + e.message));
          }
        },
        () => reject(new Error('กรุณาเปิด GPS (Location Service)'))
      );
    });
  }

  async function initFaceSystem() {
    mainStatus.innerText = '2/4 โหลด AI Model...';
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      loadFaceDatabase();
    } catch (e) {
      showError('โหลด AI Model ล้มเหลว: ' + e.message);
    }
  }

  async function loadFaceDatabase() {
    mainStatus.innerText = '3/4 โหลดฐานข้อมูลพนักงาน...';
    try {
      const data = await fetch(API_URL + '?action=getKnownFaces').then(r => r.json());
      if (!data || data.length === 0) return showError('ไม่พบข้อมูลพนักงาน กรุณาลงทะเบียนก่อน');

      knownFaces = data.map(u => ({
        name: u.label,
        descriptor: new Float32Array(u.descriptor)
      }));

      mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
      mainStatus.style.color  = '#059669';
      btnStart.style.display  = 'inline-block';
    } catch (e) {
      showError('โหลดฐานข้อมูลล้มเหลว: ' + e.message);
    }
  }

  function startCamera() {
    btnStart.style.display = 'none';
    mainStatus.innerText   = 'กำลังเปิดกล้อง...';
    mainStatus.style.color = '#6b7280';

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        mainStatus.innerText   = '✅ กำลังสแกน...';
        mainStatus.style.color = '#059669';
        document.getElementById('scanLine').classList.add('active');
        startScanLoop();
      })
      .catch(err => {
        showError('เปิดกล้องไม่ได้: ' + err.message);
        btnStart.style.display = 'inline-block';
      });
  }

  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    overlayStatus.innerText      = 'มองกล้องเพื่อสแกน';
    overlayStatus.style.background = 'rgba(255,255,255,0.9)';
    overlayStatus.style.color = '#1f2937';

    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;

      const detection = await faceapi
        .detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (detection) {
        const best = findBestMatch(detection.descriptor);
        if (best.distance < MATCH_THRESHOLD) {
          clearInterval(scanInterval);
          document.getElementById('scanLine').classList.remove('active');
          showModal(best);
        } else {
          overlayStatus.innerText            = 'ไม่รู้จัก (' + best.distance.toFixed(2) + ')';
          overlayStatus.style.background     = '#fef2f2';
          overlayStatus.style.color          = '#b91c1c';
          overlayStatus.style.border         = '1px solid #fca5a5';
        }
      }
    }, 500);
  }

  function findBestMatch(queryDesc) {
    let best = { name: 'unknown', distance: 1.0 };
    knownFaces.forEach(u => {
      const d = faceapi.euclideanDistance(queryDesc, u.descriptor);
      if (d < best.distance) best = { name: u.name, distance: d };
    });
    return best;
  }

  function showModal(match) {
    currentMatch = match.name;
    document.getElementById('modalName').innerText  = match.name;
    document.getElementById('noteInput').value = '';

    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modalTime').innerText  = 'เวลาที่สแกน: ' + timeStr + ' น.';

    const pct = ((1 - match.distance) * 100).toFixed(1);
    document.getElementById('modalScore').innerText = 'ความเหมือน: ' + pct + '%';

    confirmModal.style.display = 'flex';
    mainStatus.innerText = 'กรุณายืนยัน...';
    mainStatus.style.color = '#1f2937';
  }

  // 💡 3. แก้ไขฟังก์ชันตอนกดยืนยัน ให้แนบชื่อ Sheet ส่งไปด้วย
  async function confirmAttendance() {
    const btn = document.getElementById('btnConfirm');
    const note = document.getElementById('noteInput').value.trim();
    btn.disabled   = true;
    btn.innerText  = 'กำลังบันทึก...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ 
            action: 'logAttendance', 
            name: currentMatch, 
            lat: currentLat, 
            lng: currentLng, 
            note: note,
            sheetTarget: checkInType === 'site' ? "Site_CheckIn" : "Attendance" 
        })
      });
      const data = await res.json();
      alert('✅ ' + (data.message || 'บันทึกเวลาสำเร็จ'));
      window.location.href = 'index.html';
    } catch (e) {
      alert('❌ บันทึกล้มเหลว: ' + e.message);
      btn.disabled  = false;
      btn.innerText = '✅ ยืนยันเวลา';
    }
  }

  function cancelAttendance() {
    confirmModal.style.display = 'none';
    currentMatch = null;
    if (scanInterval) clearInterval(scanInterval);

    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    video.classList.remove('active');
    document.getElementById('scanLine').classList.remove('active');

    mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
    mainStatus.style.color  = '#059669';
    overlayStatus.innerText = 'รอโหลด...';
    overlayStatus.style.background = 'rgba(255,255,255,0.9)';
    overlayStatus.style.color = '#1f2937';
    overlayStatus.style.border = 'none';
    btnStart.style.display  = 'inline-block';
  }

  function showError(msg) {
    mainStatus.innerHTML = '<span style="color:#dc2626; font-weight:bold;">❌ ' + msg + '</span>';
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R    = 6371;
    const dLat = deg2rad(lat2 - lat1);
    const dLon = deg2rad(lon2 - lon1);
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function deg2rad(deg) { return deg * Math.PI / 180; }
</script>
