<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบบันทึกเวลาเข้างาน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: #f9fafb; 
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px 60px; /* เพิ่ม padding บน เผื่อที่ให้ปุ่มย้อนกลับ */
      position: relative;
      overflow-x: hidden;
      /* ป้องกันการเด้งของหน้าจอเวลาไถสุดขอบบนมือถือ */
      overscroll-behavior-y: none; 
    }

    /* 🚀 สไตล์ปุ่มกลับหน้าหลักลอยตัว */
    .btn-back-home {
      position: fixed; 
      top: 20px; 
      left: 20px; 
      z-index: 9999; 
      background-color: #ffffff; 
      color: #0b3d1b; 
      border: 1px solid #e5e7eb;
      padding: 10px 16px; 
      border-radius: 12px; 
      font-family: 'Prompt', sans-serif; 
      font-size: 14px; 
      font-weight: 700; 
      cursor: pointer; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      transition: all 0.2s ease;
    }
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease;
    }
    .logo-icon {
      font-size: 56px;
      display: flex; /* ใช้ flex เพื่อให้จัดตรงกลางง่ายขึ้น */
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.05);
      line-height: 1;
    }
    h1 {
      font-size: 1.6em;
      font-weight: 700;
      color: #0b3d1b; 
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.9em;
      color: #6b7280;
      font-weight: 400;
    }

    /* Warning */
    .api-warning {
      display: none;
      background: #fef3c7;
      border: 1px solid #fde68a;
      color: #b45309;
      border-radius: 12px;
      padding: 12px 18px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 24px;
      font-size: 0.9em;
      font-weight: 500;
      animation: fadeIn 0.5s ease;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
    }
    .api-warning a { color: #d97706; font-weight: 700; text-decoration: underline; }

    /* Menu Cards */
    .menu-cards {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-menu {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      text-decoration: none;
      border-radius: 20px; 
      background: #ffffff;
      border: 1px solid #f3f4f6;
      color: #1f2937;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
      animation: fadeInUp 0.5s ease both;
    }
    .btn-menu:nth-child(1) { animation-delay: 0.1s; }
    .btn-menu:nth-child(2) { animation-delay: 0.2s; }
    .btn-menu:nth-child(3) { animation-delay: 0.3s; }

    .btn-menu:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px -5px rgba(11, 61, 27, 0.08);
      border-color: #166534;
    }

    /* 💡 2. จัดอิโมจิให้อยู่ตรงกลางเป๊ะๆ */
    .card-icon {
      width: 54px; height: 54px;
      border-radius: 16px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      background: #ebfbf1;
      color: #065f46;
      border: 1px solid #bbf7d0;
      line-height: 1; /* บังคับความสูงบรรทัดให้อิโมจิไม่เบี้ยว */
      padding-bottom: 2px; /* ดันให้อิโมจิขยับขึ้นมาตรงกลางสายตานิดนึง */
    }

    .card-text { flex: 1; text-align: left; }
    .card-title { font-size: 1.05em; font-weight: 700; color: #1f2937; margin-bottom: 3px; }
    .card-desc  { font-size: 0.85em; color: #6b7280; font-weight: 400; }

    .card-arrow {
      font-size: 20px; color: #9ca3af;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .btn-menu:hover .card-arrow { transform: translateX(4px); color: #0b3d1b; }

    /* Animations */
    @keyframes fadeIn    { from { opacity: 0; }                      to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp  { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <button 
      onclick="sessionStorage.setItem('skipSplash', 'true'); window.location.replace('/');" 
      class="btn-back-home"
  >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      กลับเมนูระบบหลัก
  </button>

  <div class="header">
    <div class="logo-icon">🏢</div>
    <h1>ระบบบันทึกเวลาเข้างาน</h1>
    <p class="subtitle">Face Recognition &amp; GPS Attendance</p>
  </div>

  <div id="apiWarning" class="api-warning">
    ⚠️ ยังไม่ได้ตั้งค่า API —
    <a href="config.html">ไปตั้งค่าก่อน</a>
  </div>

  <div class="menu-cards">
    <a href="register.html" class="btn-menu btn-register">
      <div class="card-icon">👤</div>
      <div class="card-text">
        <div class="card-title">ลงทะเบียนพนักงาน</div>
        <div class="card-desc">บันทึกข้อมูลใบหน้าใหม่</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="scan.html" class="btn-menu btn-scan">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">สแกนเข้างาน</div>
        <div class="card-desc">ยืนยันตัวตนด้วยใบหน้า + GPS</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="config.html" id="admin-config-card" class="btn-menu btn-config" style="display: none;">
  <div class="card-icon">⚙️</div>
  <div class="card-text">
    <div class="card-title">ตั้งค่าระบบ</div>
    <div class="card-desc">จัดการ GPS และ API (Admin)</div>
  </div>
  <span class="card-arrow">›</span>
</a>

  <script>
    if (!localStorage.getItem('gasApiUrl') && typeof GAS_API_URL === 'undefined') {
      document.getElementById('apiWarning').style.display = 'block';
    }
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    // ใช้ Config เดียวกับแอปหลัก
    const firebaseConfig = { 
        apiKey: "AIzaSyD3G2S3SBjE08Q5m-B8HQjAgV5Uj0mSgW0", 
        authDomain: "startupuprealestate-e4b0a.firebaseapp.com", 
        projectId: "startupuprealestate-e4b0a", 
        messagingSenderId: "966000130004", 
        appId: "1:966000130004:web:5318ddaf6d2225b0cc8841" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user && user.email.toLowerCase() === 'startup.up.real.estate@gmail.com') {
            // ✅ เป็น Admin ให้โชว์เมนูตั้งค่า
            document.getElementById('admin-config-card').style.display = 'flex';
        } else {
            // ❌ ไม่ใช่ Admin ให้ซ่อนไว้เหมือนเดิม
            document.getElementById('admin-config-card').style.display = 'none';
        }
    });
</script>
</body>
</html>
