<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกเวลาเข้างาน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: #f9fafb; /* Startup Up Background */
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }
    <button 
    onclick="window.location.href='/'" 
    style="position: fixed; top: 15px; left: 15px; z-index: 9999; background-color: #0b3d1b; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 6px; transition: all 0.2s;"
    onmouseover="this.style.transform='scale(1.05)'"
    onmouseout="this.style.transform='scale(1)'"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    กลับหน้าหลัก All-in-One
</button>
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease;
    }
    .logo-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 1.6em;
      font-weight: 700;
      color: #0b3d1b; /* Brand Primary */
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.9em;
      color: #6b7280;
      font-weight: 400;
    }

    /* Warning */
    .api-warning {
      display: none;
      background: #fef3c7;
      border: 1px solid #fde68a;
      color: #b45309;
      border-radius: 12px;
      padding: 12px 18px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 24px;
      font-size: 0.9em;
      font-weight: 500;
      animation: fadeIn 0.5s ease;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
    }
    .api-warning a { color: #d97706; font-weight: 700; text-decoration: underline; }

    /* Menu Cards */
    .menu-cards {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-menu {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      text-decoration: none;
      border-radius: 20px; /* Rounded 2xl */
      background: #ffffff;
      border: 1px solid #f3f4f6;
      color: #1f2937;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04);
      animation: fadeInUp 0.5s ease both;
    }
    .btn-menu:nth-child(1) { animation-delay: 0.1s; }
    .btn-menu:nth-child(2) { animation-delay: 0.2s; }
    .btn-menu:nth-child(3) { animation-delay: 0.3s; }

    .btn-menu:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px -5px rgba(11, 61, 27, 0.08);
      border-color: #166534;
    }

    .card-icon {
      width: 54px; height: 54px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      background: #ebfbf1;
      color: #065f46;
      border: 1px solid #bbf7d0;
    }

    .card-text { flex: 1; text-align: left; }
    .card-title { font-size: 1.05em; font-weight: 700; color: #1f2937; margin-bottom: 3px; }
    .card-desc  { font-size: 0.85em; color: #6b7280; font-weight: 400; }

    .card-arrow {
      font-size: 20px; color: #9ca3af;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .btn-menu:hover .card-arrow { transform: translateX(4px); color: #0b3d1b; }

    /* Animations */
    @keyframes fadeIn    { from { opacity: 0; }                      to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp  { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo-icon">🏢</span>
    <h1>ระบบบันทึกเวลาเข้างาน</h1>
    <p class="subtitle">Face Recognition &amp; GPS Attendance</p>
  </div>

  <div id="apiWarning" class="api-warning">
    ⚠️ ยังไม่ได้ตั้งค่า API —
    <a href="config.html">ไปตั้งค่าก่อน</a>
  </div>

  <div class="menu-cards">
    <a href="register.html" class="btn-menu btn-register">
      <div class="card-icon">👤</div>
      <div class="card-text">
        <div class="card-title">ลงทะเบียนพนักงาน</div>
        <div class="card-desc">บันทึกข้อมูลใบหน้าใหม่</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="scan.html" class="btn-menu btn-scan">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">สแกนเข้างาน</div>
        <div class="card-desc">ยืนยันตัวตนด้วยใบหน้า + GPS</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="config.html" class="btn-menu btn-config">
      <div class="card-icon">⚙️</div>
      <div class="card-text">
        <div class="card-title">ตั้งค่าระบบ</div>
        <div class="card-desc">จัดการ GPS และ API (Admin)</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <script>
    if (!localStorage.getItem('gasApiUrl') && typeof GAS_API_URL === 'undefined') {
      document.getElementById('apiWarning').style.display = 'block';
    }
  </script>
</body>
</html>
