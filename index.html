            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                let w = img.width, h = img.height;
                if (w > h) { if (w > 800) { h *= 800 / w; w = 800; } } else { if (h > 800) { w *= 800 / h; h = 800; } }

    const uploadToCloudinary = async (base64Img) => {
        const CLOUD_NAME = "dobblw1f3"; // 👈 ถ้าพี่มี Cloud Name ของตัวเอง เปลี่ยนตรงนี้ได้เลยนะคะ

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });

            if (data.error) throw new Error(data.error.message);

            // 💡 ระบบกำจัด "ร่างโคลน" (กรองข้อมูลที่ซ้ำกันให้เหลือแค่ 1 หลัง)
            const uniqueMap = new Map();
            validRows.forEach(row => {
                // ถ้ายังไม่มีรหัสบ้านนี้ในตระกร้า ให้เก็บไว้ (ถ้ามีแล้ว แปลว่าซ้ำ ให้โยนทิ้ง)
                if (!uniqueMap.has(row.id)) {
                    uniqueMap.set(row.id, row);
                } else {
                    // (Optional) เลือกร่างโคลนที่อยู่บนสุดของ Sheet เป็นหลัก
                    const existingRow = uniqueMap.get(row.id);
                    const existingIdNum = parseInt(String(existingRow._originalRowId || existingRow.id).replace('row_', '')) || Infinity;
                    const currentIdNum = parseInt(String(row._originalRowId || row.id).replace('row_', '')) || Infinity;
                    if (currentIdNum < existingIdNum) uniqueMap.set(row.id, row);
                }
            });

            return Array.from(uniqueMap.values()).sort((a, b) => (parseInt((a._originalRowId || a.id).replace('row_', '')) || 0) - (parseInt((b._originalRowId || b.id).replace('row_', '')) || 0));

    const parseThaiDate = (dStr) => {
        if (!dStr) return null; const s = String(dStr).trim();
        if (s.includes('/')) {
            const p = s.split('/');
            if (p.length >= 3) { let d=parseInt(p[0],10), m=parseInt(p[1],10), y=parseInt(p[2],10); if(y>2500) y-=543; else if(y<100) y+=2000; return new Date(y, m-1, d); }
        }
        return new Date(s);

                                    } else {
                                        badgeContent = <span className="mr-3 px-2.5 py-1 bg-red-50 text-red-600 rounded-full border border-red-100 text-[11px] font-bold shadow-sm">ยังไม่ครบ ({completedTasks}/{totalTasks})</span>;
                                    }
                                    content = <div className="flex items-center">{badgeContent}<span className={`text-[15px] font-extrabold ${style.text}`}>{safeTrim(row['หมู่บ้าน']) || '-'}</span></div>;
                                } else if (col === 'บ้านเลขที่' || col === 'ซอย') { content = <span className="text-[14px] font-medium text-gray-700">{safeTrim(row[col]) || '-'}</span>;
                                } else if (col === 'สถานะ') { content = <span className={`px-3 py-1 rounded-full text-[12px] font-bold ${style.badge}`}>{statusVal || '-'}</span>;
                                } else { content = <span className="text-[14px] font-medium text-gray-500">{safeTrim(row[col]) || '-'}</span>; }
                                return <td key={col} className="py-4 px-5 align-middle border border-gray-200">{content}</td>;
                            })}
                          </tr>
                          {expandedRowId === row.id && (
                              <tr className="border-b border-gray-100 bg-gray-50/50">
                                  <td colSpan={visibleColumns.length + 1} className="p-0 border border-gray-200">
                                      <div className="p-6 md:p-8 bg-white border-l-4 border-brand shadow-inner w-full my-2 mx-4 rounded-xl max-w-[96%]">
                                          <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                                              <h4 className="text-[17px] font-bold text-gray-800 flex items-center"><Icon name="CheckSquare" size={20} className="mr-2 text-brand" />เช็กลิสต์คอนเทนต์</h4>
                                              <button onClick={() => setExpandedRowId(null)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><Icon name="X" size={14} /></button>
                                          </div>
                                          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                                              <div className="bg-brand/5 p-5 rounded-[16px] border border-brand/10">
                                                  <h5 className="font-bold text-brand mb-4 flex items-center"><Icon name="Video" size={18} className="mr-2"/> งานหลัก</h5>
                                                  <div className="space-y-4">
                                                      <CheckboxItem rowId={row.id} taskKey="main_vertical" label="คลิปแนวตั้ง" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="main_horizontal" label="คลิปแนวนอน" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="main_person" label="คลิปมีคน" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="main_photo" label="ถ่ายรูป" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                  </div>
                                              </div>
                                              <div className="bg-blue-50/50 p-5 rounded-[16px] border border-blue-100">
                                                  <h5 className="font-bold text-blue-800 mb-4 flex items-center"><Icon name="FileSignature" size={18} className="mr-2"/> งานรอง (คอนเท้น)</h5>
                                                  <h6 className="text-[11px] font-bold text-blue-500 uppercase mb-3 bg-blue-100 px-2 py-1 rounded w-max">DIRECT</h6>
                                                  <div className="space-y-4 mb-6 pl-1">
                                                      <CheckboxItem rowId={row.id} taskKey="sub_dir_before_after" label="Before/After" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="sub_dir_asmr" label="เทสบ้าน / Asmr" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="sub_dir_facility" label="Facility (ทำเล) ไลฟ์สไตล์" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                  </div>
                                                  <h6 className="text-[11px] font-bold text-blue-500 uppercase mb-3 bg-blue-100 px-2 py-1 rounded w-max">INDIRECT</h6>
                                                  <div className="space-y-4 pl-1">
                                                      <CheckboxItem rowId={row.id} taskKey="sub_indir_startup" label="ช่วง Startup อัพความพร้อม" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <CheckboxItem rowId={row.id} taskKey="sub_indir_qa" label="ตอบคอมเมนต์ / QA" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      <OtherCheckboxItem rowId={row.id} checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                  </div>
                                              </div>
                                          </div>
                                      </div>
                                  </td>
                              </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                    {filteredData.length === 0 && <tr><td colSpan={100} className="py-16 text-center text-gray-400">ไม่มีข้อมูลที่ค้นหา</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
    };

    const ConstructionSchedule = ({ sheetData, constructionProgress, isFirebaseLoaded, setManualRefreshKey }) => {
        const [viewMode, setViewMode] = useState('unfinished'); 
        
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [isSortDropdownOpen, setIsSortDropdownOpen] = useState(false);
        const [sortBy, setSortBy] = useState('default');
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [showFilters, setShowFilters] = useState(false);
        
        const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
        const [historyToDelete, setHistoryToDelete] = useState(null);
        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('action') === 'view_history') {
                setIsHistoryModalOpen(true);
            }
        }, []);

        const validSheetData = getValidSheetData(sheetData);
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(validSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        // 💡 1. แยกระบบตัวกรองเป็น 2 สมอง (แยกความจำโหมด "กำลังทำ" กับ "ทั้งหมด")
        const defaultUnfinishedHidden = { 'สถานะ': uniqueStatuses.filter(s => s !== 'ยังไม่เสร็จ'), 'Website': [] };
        
        const [hiddenValuesUnfinished, setHiddenValuesUnfinished] = useState(() => {
            const saved = localStorage.getItem('s_h_val_unfin_v15');
            return saved ? JSON.parse(saved) : null;
        });
        const [hiddenValuesAll, setHiddenValuesAll] = useState(() => {
            const saved = localStorage.getItem('s_h_val_all_v15');
            // โหมดทั้งหมด: โชว์ทุกอย่าง ยกเว้น "ขายแล้ว"
            return saved ? JSON.parse(saved) : { 'สถานะ': ['ขายแล้ว'], 'Website': [] };
        });

        const [visibleColsUnfinished, setVisibleColsUnfinished] = useState(() => {
            const saved = localStorage.getItem('s_v_col_unfin_v15');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        });
        const [visibleColsAll, setVisibleColsAll] = useState(() => {
            const saved = localStorage.getItem('s_v_col_all_v15');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        });

        // 💡 ติดตั้งค่าเริ่มต้นให้โหมดกำลังทำ (โชว์เฉพาะ 'ยังไม่เสร็จ')
        useEffect(() => {
            if (!hiddenValuesUnfinished && uniqueStatuses.length > 0) {
                setHiddenValuesUnfinished(defaultUnfinishedHidden);
            }
        }, [uniqueStatuses.length]);

        // เซฟความจำแยกลงเครื่อง
        useEffect(() => { if(hiddenValuesUnfinished) localStorage.setItem('s_h_val_unfin_v15', JSON.stringify(hiddenValuesUnfinished)); }, [hiddenValuesUnfinished]);
        useEffect(() => { localStorage.setItem('s_h_val_all_v15', JSON.stringify(hiddenValuesAll)); }, [hiddenValuesAll]);
        useEffect(() => { localStorage.setItem('s_v_col_unfin_v15', JSON.stringify(visibleColsUnfinished)); }, [visibleColsUnfinished]);
        useEffect(() => { localStorage.setItem('s_v_col_all_v15', JSON.stringify(visibleColsAll)); }, [visibleColsAll]);

        // ตัวแปรสลับสมองอัตโนมัติตามโหมดที่เปิดอยู่
        const currentHiddenValues = viewMode === 'unfinished' ? (hiddenValuesUnfinished || defaultUnfinishedHidden) : hiddenValuesAll;
        const currentVisibleColumns = viewMode === 'unfinished' ? visibleColsUnfinished : visibleColsAll;

        const toggleColumn = (col) => {
            if (viewMode === 'unfinished') setVisibleColsUnfinished(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
            else setVisibleColsAll(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        };

        const toggleHideValue = (col, val) => {
            if (viewMode === 'unfinished') {
                setHiddenValuesUnfinished(prev => {
                    const current = prev || defaultUnfinishedHidden;
                    const arr = current[col] || [];
                    return { ...current, [col]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
                });
            } else {
                setHiddenValuesAll(prev => {
                    const arr = prev[col] || [];
                    return { ...prev, [col]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
                });
            }
        };

        const resetHideValue = (col) => {
            if (viewMode === 'unfinished') setHiddenValuesUnfinished(prev => ({...prev, [col]: []}));
            else setHiddenValuesAll(prev => ({...prev, [col]: []}));
        };

        const filteredData = validSheetData.filter(row => {
            const prog = constructionProgress[row.id] || {};
            if (viewMode === 'unfinished' && prog.finishedDate) return false;

            if (currentHiddenValues['สถานะ']?.includes(safeTrim(row['สถานะ']))) return false;
            if (currentHiddenValues['Website']?.includes(safeTrim(row['Website']))) return false;
            if (searchQuery && !`${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            return true;
        });

        const sortOptions = [
            { value: 'default', label: 'ค่าเริ่มต้น' }, { value: 'start_asc', label: 'เริ่มทำ: เก่า ➔ ใหม่' }, { value: 'start_desc', label: 'เริ่มทำ: ใหม่ ➔ เก่า' },
            { value: 'finish_asc', label: 'ทำเสร็จเมื่อ: เก่า ➔ ใหม่' }, { value: 'finish_desc', label: 'ทำเสร็จเมื่อ: ใหม่ ➔ เก่า' },
            { value: 'days_asc', label: 'รวมเวลา: น้อย ➔ มาก' }, { value: 'days_desc', label: 'รวมเวลา: มาก ➔ น้อย' }
        ];

        const sortedData = [...filteredData].sort((a, b) => {
            const progA = constructionProgress[a.id] || {}, progB = constructionProgress[b.id] || {};
            switch (sortBy) {
                case 'start_asc': return (parseThaiDate(safeTrim(a['เริ่มทำ']))?.getTime()||Infinity) - (parseThaiDate(safeTrim(b['เริ่มทำ']))?.getTime()||Infinity);
                case 'start_desc': return (parseThaiDate(safeTrim(b['เริ่มทำ']))?.getTime()||-Infinity) - (parseThaiDate(safeTrim(a['เริ่มทำ']))?.getTime()||-Infinity);
                case 'finish_asc': return (progA.finishedDate ? new Date(progA.finishedDate).getTime() : Infinity) - (progB.finishedDate ? new Date(progB.finishedDate).getTime() : Infinity);
                case 'finish_desc': return (progB.finishedDate ? new Date(progB.finishedDate).getTime() : -Infinity) - (progA.finishedDate ? new Date(progA.finishedDate).getTime() : -Infinity);
                case 'days_asc': {
                    const daysA = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate), daysB = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    return (daysA === '-' ? Infinity : daysA) - (daysB === '-' ? Infinity : daysB);
                }
                case 'days_desc': {
                    const daysA = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate), daysB = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    return (daysB === '-' ? -Infinity : daysB) - (daysA === '-' ? -Infinity : daysA);
                }
                default: return 0;
            }
        });

        const handleUpdateProgress = async (rowId, data) => {
            if (!isFirebaseLoaded) return;
            try { 
                await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "construction_progress", rowId), data, { merge: true }); 
                if (data.finishedDate) {
                    const rowInfo = validSheetData.find(r => r.id === rowId);
                    if (rowInfo) {
                        const houseName = `${safeTrim(rowInfo['หมู่บ้าน'])} ${safeTrim(rowInfo['บ้านเลขที่'])} ${safeTrim(rowInfo['ซอย'])}`.trim();
                        fetch(`${window.VERCEL_API_URL}/api/trigger`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'house', data: { houseName, finishedDate: data.finishedDate } })
                        }).catch(e => console.log('Vercel API error', e));
                    }
                }
            } catch(err) {}
        };

        return (
            <div className="flex-1 p-3 md:p-6 overflow-hidden bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-4 md:mb-6 shrink-0">
                    <div className="flex items-center gap-3">
                        <h2 className="text-[20px] md:text-[22px] font-bold text-gray-800 flex items-center"><Icon name="Home" className="mr-2 md:mr-3 text-brand" size={24}/> {viewMode === 'unfinished' ? 'สถานะบ้าน (กำลังทำ)' : 'สถานะบ้านทั้งหมด'}</h2>
                        {validSheetData.length > 0 && <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full shadow-sm"><span className="text-[12px] font-bold text-brand">{sortedData.length} รายการ</span></div>}
                        <button onClick={() => setIsHistoryModalOpen(true)} className="ml-1 px-3 py-1.5 text-brand bg-brand/10 border border-brand/20 rounded-lg shadow-sm hover:bg-brand/20 transition-all font-bold text-[13px] flex items-center">
                            <Icon name="Clock" size={14} className="mr-1.5" /> ประวัติ
                        </button>
                    </div>
               </div>

               <div className="flex bg-gray-100 p-1.5 rounded-xl w-fit mb-4 md:mb-6 shrink-0 shadow-sm border border-gray-200">
                    <button onClick={() => { setViewMode('unfinished'); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className={`flex items-center px-4 md:px-6 py-2.5 rounded-lg text-[13px] md:text-[14px] font-bold transition-all ${viewMode === 'unfinished' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}><Icon name="ListTodo" size={16} className="mr-2" /> กำลังทำ (ยังไม่เสร็จ)</button>
                    <button onClick={() => { setViewMode('all'); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className={`flex items-center px-4 md:px-6 py-2.5 rounded-lg text-[13px] md:text-[14px] font-bold transition-all ${viewMode === 'all' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}><Icon name="Building" size={16} className="mr-2" /> บ้านทั้งหมด</button>
               </div>

               <div className="bg-white p-4 rounded-[20px] shadow-sm mb-4 md:mb-6 shrink-0 relative z-20">
                    <div className="flex justify-between items-center xl:hidden cursor-pointer" onClick={() => setShowFilters(!showFilters)}>
                        <div className="flex items-center text-[14px] font-bold text-gray-700"><Icon name="Search" size={16} className="mr-2 text-brand" /> ค้นหาและจัดการข้อมูล</div>
                        <div className="bg-gray-50 p-1.5 rounded-lg text-gray-500"><Icon name={showFilters ? "ChevronUp" : "ChevronDown"} size={16} /></div>
                    </div>

                    <div className={`flex-col xl:flex-row items-start xl:items-center w-full ${showFilters ? 'flex mt-4' : 'hidden xl:flex'}`}>
                        <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0 hidden xl:block">ตัวจัดการข้อมูล:</span>
                        <div className="flex flex-wrap gap-2.5 shrink-0 w-full xl:w-auto">
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                <input type="text" placeholder="ค้นหาโครงการ, เลขที่..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full sm:w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"/>
                            </div>
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <button onClick={() => { setIsSortDropdownOpen(!isSortDropdownOpen); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-full sm:min-w-[200px] px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm"><div className="flex items-center"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> {sortOptions.find(o => o.value === sortBy)?.label || 'เรียงตาม...'}</div><Icon name={isSortDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" /></button>
                                {isSortDropdownOpen && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setIsSortDropdownOpen(false)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">เลือกการจัดเรียง</div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {sortOptions.map(opt => (
                                                    <label key={opt.value} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="radio" checked={sortBy === opt.value} onChange={() => { setSortBy(opt.value); setIsSortDropdownOpen(false); }} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{opt.label}</span></label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setIsSortDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-full sm:w-[200px] px-4 py-2 bg-white border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 shadow-sm"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" /></button>
                                {isDropdownOpen && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {allColumns.map(col => (
                                                    <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={currentVisibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{col}</span></label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                            {uniqueStatuses.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between w-full px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm ${currentHiddenValues['สถานะ']?.length > 0 ? 'border-brand/50 bg-brand/5' : ''}`}>
                                        <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะ {currentHiddenValues['สถานะ']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md">{uniqueStatuses.length - currentHiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>} <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                    </button>
                                    {activeFilterDropdown === 'status' && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="text-[12px] font-bold text-gray-500">ซ่อน/แสดง</span>{currentHiddenValues['สถานะ']?.length > 0 && <button onClick={() => resetHideValue('สถานะ')} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {uniqueStatuses.map(st => (
                                                        <label key={st} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={!currentHiddenValues['สถานะ']?.includes(st)} onChange={() => toggleHideValue('สถานะ', st)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{st}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}
                            {uniqueWebsites.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">

    const PostSchedule = ({ sheetData, setManualRefreshKey, postTracking, isFirebaseLoaded, constructionProgress, user }) => {
        const [viewMode, setViewMode] = useState('daily');
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [postMenuOpen, setPostMenuOpen] = useState(null);
        const [isSkipModalOpen, setIsSkipModalOpen] = useState(false);
        const [houseToSkip, setHouseToSkip] = useState(null);
        const [isDeleteHistoryModalOpen, setIsDeleteHistoryModalOpen] = useState(false);
        const [historyToDelete, setHistoryToDelete] = useState(null);
        const [showFilters, setShowFilters] = useState(false);

        const [timeLeft, setTimeLeft] = useState("");

useEffect(() => {
    const timer = setInterval(() => {
        const now = new Date();
        let target = new Date();
        target.setHours(9, 0, 0, 0);

        // ถ้าตอนนี้เลย 9 โมงไปแล้ว ให้เป้าหมายเป็น 9 โมงของวันพรุ่งนี้
        if (now >= target) {
            target.setDate(target.getDate() + 1);
        }

        const diff = target - now;
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        setTimeLeft(`${h} ชม. ${m} นาที ${s} วินาที`);
    }, 1000);
    return () => clearInterval(timer);
}, []);
        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('s_h_val_post_v6');
            return saved ? JSON.parse(saved) : { 'สถานะ': ['ขายแล้ว'], 'Website': ['ฝากขาย'] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('s_v_col_post_v6');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        });

        useEffect(() => { localStorage.setItem('s_h_val_post_v6', JSON.stringify(hiddenValues)); }, [hiddenValues]);

        const baseSheetData = getValidSheetData(sheetData);
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        const uniqueStatuses = [...new Set(baseSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(baseSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (col, val) => setHiddenValues(prev => {
            const arr = prev[col] || [];
            return { ...prev, [col]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
        });

        const { dateStr: assignmentTodayStr, displayStr: assignmentDisplayStr } = getAssignmentDateInfo();

        const handleTogglePost = async (rowId, isChecked, assigneeName) => {
            if (!isFirebaseLoaded) return;
            try { 
                const updateData = { [assigneeName]: isChecked ? assignmentTodayStr : null };
                
                // 💡 ถ้ากดติ๊กถูก ให้ดึงชื่อจาก Gmail มาบันทึกด้วย
                if (isChecked && user) {
                    updateData[`${assigneeName}_postedBy`] = user.displayName || user.email || 'ทีมงาน';
                } else if (!isChecked) {
                    updateData[`${assigneeName}_postedBy`] = null; // ถ้าติ๊กออก ก็ลบชื่อทิ้ง
                }
                
                await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", rowId), updateData, { merge: true }); 
            } catch(err) {}
        };

        const confirmSkip = (houseId, houseName) => { setHouseToSkip({ id: houseId, name: houseName }); setIsSkipModalOpen(true); };
        const executeSkip = async () => {
            if (!houseToSkip || !isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", houseToSkip.id), { lastSkippedTimestamp: Date.now() }, { merge: true }); } catch(err) {}
            setIsSkipModalOpen(false); setHouseToSkip(null);
        };

        const confirmDeleteHistory = (rowId, assigneeName, houseName) => { setHistoryToDelete({ rowId, assigneeName, houseName }); setIsDeleteHistoryModalOpen(true); };
        const executeDeleteHistory = async () => {
            if (!historyToDelete || !isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", historyToDelete.rowId), { [historyToDelete.assigneeName]: null }, { merge: true }); } catch(err) {}
            setIsDeleteHistoryModalOpen(false); setHistoryToDelete(null);
        };

        let activePool = baseSheetData.filter(row => {
            const status = safeTrim(row['สถานะ']), website = safeTrim(row['Website']);
            if (status !== 'ว่าง' && status !== 'ยื่นซ้อน') return false;
            if (website.includes('ฝากขาย')) return false;
            if (searchQuery && viewMode === 'daily') {
                if (!`${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            }
            return true;
        });

        const getLatestPostTime = (houseId) => {
            const p = postTracking[houseId];
            if (!p) return 0;
            let maxTime = 0;
            for (const key in p) {
                if (key !== 'lastSkippedTimestamp' && p[key]) {
                    if (p[key] === assignmentTodayStr) continue; 
                    const t = new Date(p[key]).getTime();
                    if (t > maxTime) maxTime = t;
                }
            }
            return maxTime;
        };

        const skippedHouses = [], freshHouses = [];
        activePool.forEach(h => { postTracking[h.id]?.lastSkippedTimestamp ? skippedHouses.push(h) : freshHouses.push(h); });
        skippedHouses.sort((a, b) => (postTracking[a.id].lastSkippedTimestamp || 0) - (postTracking[b.id].lastSkippedTimestamp || 0));
        
        let newestPool = [...freshHouses].sort((a, b) => {
             const lastA = getLatestPostTime(a.id);
             const lastB = getLatestPostTime(b.id);
             if (lastA !== lastB) return lastA - lastB; 
             // 💡 แก้บั๊ก NaN: ดึง _originalRowId มาใช้เรียงลำดับ
             const idA = parseInt(String(a._originalRowId || a.id).replace('row_', '')) || 0;
             const idB = parseInt(String(b._originalRowId || b.id).replace('row_', '')) || 0;
             return idB - idA;
        }).concat(skippedHouses);
        
        let priorityPool = [...freshHouses].sort((a, b) => {
             const lastA = getLatestPostTime(a.id);
             const lastB = getLatestPostTime(b.id);
             if (lastA !== lastB) return lastA - lastB; 
             const expA = parseThaiDate(safeTrim(a['หมดสัญญา']) || safeTrim(a['วันหมดสัญญา'])), expB = parseThaiDate(safeTrim(b['หมดสัญญา']) || safeTrim(b['วันหมดสัญญา']));
             const startA = parseThaiDate(safeTrim(a['เริ่มทำ'])), startB = parseThaiDate(safeTrim(b['เริ่มทำ']));
             
             const getScore = (exp, start) => {
                 if (exp && !isNaN(exp.getTime())) return exp.getTime();
                 if (start && !isNaN(start.getTime())) return start.getTime() + 10000000000000; return Infinity;
             };

             const scoreA = getScore(expA, startA);
             const scoreB = getScore(expB, startB);

             // 💡 ดักจับคะแนนชนกันเพื่อล็อกตำแหน่ง

            if (data.error) throw new Error(data.error.message); // ดึงข้อความ Error จริงๆ มา
            return data.secure_url;

            console.error("Cloudinary Upload Error:", error);
            throw error; // โยน Error ไปให้ป๊อปอัปด้านล่าง
        }

                        return;

                        {groupedData.map((group, gIdx) => (

                                            <div className="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center mr-3 shadow-md"><Icon name={group.caretaker === 'ยังไม่ระบุ' ? 'HelpCircle' : 'User'} size={16} /></div>

                                    return (
                                        <tr key={row.id || idx} className={`border-b transition-colors group hover:bg-gray-50`}>

                                                let content = null;
                                                const val = safeTrim(row[col]);
                                                
                                                if (col === 'หมู่บ้าน') content = <span className={`text-[15px] font-extrabold ${style.text}`}>{val || '-'}</span>;

                                                else if (col === 'ทำเล') content = <span className="text-[13px] font-bold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100">{val || '-'}</span>;
                                                else if (col === 'ราคา') content = <span className="text-[14px] font-extrabold text-emerald-600">{val ? formatPriceInput(val) : '-'}</span>;
                                                else if (col === 'เริ่มทำ') content = <span className="text-[14px] font-medium text-gray-500">{val || '-'}</span>;

                                                    const displayDate = fDate ? fDate.split('-').reverse().join('/') : null;

                                                        ? <span className="text-[13px] font-bold text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-lg border border-emerald-200">{displayDate}</span> 
                                                        : <span className="text-[13px] text-gray-400">-</span>;
                                                }

                                                            <option value="" className="text-gray-500 bg-white">- เลือกระดับ -</option>
                                                            <option value="รายการขายง่าย" className="text-green-700 bg-white">รายการขายง่าย</option>
                                                            <option value="รายการขายยาก" className="text-red-700 bg-white">รายการขายยาก</option>
                                                        </select>
                                                    );
                                                }
                                                else if (col === 'สถานะการถ่ายคลิป') {
                                                    const isVideoShot = prog.isVideoShot ?? (val === 'ถ่ายแล้ว');
                                                    content = (
                                                        <label className="flex items-center cursor-pointer group w-max">
                                                            <input type="checkbox" checked={isVideoShot} onChange={(e) => handleUpdateProgress(row.id, { isVideoShot: e.target.checked })} className="w-5 h-5 accent-brand rounded cursor-pointer" />

                                                        </label>
                                                    );
                                                }
                                                else content = <span className="text-[14px] font-medium text-gray-600">{val || '-'}</span>;
                                                
                                                return <td key={col} className="py-4 px-5 align-middle border border-gray-200">{content}</td>;
                                            })}
                                        </tr>
                                    )
                                })}
                            </React.Fragment>
                        ))}
                        {filteredData.length === 0 && <tr><td colSpan={100} className="py-16 text-center text-gray-400">ไม่มีข้อมูลที่ค้นหา</td></tr>}
                      </tbody>
                   </table>
                 </div>
               </div>

    const AdminPanel = ({ isFirebaseLoaded }) => {
        const [usersList, setUsersList] = useState([]);

        useEffect(() => {
            if (!isFirebaseLoaded) return;
            const { collection, onSnapshot } = window.firebaseAPI;
            const unsubscribe = onSnapshot(collection(window.firebaseDB, "users"), (snapshot) => {
                const loaded = [];
                snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                // เรียงคนที่รออนุมัติ (pending) ขึ้นมาอยู่บนสุด
                loaded.sort((a, b) => (a.status === 'pending' ? -1 : 1));
                setUsersList(loaded);
            });
            return () => unsubscribe();
        }, [isFirebaseLoaded]);

        const handleUpdateStatus = async (emailId, newStatus) => {
            try {
                await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "users", emailId), { status: newStatus, updatedAt: new Date().toISOString() });
            } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
        };

        const handleDeleteUser = async (emailId) => {
            if(!window.confirm('ลบผู้ใช้นี้ออกจากระบบ? (ถ้าเขาล็อกอินใหม่ จะกลับไปเป็นสถานะรออนุมัติ)')) return;
            try { await window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(window.firebaseDB, "users", emailId)); } catch (e) {}
        };

        return (
            <div className="flex-1 p-4 md:p-8 overflow-y-auto bg-background h-full custom-scrollbar" style={{ overscrollBehavior: 'none', WebkitOverflowScrolling: 'touch' }}>

                </div>
                <div className="bg-surface rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                    <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-left border-collapse min-w-max">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="p-4 text-[13px] font-extrabold text-gray-500 whitespace-nowrap">ผู้ใช้งาน</th>
                                    <th className="p-4 text-[13px] font-extrabold text-gray-500 whitespace-nowrap">อีเมลบัญชี</th>

                                    <tr key={u.id} className="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                                        <td className="p-4">
                                            <div className="flex items-center gap-3">
                                                <img src={u.photoURL || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-full border border-gray-200 object-cover shadow-sm" alt="profile"/>
                                                <div>
                                                    <div className="font-bold text-[14px] text-gray-800">{u.name}</div>
                                                    <div className="text-[11px] text-gray-400 mt-0.5">ลงทะเบียน: {new Date(u.registeredAt).toLocaleDateString('th-TH')}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="p-4 text-[13px] font-medium text-gray-600">{u.email}</td>
                                        <td className="p-4">

                                                <span className="bg-yellow-100 text-yellow-700 border border-yellow-300 px-3 py-1 rounded-full text-[11px] font-bold shadow-sm flex items-center w-max"><Icon name="Clock" size={12} className="mr-1.5"/> รออนุมัติ</span> :

    const ReminderPickerComponent = ({ value, onChange }) => {
  // แปลงนาทีรวม เป็น ชั่วโมง และ นาที

                    for (let i = 0; i < str.length; i++) {

                        } else if (char === ',' && !inQuote) { result.push(val); val = ''; } else { val += char; }

              if (action === 'view_event' && eventId) {

              }
              // 3️⃣ ดูกิจกรรมตามวันที่ (ของระบบทำงานส่วนตัว)

              window.history.replaceState({}, '', window.location.pathname + (tab ? '?tab=' + tab : ''));

              const handleWakeUp = (event) => {

                      // สั่งโหลดหน้าเว็บใหม่ทันที เพื่อกระชากแอปให้ตื่น 100%
                      window.location.href = event.data.url;
                  }
              };
              if ('serviceWorker' in navigator) navigator.serviceWorker.addEventListener('message', handleWakeUp);
              return () => {
                  if ('serviceWorker' in navigator) navigator.serviceWorker.removeEventListener('message', handleWakeUp);
              };
          }

            if (Notification.permission === 'granted') {

                    <button id="request-permission-btn" style="background:#169000; color:white; padding:15px 30px; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; width:100%; max-width:260px; shadow: 0 4px 15px rgba(22,144,0,0.4);">👉 กดเปิดการแจ้งเตือน 👈</button>

        };

        initMessaging();

        });
        return () => { if (unsubscribe) unsubscribe(); };
      }, [isFirebaseLoaded, user, accessStatus]);

        // 💡 ฟังก์ชันสร้างรหัสถาวรให้บ้านแต่ละหลัง (ไม่ให้ติ๊กถูกเลื่อนตามเวลาแทรกแถว)
        const generateStableHouseId = (row, defaultId) => {
            const project = String(row['หมู่บ้าน'] || row['โครงการ'] || '').trim();
            const houseNo = String(row['บ้านเลขที่'] || '').trim();
            const price = String(row['ราคา'] || '').trim();

            if (!project && !houseNo) return defaultId; // ถ้าไม่มีข้อมูลให้ใช้ row_ เดิมไปก่อน

            let str = project + houseNo + price;
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = Math.imul(31, hash) + str.charCodeAt(i) | 0;
            }
            return `h_${Math.abs(hash)}`; 
        };

              else if (action === 'view_date' && targetDate) {

                  if (typeof setSelectedDate === 'function') {

              window.history.replaceState({}, '', window.location.pathname + (tab ? '?tab=' + tab : ''));

            setIsUploadingLeaveImg(false);
        }

      const handleSaveEvent = async (e) => {
        e.preventDefault(); if (!isFirebaseLoaded) return;
        const eventData = { ...formData, time: (formData.type === 'holiday' || formData.type === 'leave' || formData.type === 'public_holiday') ? '' : `${formData.hour}:${formData.minute}`, activity: formData.type === 'holiday' ? 'วันหยุด' : formData.type === 'leave' ? (formData.leaveType ? `ลา: ${formData.leaveType} ${formData.leaveDuration === 'half' ? '(ครึ่งวัน)' : ''}`.trim() : 'วันลางาน') : formData.type === 'public_holiday' ? 'นักขัตฤกษ์' : formData.activity };
        
        // 💡 เพิ่มระบบคำนวณเวลาแจ้งเตือน (ที่เผลอลบหายไป) กลับมาแล้วค่ะ!
        if (formData.type === 'event' && formData.reminder) {
            const eventDateTime = new Date(`${formData.date}T${formData.hour}:${formData.minute}:00`);
            // ลบเวลาถอยหลังตามที่เลือก (ถ้าเลือก "0" ก็คือเตือนพอดีเวลา)
            eventDateTime.setMinutes(eventDateTime.getMinutes() - parseInt(formData.reminder));
            
            eventData.notifyAt = eventDateTime.getTime(); // บันทึกเวลาที่ต้องปลุก (Milliseconds)
            eventData.isNotified = false; // สร้างตัวกั้นว่ายังไม่ได้เตือน
        }

          if (editingEventId) { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "events", editingEventId), eventData); }

              const newDocRef = await window.firebaseAPI.addDoc(window.firebaseAPI.collection(window.firebaseDB, "events"), eventData);
              
              if (eventData.type === 'leave') {
                  const displayDate = eventData.date ? eventData.date.split('-').reverse().join('-') : '-';
                  
                  // 2. ส่ง eventId: newDocRef.id แนบไปกับแจ้งเตือนด้วย
                  sendNotification({ 
                      assignee: eventData.assignee, 
                      leaveType: eventData.leaveType, 
                      date: displayDate, 
                      reason: eventData.note,
                      eventId: newDocRef.id // <--- ส่งตั๋ววาร์ปไปตรงนี้!
                  });
              }

          <div className="bg-surface border border-gray-200 shadow-subtle rounded-[20px] flex flex-col h-full overflow-hidden">
            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 border-b border-gray-100 bg-white shrink-0 gap-4">
              <h2 className="text-[18px] md:text-[20px] font-bold text-gray-800 tracking-tight whitespace-nowrap">ปฏิทินวันหยุด</h2>
              <div className="flex items-center justify-between w-full sm:w-auto gap-2">
                <div className="flex items-center text-[16px] md:text-lg font-bold text-gray-800 whitespace-nowrap shrink-0">
                  <Icon name="CalendarIcon" size={18} className="mr-2 text-gray-400 shrink-0" />
                  {MONTHS_TH[month]} <span className="text-gray-400 font-medium ml-2">{year + 543}</span>
                </div>
                <div className="flex shrink-0 bg-gray-50 rounded-[10px] p-1 border border-gray-100 ml-auto">
                  <button onClick={prevMonth} className="px-2 py-1.5 rounded-md hover:bg-white text-gray-500 transition-colors"><Icon name="ChevronLeft" size={16}/></button>
                  <button onClick={goToToday} className="px-3 py-1.5 text-[13px] font-semibold text-gray-600 transition-colors">วันนี้</button>
                  <button onClick={nextMonth} className="px-2 py-1.5 rounded-md hover:bg-white text-gray-500 transition-colors"><Icon name="ChevronRight" size={16}/></button>
                </div>
              </div>
            </div>

            <div className="flex-1 relative overflow-hidden bg-white p-0">
               <div className="absolute inset-0 overflow-auto custom-scrollbar" style={{ overscrollBehavior: 'none', WebkitOverflowScrolling: 'touch' }}>
                   <table className="w-full text-center border-collapse min-w-max">
                     <thead className="sticky top-0 z-40 shadow-sm bg-white">
                       <tr>
                         <th rowSpan={2} className="border border-gray-200 bg-[#e5e7eb] p-2 text-[12px] font-bold text-gray-700 min-w-[45px] max-w-[45px] sticky left-0 z-50">ลำดับ</th>
                         <th rowSpan={2} className="border border-gray-200 border-r-gray-300 border-r-2 bg-[#e5e7eb] py-2 px-1 text-[13px] font-bold text-gray-700 min-w-[70px] max-w-[70px] w-[70px] sticky left-[45px] z-50 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">ชื่อพนักงาน</th>
                         <th rowSpan={2} className="border border-gray-200 bg-[#e5e7eb] p-2 text-[12px] font-bold text-gray-700 min-w-[140px]">สถิติการลา (ปี {year + 543})</th>
                         {Array.from({ length: daysInMonth }).map((_, i) => (
                           <th key={i} className={`border border-gray-200 bg-[#f3f4f6] p-1 text-[11px] font-bold ${[0, 6].includes(new Date(year, month, i + 1).getDay()) ? 'text-red-500' : 'text-gray-600'}`}>
                             {['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'][new Date(year, month, i + 1).getDay()]}
                           </th>
                         ))}
                       </tr>
                       <tr>
                         {Array.from({ length: daysInMonth }).map((_, i) => {
                           const isToday = (i+1) === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                           return (
                             <th key={`d-${i}`} className={`border border-gray-200 p-1 text-[11px] font-bold ${isToday ? 'bg-brand text-white' : 'bg-[#f3f4f6] text-gray-600'}`}>
                               {i+1}-{['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'][month]}
                             </th>
                           )
                         })}
                       </tr>
                     </thead>
                     <tbody>
                       {departments.map((dept) => (
                         <React.Fragment key={dept.id}>
                           <tr>
                             <td colSpan={daysInMonth + 3} className="border border-gray-200 bg-gray-50 p-0">
                               <div className="sticky left-0 w-max p-2 pl-4 text-[13px] font-bold text-left text-brand z-20">ทีม {dept.id}</div>
                             </td>
                           </tr>
                           {dept.members.map((emp, idx) => (
                             <tr key={emp} className="group transition-colors">
                               <td className="border border-gray-200 p-2 text-[12px] text-gray-500 bg-white group-hover:bg-gray-50 sticky left-0 z-30">{idx + 1}</td>
                               <td className="border border-gray-200 border-r-gray-300 border-r-2 py-2 px-1.5 text-[13px] font-bold text-gray-700 text-left bg-white group-hover:bg-gray-50 sticky left-[45px] z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] min-w-[70px] max-w-[70px] w-[70px] truncate" title={emp}>{emp}</td>
                               
                               <td className="border border-gray-200 p-1.5 text-[10px] text-gray-600 bg-white group-hover:bg-gray-50 text-left">
                                  {(() => {
                                     const empLeaves = events.filter(ev => ev.type === 'leave' && ev.assignee === emp && ev.date.startsWith(`${year}-`));
                                     const stats = { 'ลาป่วย': 0, 'ลากิจ': 0, 'ลาพักร้อน': 0, 'ลางานศพ': 0, 'ลาคลอด': 0, 'ลาบวช': 0, 'ไม่ระบุ': 0 };
                                     
                                     empLeaves.forEach(ev => { 
                                         const increment = ev.leaveDuration === 'half' ? 0.5 : 1;
                                         if (ev.leaveType && stats[ev.leaveType] !== undefined) stats[ev.leaveType] += increment; 
                                         else stats['ไม่ระบุ'] += increment; 
                                     });
                                     
                                     const openLeaveDetails = (type) => {
                                         const filteredLeaves = type === 'all' ? empLeaves : empLeaves.filter(ev => (ev.leaveType || 'ไม่ระบุ') === type);
                                         setLeaveDetailsData({ empName: emp, type, leaves: filteredLeaves.sort((a,b) => a.date.localeCompare(b.date)) });
                                     };

                                     return (
                                        <div className="flex flex-col h-full justify-between gap-1.5">
                                            <div className="grid grid-cols-2 gap-1 cursor-pointer select-none">
                                               <div onClick={() => openLeaveDetails('ลาป่วย')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลาป่วย'] > 0 ? 'text-brand font-bold' : ''}`}>ป่วย: {stats['ลาป่วย']}/{LEAVE_QUOTAS['ลาป่วย']}</div>
                                               <div onClick={() => openLeaveDetails('ลากิจ')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลากิจ'] > 0 ? 'text-brand font-bold' : ''}`}>กิจ: {stats['ลากิจ']}/{LEAVE_QUOTAS['ลากิจ']}</div>
                                               <div onClick={() => openLeaveDetails('ลาพักร้อน')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลาพักร้อน'] > 0 ? 'text-brand font-bold' : ''}`}>พักร้อน: {stats['ลาพักร้อน']}/{LEAVE_QUOTAS['ลาพักร้อน']}</div>
                                               <div onClick={() => openLeaveDetails('ลางานศพ')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลางานศพ'] > 0 ? 'text-brand font-bold' : ''}`}>งานศพ: {stats['ลางานศพ']}/{LEAVE_QUOTAS['ลางานศพ']}</div>
                                               <div onClick={() => openLeaveDetails('ลาคลอด')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลาคลอด'] > 0 ? 'text-brand font-bold' : ''}`}>คลอด: {stats['ลาคลอด']}/{LEAVE_QUOTAS['ลาคลอด']}</div>
                                               <div onClick={() => openLeaveDetails('ลาบวช')} className={`hover:bg-gray-200 rounded px-1 transition-colors ${stats['ลาบวช'] > 0 ? 'text-brand font-bold' : ''}`}>บวช: {stats['ลาบวช']}/-</div>
                                               {stats['ไม่ระบุ'] > 0 && <div onClick={() => openLeaveDetails('ไม่ระบุ')} className="text-red-500 col-span-2 hover:bg-red-100 rounded px-1 font-bold">รอระบุ: {stats['ไม่ระบุ']} ครั้ง</div>}
                                            </div>
                                            <button onClick={() => openLeaveDetails('all')} className="mt-auto w-full py-1.5 text-[10px] font-bold text-brand bg-brand/10 hover:bg-brand hover:text-white rounded flex items-center justify-center transition-colors shadow-sm border border-brand/20">
                                                <Icon name="ListTodo" size={12} className="mr-1" /> ประวัติการลา
                                            </button>
                                        </div>
                                     );
                                  })()}
                               </td>
                               {Array.from({ length: daysInMonth }).map((_, i) => {
                                 const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                                 const cellEv = events.filter(ev => ev.assignee === emp && ev.date === dStr && (ev.type === 'holiday' || ev.type === 'leave' || ev.type === 'public_holiday'));
                                 
                                 let bg = '', label = '';
                                 if(cellEv.length){
                                   if(cellEv.some(e=>e.type==='public_holiday')) { bg = 'bg-[#eab308] text-white'; label='ขัตฤกษ์'; }
                                   else if(cellEv.some(e=>e.type==='holiday')) { bg = 'bg-[#ef4444] text-white'; label='หยุด'; }
                                   else if(cellEv.some(e=>e.type==='leave')) { 
                                       bg = 'bg-[#f97316] text-white'; 
                                       const lvType = cellEv.find(e=>e.type==='leave')?.leaveType;
                                       if(lvType === 'ลาป่วย') label = 'ป่วย';
                                       else if(lvType === 'ลากิจ') label = 'กิจ';
                                       else if(lvType === 'ลาพักร้อน') label = 'พักร้อน';
                                       else if(lvType === 'ลางานศพ') label = 'งานศพ';
                                       else if(lvType === 'ลาคลอด') label = 'คลอด';
                                       else if(lvType === 'ลาบวช') label = 'บวช';
                                       else label = 'ลา';
                                       if (cellEv.find(e=>e.type==='leave')?.leaveDuration === 'half') label += ' ½';
                                   }
                                 }
                                 const isToday = (i+1) === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                                 const todayHighlightClass = isToday && !bg ? 'bg-green-50/50' : '';
                                 return (
                                   <td key={`c-${emp}-${i}`} onClick={() => { cellEv.length ? (setSelectedDayString(dStr), setIsDayViewOpen(true)) : handleOpenModal(i+1, null, emp, 'holiday') }} className={`border border-gray-200 p-0 cursor-pointer hover:bg-gray-100 transition-colors h-8 min-w-[40px] ${todayHighlightClass}`}>
                                     {label && <div className={`w-full h-full flex items-center justify-center text-[10px] font-bold ${bg}`}>{label}</div>}
                                   </td>
                                 )
                               })}
                             </tr>
                           ))}
                         </React.Fragment>
                       ))}
                     </tbody>
                   </table>
               </div>
            </div>
          </div>
        </div>
      );

      // --- หน้าที่รอโหลด ---
      if (!isAuthLoaded || accessStatus === 'checking') {
          return (
            <div className="fixed inset-0 z-[100] bg-[#0b3d1b] flex flex-col items-center justify-center">
              <img src="https://lh3.googleusercontent.com/d/1gKhLsrzU5lH26eRAbajDHCojJAbOkTPd" alt="Logo" className="h-28 w-auto object-contain drop-shadow-lg mb-6 animate-pulse" />
              <div className="text-white text-[14px] font-bold">กำลังตรวจสอบสิทธิ์...</div>
            </div>
          );
      }

      // 🛑 หน้าล็อกอินด้วย Google (Denied) - เวอร์ชันปรับระยะห่าง (ไม่มีปุ่มล็อกเอาท์)
      if (accessStatus === 'denied') {
          return (
            <div className="fixed inset-0 z-[100] bg-[#0b3d1b] flex flex-col items-center justify-center transition-opacity duration-500 ease-in-out">
              <div className="bg-white p-10 md:p-12 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col items-center justify-center text-center relative">
                  
                  {/* ✅ ข้อความหัวข้อสีเขียวเข้ม (ขยับลงมาใกล้ปุ่ม) */}
                  <h2 className="text-xl font-bold text-[#0b3d1b] mb-6">Startup Up All in One</h2>
                  
                  {errorMessage && <p className="text-red-500 text-[12px] font-bold bg-red-50 p-3 rounded-lg w-full text-center border border-red-200 mb-4">{errorMessage}</p>}
                  
                  {/* ✅ ปุ่มล็อกอิน Google */}
                  <button onClick={handleGoogleSignIn} className="flex items-center justify-center gap-3.5 bg-white border border-gray-300 hover:border-gray-400 hover:bg-gray-50 text-gray-800 px-8 py-3 rounded-full text-[14px] font-bold shadow-sm transition-all w-full">
                      <svg viewBox="0 0 48 48" className="w-5 h-5">
                          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                          <path fill="none" d="M0 0h48v48H0z"></path>
                      </svg>
                      เข้าสู่ระบบด้วย Google
                  </button>
              </div>
            </div>
          );
      }

      // 🛑 หน้าแจ้งเตือนรอการอนุมัติ (Waitlist)
      if (accessStatus === 'waitlist') {
          return (
            <div className="fixed inset-0 z-[100] bg-[#0b3d1b] flex flex-col items-center justify-center transition-opacity duration-500 ease-in-out">
              <div className="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm flex flex-col items-center justify-center gap-6 text-center">
                  <div className="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-2 border border-yellow-200 animate-pulse">
                      <Icon name="CheckSquare" size={32} />
                  </div>
                  <h1 className="text-2xl font-bold text-gray-800">รอการอนุมัติ</h1>
                  <p className="text-sm text-gray-600">บัญชี Gmail ({user.email})<br/>ลงทะเบียนเข้าสู่ระบบเรียบร้อยแล้วค่ะ!<br/>รอ(Host) กดยืนยันสิทธิ์นะคะ 💕</p>
                  
                  <div className="w-full flex justify-center mt-4 border-t border-gray-100 pt-5">
                      <button onClick={handleSignOut} className="px-8 py-2.5 text-[14px] font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-all shadow-sm">ยกเลิก / ล็อกเอาท์</button>
                  </div>
              </div>
            </div>
          );
      }

      return (
        <>
          {showSplash && (
            <div className={`fixed inset-0 z-[100] bg-[#0b3d1b] flex flex-col items-center justify-center transition-opacity duration-500 ease-in-out ${splashFade ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
              <img src="https://lh3.googleusercontent.com/d/1gKhLsrzU5lH26eRAbajDHCojJAbOkTPd" alt="Startup Up Logo" className="h-28 w-auto object-contain drop-shadow-lg mb-6 animate-pulse" />
            </div>
          )}

          <div className="h-screen w-full flex flex-col lg:flex-row bg-background font-sans text-gray-800 overflow-hidden">
            <div className={`fixed lg:static inset-y-0 left-0 z-40 w-[250px] bg-white border-r border-gray-200 shadow-sm lg:shadow-none transform transition-transform duration-300 flex flex-col shrink-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
              <div className="h-[120px] flex flex-col items-center justify-center bg-brand shrink-0 relative z-20">
                 <img src="https://lh3.googleusercontent.com/d/1gKhLsrzU5lH26eRAbajDHCojJAbOkTPd" alt="Startup Up Logo" className="h-[65px] object-contain drop-shadow-sm" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
              </div>
              <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-1.5 custom-scrollbar bg-transparent" style={{ overscrollBehavior: 'none', WebkitOverflowScrolling: 'touch' }}>
                <div className="w-full px-2 pt-2 pb-1 relative z-10 bg-transparent">
                    <span className="text-[13px] font-bold text-gray-400 tracking-widest uppercase block mb-3">เมนูระบบ</span>
                    
                    <div className="relative mb-2">
                        <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                        <input type="text" placeholder="ค้นหาเมนู..." value={menuSearchQuery} onChange={(e) => setMenuSearchQuery(e.target.value)} className="w-full pl-9 pr-8 py-2.5 bg-white border border-gray-200 rounded-xl text-[13px] outline-none focus:border-brand transition-all shadow-sm" />
                        {menuSearchQuery && <button onClick={() => setMenuSearchQuery('')} className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"><Icon name="X" size={14} /></button>}
                    </div>
                </div>
                
                {/* 💡 เติมปีกกา { และคำสั่ง .map กลับมาให้แล้วค่ะ จอไม่ขาวแน่นอน! */}
                {MAIN_MENUS.filter(menu => (menu.id !== 'admin' || isAdmin) && menu.label.toLowerCase().includes(menuSearchQuery.toLowerCase())).map(menu => {
                  const isActive = activeApp === menu.id;
                  return (
                    <button key={menu.id} onClick={() => { setActiveApp(menu.id); setIsSidebarOpen(false); setMenuSearchQuery(''); }} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl transition-all duration-200 shrink-0 ${isActive ? 'bg-brand/10 text-brand font-bold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium'}`}>
                      <Icon name={menu.icon} size={20} className={`${isActive ? 'text-brand' : 'text-gray-400'}`} />
                      <span className="text-[14px]">{menu.label}</span>
                    </button>
                  )
                })}
              </div>

              {/* 💡 แถบโปรไฟล์และปุ่มล็อกเอาท์ด้านล่างเมนู (มีปุ่มออกระบบที่นี่ที่เดียว) */}
              <div className="mt-auto border-t border-gray-100 p-4 bg-gray-50 flex flex-col gap-3 z-20 shrink-0">
                  <div className="flex items-center gap-3.5">
                      <img src={user?.photoURL || 'https://via.placeholder.com/150'} alt={user?.displayName || 'User'} className="h-10 w-10 rounded-full border-2 border-brand/20 shadow-sm object-cover shrink-0" />
                      <div className="flex-1 min-w-0">
                          <p className="font-bold text-gray-900 text-[13px] truncate">{user?.displayName || 'ผู้ใช้งาน'}</p>
                          <p className="text-gray-500 text-[10px] truncate">{user?.email || ''}</p>
                      </div>
                  </div>
                  {/* ✅ ปุ่มกดออกจากระบบแบบเต็มตา สังเกตง่าย */}
                  <button onClick={handleSignOut} className="w-full py-2.5 flex items-center justify-center gap-2 text-red-500 hover:text-white hover:bg-red-500 bg-red-50 border border-red-100 rounded-xl transition-all font-bold text-[12px] shadow-sm">
                      <Icon name="Zap" size={14} className="transform rotate-90" /> ออกจากระบบ
                  </button>
              </div>
            </div>

            <div className="flex-1 flex flex-col h-full overflow-hidden bg-background relative z-10">
              <div className="flex items-center justify-between p-4 lg:hidden bg-surface shadow-sm z-30 shrink-0 border-b border-gray-100 transition-colors">
                <div className="flex items-center">
                  <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-gray-600"><Icon name={isSidebarOpen ? 'X' : 'Menu'} /></button>
                  <span className="font-bold text-brand text-lg ml-2">STARTUP UP</span>
                </div>
              </div>

              {activeApp === 'calendar' && renderCalendarTab()}
              {activeApp === 'holidays' && renderHolidayTab()}
              {activeApp === 'content' && <ContentChecklist sheetData={sheetData} sheetError={sheetError} contentChecklists={contentChecklists} isFirebaseLoaded={isFirebaseLoaded} setManualRefreshKey={setManualRefreshKey} />}
              {activeApp === 'schedule' && <ConstructionSchedule sheetData={sheetData} constructionProgress={constructionProgress} isFirebaseLoaded={isFirebaseLoaded} setManualRefreshKey={setManualRefreshKey} />}
              {activeApp === 'zone' && <HouseZoneTable sheetData={sheetData} constructionProgress={constructionProgress} isFirebaseLoaded={isFirebaseLoaded} setManualRefreshKey={setManualRefreshKey} />}
              {activeApp === 'post' && <PostSchedule sheetData={sheetData} setManualRefreshKey={setManualRefreshKey} postTracking={postTracking} isFirebaseLoaded={isFirebaseLoaded} constructionProgress={constructionProgress} user={user} />}
              {activeApp === 'company' && <CompanyInfo />}
              {activeApp === 'admin' && isAdmin && <AdminPanel isFirebaseLoaded={isFirebaseLoaded} />}
              {activeApp === 'gallery' && <HouseGallery houses={houses} sheetData={sheetData} isFirebaseLoaded={isFirebaseLoaded} />}
              {activeApp === 'affiliate' && <AffiliateTable />}
              {activeApp === 'ai' && <AiChatView sheetData={sheetData} contentChecklists={contentChecklists} messages={aiMessages} setMessages={setAiMessages} />}
            </div>

            {isUserFilterMobileOpen && activeApp === 'calendar' && (
              <div className="fixed inset-0 z-[100] lg:hidden">
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setIsUserFilterMobileOpen(false)}></div>
                <div className="absolute bottom-0 left-0 right-0 bg-white w-full rounded-t-[24px] flex flex-col bottom-sheet-enter-active shadow-2xl" style={{ maxHeight: '85vh', height: 'auto' }} onClick={e => e.stopPropagation()}>
                   <div className="w-full flex justify-center pt-3 pb-2 cursor-pointer shrink-0" onClick={() => setIsUserFilterMobileOpen(false)}>
                      <div className="w-12 h-1.5 bg-gray-300 rounded-full"></div>
                   </div>
                   <div className="px-4 pb-3 border-b border-gray-100 flex items-center justify-between shrink-0">
                      <span className="font-bold text-gray-800 text-[16px]">ตัวกรองทีมงาน</span>
                      <div className="flex items-center space-x-2">
                         <button onClick={() => setIsAddDeptModalOpen(true)} className="text-brand bg-brand/10 p-1.5 rounded-lg"><Icon name="Plus" size={16}/></button>
                         <button onClick={() => setIsUserFilterMobileOpen(false)} className="text-gray-400 bg-gray-100 p-1.5 rounded-full"><Icon name="X" size={16}/></button>
                      </div>
                   </div>
                   <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                      {renderUserFilterList(true)}
                   </div>
                </div>
