    const compressImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width; let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    };

    const safeTrim = (val) => val ? String(val).trim() : '';

    const getValidSheetData = (sheetData) => {
        return sheetData.filter(row => {
            if (row.id === 'test_ping') return false;
            if (row['หมู่บ้าน'] === 'Connected OK!') return false;
            
            let hasActualData = false;
            for (const key in row) {
                if (key !== 'id' && safeTrim(row[key]) !== '') {
                    hasActualData = true; break;
                }
            }
            if (!hasActualData) return false;
            
            const project = safeTrim(row['หมู่บ้าน']);
            const houseNo = safeTrim(row['บ้านเลขที่']);
            if (!project && !houseNo) return false;

            return true;
        }).sort((a, b) => {
            const rowA = parseInt(a.id.replace('row_', '')) || 0;
            const rowB = parseInt(b.id.replace('row_', '')) || 0;
            return rowA - rowB;
        });

    const getFormattedDateThai = (dateStr) => {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        return `${parseInt(d, 10)} ${MONTHS_TH[parseInt(m, 10) - 1]} ${parseInt(y, 10) + 543}`;
    };

    const parseThaiDate = (dateStr) => {
        if (!dateStr) return null;
        const s = String(dateStr).trim();
        if (s.includes('/')) {
            const parts = s.split('/');
            if (parts.length >= 3) {
                let d = parseInt(parts[0], 10);
                let m = parseInt(parts[1], 10);
                let y = parseInt(parts[2], 10);
                if (y > 2500) y -= 543; 
                else if (y < 100) y += 2000; 
                return new Date(y, m - 1, d);
            }
        }
        if (s.includes('-')) return new Date(s);
        return new Date(s);
    };

    const calculateDays = (startStr, endStr) => {
        const startDate = parseThaiDate(startStr);
        if (!startDate || isNaN(startDate.getTime())) return '-';
        
        let endDate;
        if (endStr && endStr.trim() !== '') {
            endDate = new Date(endStr);
        } else {
            endDate = new Date();
        }
        
        if (isNaN(endDate.getTime())) return '-';
        
        startDate.setHours(0,0,0,0);
        endDate.setHours(0,0,0,0);
        const diffTime = endDate.getTime() - startDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        return diffDays >= 0 ? diffDays : 0; 
    };

    const formatPriceInput = (val) => {
        if (!val) return '';
        const raw = String(val).replace(/,/g, '');
        if (!isNaN(raw) && raw.trim() !== '') {
            const parts = raw.split('.');
            parts[0] = parseInt(parts[0] || 0, 10).toLocaleString('en-US');
            return parts.length > 1 ? `${parts[0]}.${parts[1]}` : parts[0];
        }
        return val;
    };

        const diff = Math.floor((today.getTime() - d.getTime()) / (1000 * 60 * 60 * 24));

                            if (!isFirebaseLoaded) return;
                            const docRef = window.firebaseAPI.doc(window.firebaseDB, "content_checklists", rowId);
                            await window.firebaseAPI.setDoc(docRef, { other_checked: e.target.checked }, { merge: true });
                        }}
                        className="w-[18px] h-[18px] accent-brand rounded border-gray-300 cursor-pointer"
                    />
                    <span className={`text-[14px] font-medium transition-colors ${isChecked ? 'text-gray-700' : 'text-gray-700 group-hover:text-brand'}`}>
                        อื่นๆ (ระบุ)
                    </span>
                </label>
                {isChecked && (
                    <div className="pl-7 w-full max-w-[300px]">
                        <textarea 
                            rows="3"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            onBlur={handleTextBlur}
                            placeholder="พิมพ์รายละเอียดกิจกรรมอื่นๆ (กด Enter เพื่อขึ้นบรรทัดใหม่)..." 
                            className="w-full px-3 py-2 text-[13px] bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand transition-all shadow-sm resize-none custom-scrollbar"
                        ></textarea>
                    </div>
                )}
            </div>
        );
    };

    const ContentChecklist = ({ sheetData, sheetError, contentChecklists, isFirebaseLoaded, setManualRefreshKey }) => {
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [isTaskFilterOpen, setIsTaskFilterOpen] = useState(false);
        const [pendingTaskFilter, setPendingTaskFilter] = useState(''); 
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [expandedRowId, setExpandedRowId] = useState(null);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('startupup_hiddenValues');
            return saved ? JSON.parse(saved) : { 'สถานะ': [], 'Website': [] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('startupup_visibleColumns');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะ'];
        });

        useEffect(() => { localStorage.setItem('startupup_hiddenValues', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('startupup_visibleColumns', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const validSheetData = getValidSheetData(sheetData);
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะ'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(validSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const taskOptions = [
            { key: 'main_vertical', label: 'คลิปแนวตั้ง' },
            { key: 'main_horizontal', label: 'คลิปแนวนอน' },
            { key: 'main_person', label: 'คลิปมีคน' },
            { key: 'main_photo', label: 'ถ่ายรูป' },
            { key: 'sub_dir_before_after', label: 'Before/After' },
            { key: 'sub_dir_asmr', label: 'เทสบ้าน / Asmr' },
            { key: 'sub_dir_facility', label: 'Facility (ทำเล) ไลฟ์สไตล์' },
            { key: 'sub_indir_startup', label: 'ช่วง Startup อัพความพร้อม ก่อนมีบ้าน' },
            { key: 'sub_indir_qa', label: 'ตอบคอมเมนต์ / QA' }
        ];

        const filteredData = validSheetData.filter(row => {
            const rowStatus = safeTrim(row['สถานะ']);
            const rowWebsite = safeTrim(row['Website']);
            
            if (hiddenValues['สถานะ']?.includes(rowStatus)) return false;
            if (hiddenValues['Website']?.includes(rowWebsite)) return false;
            
            if (pendingTaskFilter) {
                const checklist = contentChecklists[row.id] || {};
                if (checklist[pendingTaskFilter] === true) return false;
            }

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(query)) return false;
            }

            return true;
        });

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (column, value) => {
            setHiddenValues(prev => {
                const currentHidden = prev[column] || [];
                return currentHidden.includes(value) ? { ...prev, [column]: currentHidden.filter(v => v !== value) } : { ...prev, [column]: [...currentHidden, value] };
            });
        };

        return (
          <div className="flex-1 p-4 md:p-8 overflow-auto flex flex-col h-full bg-background text-gray-800">
            <div className="flex justify-between items-center mb-6 shrink-0">
              <div>
                <div className="flex items-center gap-3">
                    <h2 className="text-[22px] font-bold flex items-center text-gray-800">
                        <Icon name="CheckSquare" className="mr-3 text-brand" size={26}/> เช็คลิสต์คอนเทนต์บ้าน
                    </h2>
                    {validSheetData.length > 0 && (
                        <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full flex items-center shadow-sm">
                            <span className="text-[12px] font-bold text-brand">{filteredData.length} รายการ</span>
                        </div>
                    )}
                    <button 
                        onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }}
                        className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm transition-all"
                        title="รีเฟรชข้อมูล"
                    >
                        <Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} />
                    </button>
                </div>
                <p className="text-gray-500 text-[13px] mt-1">ข้อมูลเชื่อมต่อตรงจาก Google Sheet แบบเรียลไทม์</p>
              </div>
            </div>

            <div className="bg-white p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 flex flex-col xl:flex-row items-start xl:items-center relative z-20">
                <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0">ตัวจัดการข้อมูล:</span>
                
                <div className="flex flex-wrap gap-2.5 shrink-0">
                    <div className="relative shrink-0">
                        <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                        <input 
                            type="text" 
                            placeholder="ค้นหาโครงการ, เลขที่..." 
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"
                        />
                    </div>

                    {/* ตัวกรอง: หางานที่ยังไม่ได้ทำ */}
                    <div className="relative shrink-0">
                        <button onClick={() => { setIsTaskFilterOpen(!isTaskFilterOpen); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className={`flex items-center justify-between min-w-[200px] px-4 py-2 bg-white border ${pendingTaskFilter ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-300 text-gray-700 hover:border-brand'} rounded-xl text-[13px] font-bold transition-all shadow-sm`}>
                            <div className="flex items-center">
                                <Icon name="ListTodo" size={14} className={`mr-1.5 ${pendingTaskFilter ? 'text-red-500' : 'text-gray-400'}`} />
                                {pendingTaskFilter ? `${taskOptions.find(o => o.key === pendingTaskFilter)?.label} (ที่ยังไม่ทำ)` : 'หางานที่ยังไม่ได้ทำ'}
                            </div>
                            {pendingTaskFilter && (
                                <span onClick={(e) => { e.stopPropagation(); setPendingTaskFilter(''); }} className="ml-2 w-5 h-5 flex items-center justify-center bg-red-200 hover:bg-red-300 text-red-700 rounded-full cursor-pointer transition-colors">
                                    <Icon name="X" size={12} />
                                </span>
                            )}
                            {!pendingTaskFilter && <Icon name={isTaskFilterOpen ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />}
                        </button>
                        {isTaskFilterOpen && (
                            <>
                                <div className="fixed inset-0 z-10" onClick={() => setIsTaskFilterOpen(false)}></div>
                                <div className="absolute top-full left-0 mt-2 w-[280px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[400px]">
                                    <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">กรองบ้านที่ยังไม่ได้ทำสิ่งนี้...</div>
                                    <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                        <label className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                            <input type="radio" name="taskFilter" checked={pendingTaskFilter === ''} onChange={() => { setPendingTaskFilter(''); setIsTaskFilterOpen(false); }} className="mr-3 w-4 h-4 accent-brand cursor-pointer" />
                                            <span className={`text-[13px] font-semibold ${pendingTaskFilter === '' ? 'text-brand' : 'text-gray-700'}`}>แสดงบ้านทั้งหมด</span>
                                        </label>
                                        <div className="border-t border-gray-100 my-1"></div>
                                        {taskOptions.map(opt => (
                                            <label key={opt.key} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                <input type="radio" name="taskFilter" checked={pendingTaskFilter === opt.key} onChange={() => { setPendingTaskFilter(opt.key); setIsTaskFilterOpen(false); }} className="mr-3 w-4 h-4 accent-brand cursor-pointer" />
                                                <span className={`text-[13px] font-semibold ${pendingTaskFilter === opt.key ? 'text-brand' : 'text-gray-700'}`}>{opt.label}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    <div className="relative shrink-0">
                        <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setIsTaskFilterOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm">
                            <Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" />
                        </button>
                        {isDropdownOpen && (
                            <>
                                <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                    <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                    <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                        {allColumns.map(col => (
                                            <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                <input type="checkbox" checked={visibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                <span className="text-[13px] font-semibold text-gray-700">{col}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {uniqueStatuses.length > 0 && (
                        <div className="relative shrink-0">
                            <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); setIsTaskFilterOpen(false); }} className={`flex items-center justify-between px-4 py-2 bg-white border ${hiddenValues['สถานะ']?.length > 0 ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะ 
                                {hiddenValues['สถานะ']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md leading-none">{uniqueStatuses.length - hiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>}
                                <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                            </button>
                            {activeFilterDropdown === 'status' && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                                            <span className="text-[12px] font-bold text-gray-500">ติ๊กออกเพื่อซ่อนข้อมูล</span>
                                            {hiddenValues['สถานะ']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'สถานะ': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}
                                        </div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {uniqueStatuses.map(status => (
                                                <label key={status} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="checkbox" checked={!hiddenValues['สถานะ']?.includes(status)} onChange={() => toggleHideValue('สถานะ', status)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                    <span className="text-[13px] font-semibold text-gray-700">{status}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {uniqueWebsites.length > 0 && (
                        <div className="relative shrink-0">
                            <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'website' ? null : 'website'); setIsDropdownOpen(false); setIsTaskFilterOpen(false); }} className={`flex items-center justify-between px-4 py-2 bg-white border ${hiddenValues['Website']?.length > 0 ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> Website 
                                {hiddenValues['Website']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md leading-none">{uniqueWebsites.length - hiddenValues['Website'].length}/{uniqueWebsites.length}</span>}
                                <Icon name={activeFilterDropdown === 'website' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                            </button>
                            {activeFilterDropdown === 'website' && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                                            <span className="text-[12px] font-bold text-gray-500">ติ๊กออกเพื่อซ่อนข้อมูล</span>
                                            {hiddenValues['Website']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'Website': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}
                                        </div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {uniqueWebsites.map(web => (
                                                <label key={web} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="checkbox" checked={!hiddenValues['Website']?.includes(web)} onChange={() => toggleHideValue('Website', web)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                    <span className="text-[13px] font-semibold text-gray-700">{web}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>

                <div className="flex-1 overflow-x-auto mt-4 xl:mt-0 xl:ml-4 flex gap-2 horizontal-scrollbar pb-2 xl:pb-0 w-full border-t xl:border-t-0 xl:border-l border-gray-100 pt-3 xl:pt-0 xl:pl-4">
                    {visibleColumns.map((col, idx) => (
                        <span key={col} className="inline-flex items-center px-3 py-1.5 bg-brand/5 text-brand rounded-lg text-[12px] font-bold whitespace-nowrap border border-brand/10">
                            <span className="text-brand/50 mr-1.5">{idx + 1}.</span> {col}
                            <button onClick={() => toggleColumn(col)} className="ml-2 text-brand/50 hover:text-red-500 transition-colors"><Icon name="X" size={12} /></button>
                        </span>
                    ))}
                </div>
            </div>

            <div className="bg-surface rounded-[20px] shadow-sm border border-gray-100 flex-1 overflow-hidden flex flex-col z-10">
              <div className="overflow-auto custom-scrollbar flex-1 relative">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead className="sticky top-0 z-10 bg-gray-50/90 backdrop-blur-md border-b-2 border-gray-100">
                    <tr>
                      <th className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider whitespace-nowrap w-[60px] text-center border-r border-gray-100">ลำดับ</th>
                      {visibleColumns.map(col => <th key={col} className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider whitespace-nowrap border border-gray-200">{col}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {visibleColumns.length === 0 && validSheetData.length > 0 && <tr><td colSpan={100} className="py-12 text-center text-gray-400 font-medium">กรุณาเลือกคอลัมน์ที่ต้องการแสดงจากตัวจัดการข้อมูลด้านบน</td></tr>}
                    
                    {filteredData.map((row, idx) => {
                      const statusVal = safeTrim(row['สถานะ']);
                      const style = getRowStyleClasses(statusVal);

                      const checklist = contentChecklists[row.id] || {};
                      const hasOther = !!checklist['other_checked'];
                      const completedTasks = taskOptions.filter(opt => checklist[opt.key]).length + (hasOther ? 1 : 0);
                      const totalTasks = taskOptions.length + (hasOther ? 1 : 0);
                      const isComplete = completedTasks > 0 && completedTasks === totalTasks;

                      return (
                        <React.Fragment key={row.id}>
                          <tr className={`border-b transition-all duration-200 cursor-pointer border-gray-50 ${style.row}`} onClick={() => setExpandedRowId(prev => prev === row.id ? null : row.id)}>
                            <td className={`py-4 px-5 align-middle text-center text-[13px] font-bold border border-gray-200 text-gray-400`}>{idx + 1}</td>
                            {visibleColumns.map(col => {
                                let content = null;
                                
                                if (col === 'หมู่บ้าน') {
                                    const badgeContent = isComplete 
                                        ? <span className="mr-3 px-2.5 py-1 bg-emerald-100 text-emerald-800 rounded-full text-[11px] font-bold whitespace-nowrap shadow-sm"><Icon name="Check" size={12} className="inline-block mr-1 mb-0.5"/>ครบแล้ว</span>
                                        : <span className="mr-3 px-2.5 py-1 bg-red-50 text-red-600 rounded-full border border-red-100 text-[11px] font-bold whitespace-nowrap shadow-sm">ยังไม่ครบ ({completedTasks}/{totalTasks})</span>;

                                    content = <div className="flex items-center">{badgeContent}<span className={`text-[15px] font-extrabold ${style.text}`}>{safeTrim(row['หมู่บ้าน']) || '-'}</span></div>;
                                }
                                else if (col === 'บ้านเลขที่' || col === 'ซอย') {
                                    content = <span className="text-[14px] font-medium text-gray-700">{safeTrim(row[col]) || '-'}</span>;
                                }
                                else if (col === 'สถานะ') {
                                    content = <span className={`px-3 py-1 rounded-full text-[12px] font-bold ${style.badge}`}>{statusVal || '-'}</span>;
                                } 
                                else {
                                    content = <span className={`text-[14px] font-medium text-gray-500`}>{safeTrim(row[col]) || '-'}</span>;
                                }

                                return <td key={col} className={`py-4 px-5 align-middle border border-gray-200`}>{content}</td>;
                            })}
                          </tr>

                          {expandedRowId === row.id && (
                              <tr className="border-b border-gray-100 bg-gray-50/50">
                                  <td colSpan={visibleColumns.length + 1} className="p-0 border border-gray-200">
                                      <div className="p-6 md:p-8 bg-white border-l-4 border-brand shadow-inner w-full my-2 mx-4 rounded-xl max-w-[96%]">
                                          <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                                              <h4 className="text-[17px] font-bold text-gray-800 flex items-center">
                                                  <Icon name="CheckSquare" size={20} className="mr-2 text-brand" />
                                                  เช็คลิสต์คอนเทนต์
                                              </h4>
                                              <button onClick={() => setExpandedRowId(null)} className="p-2 bg-gray-100 text-gray-500 rounded-full hover:bg-gray-200 transition-colors"><Icon name="X" size={14} /></button>
                                          </div>
                                          
                                          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                                              <div>
                                                  <div className="bg-brand/5 p-5 rounded-[16px] border border-brand/10">
                                                      <h5 className="font-bold text-brand mb-4 flex items-center"><Icon name="Video" size={18} className="mr-2"/> งานหลัก</h5>
                                                      <div className="space-y-4">
                                                          <CheckboxItem rowId={row.id} taskKey="main_vertical" label="คลิปแนวตั้ง" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="main_horizontal" label="คลิปแนวนอน" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="main_person" label="คลิปมีคน" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="main_photo" label="ถ่ายรูป" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      </div>
                                                  </div>
                                              </div>
                                              <div>
                                                  <div className="bg-blue-50/50 p-5 rounded-[16px] border border-blue-100">
                                                      <h5 className="font-bold text-blue-800 mb-4 flex items-center"><Icon name="FileSignature" size={18} className="mr-2"/> งานรอง (คอนเท้น)</h5>
                                                      <h6 className="text-[11px] font-bold text-blue-500 uppercase mb-3 bg-blue-100 px-2 py-1 rounded w-max">DIRECT</h6>
                                                      <div className="space-y-4 mb-6 pl-1">
                                                          <CheckboxItem rowId={row.id} taskKey="sub_dir_before_after" label="Before/After" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="sub_dir_asmr" label="เทสบ้าน / Asmr" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="sub_dir_facility" label="Facility (ทำเล) ไลฟ์สไตล์" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      </div>
                                                      <h6 className="text-[11px] font-bold text-blue-500 uppercase mb-3 bg-blue-100 px-2 py-1 rounded w-max">INDIRECT</h6>
                                                      <div className="space-y-4 pl-1">
                                                          <CheckboxItem rowId={row.id} taskKey="sub_indir_startup" label="ช่วง Startup อัพความพร้อม ก่อนมีบ้าน" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <CheckboxItem rowId={row.id} taskKey="sub_indir_qa" label="ตอบคอมเมนต์ / QA" checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                          <OtherCheckboxItem rowId={row.id} checklist={checklist} isFirebaseLoaded={isFirebaseLoaded} />
                                                      </div>
                                                  </div>
                                              </div>
                                          </div>
                                      </div>
                                  </td>
                              </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                    {sheetError && <tr><td colSpan={100} className="py-12 text-center bg-red-50 text-red-500 rounded-xl"><Icon name="X" size={40} className="mx-auto mb-2 opacity-50"/><p className="font-bold">ดึงข้อมูลไม่สำเร็จ</p><p className="text-sm">{sheetError}</p></td></tr>}
                    {!sheetError && filteredData.length === 0 && validSheetData.length > 0 && <tr><td colSpan={100} className="py-16 text-center text-gray-400"><Icon name="Search" size={32} className="mx-auto mb-3 opacity-30"/><p className="font-medium">ไม่มีข้อมูลที่ตรงกับตัวกรอง (ถูกซ่อนไว้ทั้งหมด)</p></td></tr>}
                    {!sheetError && validSheetData.length === 0 && <tr><td colSpan={100} className="py-20 text-center flex flex-col items-center justify-center text-gray-400"><Icon name="FileSignature" size={48} className="mb-4 opacity-30"/> กำลังรอรับข้อมูลจาก Google Sheet...</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
    };

    const ConstructionSchedule = ({ sheetData, constructionProgress, isFirebaseLoaded, setManualRefreshKey }) => {
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [isSortDropdownOpen, setIsSortDropdownOpen] = useState(false);
        const [sortBy, setSortBy] = useState('default');
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('startupup_hiddenValues_const');
            return saved ? JSON.parse(saved) : { 'สถานะ': [], 'Website': [] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('startupup_visibleColumns_const');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        });

        useEffect(() => { localStorage.setItem('startupup_hiddenValues_const', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('startupup_visibleColumns_const', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const validSheetData = getValidSheetData(sheetData);
        
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(validSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const filteredData = validSheetData.filter(row => {
            const rowStatus = safeTrim(row['สถานะ']);
            if (hiddenValues['สถานะ']?.includes(rowStatus)) return false;
            if (hiddenValues['Website']?.includes(safeTrim(row['Website']))) return false;
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(query)) return false;
            }
            return true;
        });

        const sortOptions = [
            { value: 'default', label: 'ค่าเริ่มต้น' },
            { value: 'start_asc', label: 'เริ่มทำ: เก่า ➔ ใหม่' },
            { value: 'start_desc', label: 'เริ่มทำ: ใหม่ ➔ เก่า' },
            { value: 'finish_asc', label: 'ทำเสร็จเมื่อ: เก่า ➔ ใหม่' },
            { value: 'finish_desc', label: 'ทำเสร็จเมื่อ: ใหม่ ➔ เก่า' },
            { value: 'days_asc', label: 'รวมเวลา: น้อย ➔ มาก' },
            { value: 'days_desc', label: 'รวมเวลา: มาก ➔ น้อย' },
            { value: 'inspect_asc', label: 'การตรวจงาน: น้อย ➔ มาก' },
            { value: 'inspect_desc', label: 'การตรวจงาน: มาก ➔ น้อย' },
        ];

        const sortedData = [...filteredData].sort((a, b) => {
            const progA = constructionProgress[a.id] || {};
            const progB = constructionProgress[b.id] || {};
            switch (sortBy) {
                case 'start_asc': {
                    const da = parseThaiDate(safeTrim(a['เริ่มทำ']));
                    const db = parseThaiDate(safeTrim(b['เริ่มทำ']));
                    return (da ? da.getTime() : Infinity) - (db ? db.getTime() : Infinity);
                }
                case 'start_desc': {
                    const da = parseThaiDate(safeTrim(a['เริ่มทำ']));
                    const db = parseThaiDate(safeTrim(b['เริ่มทำ']));
                    return (db ? db.getTime() : -Infinity) - (da ? da.getTime() : -Infinity);
                }
                case 'finish_asc': {
                    const ta = progA.finishedDate ? new Date(progA.finishedDate).getTime() : Infinity;
                    const tb = progB.finishedDate ? new Date(progB.finishedDate).getTime() : Infinity;
                    return ta - tb;
                }
                case 'finish_desc': {
                    const ta = progA.finishedDate ? new Date(progA.finishedDate).getTime() : -Infinity;
                    const tb = progB.finishedDate ? new Date(progB.finishedDate).getTime() : -Infinity;
                    return tb - ta;
                }
                case 'days_asc': {
                    let da = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate);
                    let db = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    da = da === '-' ? Infinity : Number(da);
                    db = db === '-' ? Infinity : Number(db);
                    return da - db;
                }
                case 'days_desc': {
                    let da = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate);
                    let db = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    da = da === '-' ? -Infinity : Number(da);
                    db = db === '-' ? -Infinity : Number(db);
                    return db - da;
                }
                case 'inspect_asc': return (progA.inspectionCount || 0) - (progB.inspectionCount || 0);
                case 'inspect_desc': return (progB.inspectionCount || 0) - (progA.inspectionCount || 0);
                default: return 0;
            }
        });

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (column, value) => {
            setHiddenValues(prev => {
                const currentHidden = prev[column] || [];
                return currentHidden.includes(value) ? { ...prev, [column]: currentHidden.filter(v => v !== value) } : { ...prev, [column]: [...currentHidden, value] };
            });
        };

        const handleUpdateProgress = async (rowId, data) => {
            if (!isFirebaseLoaded) return;
            const docRef = window.firebaseAPI.doc(window.firebaseDB, "construction_progress", rowId);
            try { await window.firebaseAPI.setDoc(docRef, data, { merge: true }); } catch(err) {}
        };

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                  <div>
                    <div className="flex items-center gap-3">
                        <h2 className="text-[22px] font-bold text-gray-800 flex items-center">
                            <Icon name="Home" className="mr-3 text-brand" size={26}/> สถานะบ้าน(ยังไม่เสร็จ)
                        </h2>
                        {validSheetData.length > 0 && (
                            <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full flex items-center shadow-sm">
                                <span className="text-[12px] font-bold text-brand">{sortedData.length} รายการ</span>
                            </div>
                        )}
                        <button 
                            onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }}
                            className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm transition-all"
                            title="รีเฟรชข้อมูล"
                        >
                            <Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} />
                        </button>
                    </div>
                  </div>
               </div>

               <div className="bg-white p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 flex flex-col xl:flex-row items-start xl:items-center relative z-20">
                    <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0">ตัวจัดการข้อมูล:</span>
                    <div className="flex flex-wrap gap-2.5 shrink-0">
                        <div className="relative shrink-0">
                            <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                            <input 
                                type="text" 
                                placeholder="ค้นหาโครงการ, เลขที่..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"
                            />
                        </div>
                        {/* 1. เรียงตาม */}
                        <div className="relative shrink-0">
                            <button onClick={() => { setIsSortDropdownOpen(!isSortDropdownOpen); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className={`flex items-center justify-between min-w-[200px] px-4 py-2 bg-white border ${sortBy !== 'default' ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                <div className="flex items-center"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> {sortOptions.find(o => o.value === sortBy)?.label || 'เรียงตาม...'}</div>
                                <Icon name={isSortDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                            </button>
                            {isSortDropdownOpen && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setIsSortDropdownOpen(false)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">เลือกการจัดเรียง</div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {sortOptions.map(opt => (
                                                <label key={opt.value} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="radio" name="sortOption" checked={sortBy === opt.value} onChange={() => { setSortBy(opt.value); setIsSortDropdownOpen(false); }} className="mr-3 w-4 h-4 accent-brand cursor-pointer" />
                                                    <span className={`text-[13px] font-semibold ${sortBy === opt.value ? 'text-brand' : 'text-gray-700'}`}>{opt.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 2. เลือกคอลัมน์ */}
                        <div className="relative shrink-0">
                            <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setIsSortDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm">
                                <Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" />
                            </button>
                            {isDropdownOpen && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {allColumns.map(col => (
                                                <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="checkbox" checked={visibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                    <span className="text-[13px] font-semibold text-gray-700">{col}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 3. สถานะบ้าน */}
                        {uniqueStatuses.length > 0 && (
                            <div className="relative shrink-0">
                                <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between px-4 py-2 bg-white border ${hiddenValues['สถานะ']?.length > 0 ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                    <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะ 
                                    {hiddenValues['สถานะ']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md leading-none">{uniqueStatuses.length - hiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>}
                                    <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                </button>
                                {activeFilterDropdown === 'status' && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                                                <span className="text-[12px] font-bold text-gray-500">ติ๊กออกเพื่อซ่อนข้อมูล</span>
                                                {hiddenValues['สถานะ']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'สถานะ': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}
                                            </div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {uniqueStatuses.map(status => (
                                                    <label key={status} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                        <input type="checkbox" checked={!hiddenValues['สถานะ']?.includes(status)} onChange={() => toggleHideValue('สถานะ', status)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                        <span className="text-[13px] font-semibold text-gray-700">{status}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* 4. Website Filter */}
                        {uniqueWebsites.length > 0 && (
                            <div className="relative shrink-0">
                                <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'website' ? null : 'website'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between px-4 py-2 bg-white border ${hiddenValues['Website']?.length > 0 ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                    <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> Website 
                                    {hiddenValues['Website']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md leading-none">{uniqueWebsites.length - hiddenValues['Website'].length}/{uniqueWebsites.length}</span>}
                                    <Icon name={activeFilterDropdown === 'website' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                </button>
                                {activeFilterDropdown === 'website' && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                                                <span className="text-[12px] font-bold text-gray-500">ติ๊กออกเพื่อซ่อนข้อมูล</span>
                                                {hiddenValues['Website']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'Website': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}
                                            </div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {uniqueWebsites.map(web => (
                                                    <label key={web} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                        <input type="checkbox" checked={!hiddenValues['Website']?.includes(web)} onChange={() => toggleHideValue('Website', web)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                        <span className="text-[13px] font-semibold text-gray-700">{web}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                    <div className="flex-1 overflow-x-auto mt-4 xl:mt-0 xl:ml-4 flex gap-2 horizontal-scrollbar pb-2 xl:pb-0 w-full border-t xl:border-t-0 xl:border-l border-gray-100 pt-3 xl:pt-0 xl:pl-4">
                        {visibleColumns.map((col, idx) => (
                            <span key={col} className="inline-flex items-center px-3 py-1.5 bg-brand/5 text-brand rounded-lg text-[12px] font-bold whitespace-nowrap border border-brand/10">
                                <span className="text-brand/50 mr-1.5">{idx + 1}.</span> {col}
                                <button onClick={() => toggleColumn(col)} className="ml-2 text-brand/50 hover:text-red-500 transition-colors"><Icon name="X" size={12} /></button>
                            </span>
                        ))}
                    </div>
               </div>

               <div className="bg-surface rounded-[20px] shadow-sm border border-gray-100 flex-1 overflow-hidden flex flex-col z-10">
                 <div className="overflow-auto custom-scrollbar flex-1 relative">
                   <table className="w-full text-left border-collapse min-w-max">
                      <thead className="sticky top-0 z-10 bg-gray-50/90 backdrop-blur-md border-b-2 border-gray-100">
                        <tr>
                          <th className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider whitespace-nowrap w-[60px] text-center border-r border-gray-100">ลำดับ</th>
                          {visibleColumns.map(col => <th key={col} className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider whitespace-nowrap border border-gray-200">{col}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                          {visibleColumns.length === 0 && validSheetData.length > 0 && <tr><td colSpan={100} className="py-12 text-center text-gray-400 font-medium">กรุณาเลือกคอลัมน์ที่ต้องการแสดงจากตัวจัดการข้อมูลด้านบน</td></tr>}
                          {sortedData.map((row, idx) => {
                              const statusVal = safeTrim(row['สถานะ']);
                              const style = getRowStyleClasses(statusVal);
                              const prog = constructionProgress[row.id] || {};

                              return (
                                  <tr key={row.id || idx} className={`border-b transition-all duration-200 border-gray-50 ${style.row}`}>
                                      <td className="py-4 px-5 align-middle text-center text-[13px] font-bold border border-gray-200 text-gray-400">{idx + 1}</td>
                                      
                                      {visibleColumns.map(col => {
                                          let content = null;
                                          
                                          if (col === 'หมู่บ้าน') {
                                              content = <span className={`text-[15px] font-extrabold ${style.text}`}>{safeTrim(row['หมู่บ้าน']) || '-'}</span>;
                                          } 
                                          else if (col === 'บ้านเลขที่' || col === 'ซอย') {
                                              content = <span className="text-[14px] font-medium text-gray-700">{safeTrim(row[col]) || '-'}</span>;
                                          } 
                                          else if (col === 'เริ่มทำ') {
                                              const startVal = safeTrim(row['เริ่มทำ']) || '-';
                                              content = <span className="text-[14px] font-medium text-gray-500">{startVal}</span>;
                                          } 
                                          else if (col === 'ทำเสร็จเมื่อ') {
                                              content = (
                                                  <input 
                                                    type="date" 
                                                    value={prog.finishedDate || ''}
                                                    onChange={(e) => handleUpdateProgress(row.id, { finishedDate: e.target.value })}
                                                    className="px-3 py-1.5 text-[13px] rounded-lg outline-none transition-all shadow-sm bg-white border border-gray-300 focus:border-brand text-gray-700 focus:ring-1 focus:ring-brand"
                                                  />
                                              );
                                          } 
                                          else if (col === 'รวมเวลา (วัน)' || col === 'ระยะเวลา (วัน)' || col === 'ระยะเวลา' || col === 'รวมทั้งหมด') {
                                              const days = calculateDays(safeTrim(row['เริ่มทำ']), prog.finishedDate);
                                              content = <span className="text-[14px] font-bold text-gray-600 bg-gray-50 px-3 py-1 rounded-md border border-gray-100">{days === '-' ? '-' : `${days} วัน`}</span>;
                                          } 
                                          else if (col === 'การตรวจงาน') {
                                              const count = prog.inspectionCount || 0;
                                              content = (
                                                  <div className="flex items-center space-x-3">
                                                      <div className="flex items-center bg-white rounded-lg p-1 border border-gray-200 shadow-sm">
                                                          <button 
                                                              onClick={() => handleUpdateProgress(row.id, { inspectionCount: Math.max(0, count - 1) })}
                                                              disabled={count === 0}
                                                              className="w-7 h-7 flex items-center justify-center rounded-md text-gray-500 hover:text-red-500 hover:bg-gray-50 disabled:opacity-40 transition-colors"
                                                          >
                                                              <Icon name="Minus" size={14} />
                                                          </button>
                                                          <span className="w-8 text-center text-[14px] font-extrabold text-brand">
                                                              {count}
                                                          </span>
                                                          <button 
                                                              onClick={() => handleUpdateProgress(row.id, { inspectionCount: count + 1 })}
                                                              className="w-7 h-7 flex items-center justify-center rounded-md text-gray-500 hover:text-brand hover:bg-gray-50 transition-colors"
                                                          >
                                                              <Icon name="Plus" size={14} />
                                                          </button>
                                                      </div>
                                                      {count > 0 ? (
                                                          <span className="text-[12px] font-bold text-emerald-800 bg-emerald-100 px-2.5 py-1 rounded-full shadow-sm whitespace-nowrap">
                                                              ตรวจครั้งที่ {count}
                                                          </span>
                                                      ) : (
                                                          <span className="text-[12px] font-medium whitespace-nowrap text-gray-400 bg-gray-50 px-2.5 py-1 rounded-full border border-gray-100">
                                                              ยังไม่ได้ตรวจ
                                                          </span>
                                                      )}
                                                  </div>
                                              );
                                          }
                                          else if (col === 'สถานะ' || col === 'สถานะบ้าน') {
                                              content = <span className={`px-3 py-1 rounded-full text-[12px] font-bold ${style.badge}`}>{statusVal || '-'}</span>;
                                          }
                                          else {
                                              content = <span className="text-[14px] font-medium text-gray-500">{safeTrim(row[col]) || '-'}</span>;
                                          }

                                          return <td key={col} className="py-4 px-5 align-middle border border-gray-200">{content}</td>;
                                      })}
                                  </tr>
                              )
                          })}
                          {validSheetData.length === 0 && <tr><td colSpan={10} className="py-16 text-center text-gray-400 font-medium">ไม่มีข้อมูลจาก Google Sheet</td></tr>}
                      </tbody>
                   </table>
                 </div>
               </div>
            </div>
        );
    };

    const PostSchedule = ({ sheetData, setManualRefreshKey, postTracking, isFirebaseLoaded }) => {
        const [viewMode, setViewMode] = useState('daily');
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [postMenuOpen, setPostMenuOpen] = useState(null);
        const [isSkipModalOpen, setIsSkipModalOpen] = useState(false);
        const [houseToSkip, setHouseToSkip] = useState(null);
        const [isDeleteHistoryModalOpen, setIsDeleteHistoryModalOpen] = useState(false);
        const [historyToDelete, setHistoryToDelete] = useState(null);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('startupup_hiddenValues_post');
            return saved ? JSON.parse(saved) : { 'สถานะ': [], 'Website': [] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('startupup_visibleColumns_post');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        });

        useEffect(() => { localStorage.setItem('startupup_hiddenValues_post', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('startupup_visibleColumns_post', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const baseSheetData = getValidSheetData(sheetData);
        
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        const uniqueStatuses = [...new Set(baseSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(baseSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (column, value) => {
            setHiddenValues(prev => {
                const currentHidden = prev[column] || [];
                return currentHidden.includes(value) ? { ...prev, [column]: currentHidden.filter(v => v !== value) } : { ...prev, [column]: [...currentHidden, value] };
            });
        };

        const { dateStr: assignmentTodayStr, displayStr: assignmentDisplayStr } = getAssignmentDateInfo();

        const handleTogglePost = async (rowId, isChecked, assigneeName) => {
            if (!isFirebaseLoaded) return;
            const docRef = window.firebaseAPI.doc(window.firebaseDB, "post_tracking", rowId);
            try {
                if (isChecked) {
                    await window.firebaseAPI.setDoc(docRef, { [assigneeName]: assignmentTodayStr }, { merge: true });
                } else {
                    await window.firebaseAPI.setDoc(docRef, { [assigneeName]: null }, { merge: true });
                }
            } catch(err) { console.error(err); }
        };

        const confirmSkip = (houseId, houseName) => {
            setHouseToSkip({ id: houseId, name: houseName });
            setIsSkipModalOpen(true);
        };

        const executeSkip = async () => {
            if (!houseToSkip || !isFirebaseLoaded) return;
            const docRef = window.firebaseAPI.doc(window.firebaseDB, "post_tracking", houseToSkip.id);
            try {
                await window.firebaseAPI.setDoc(docRef, { lastSkippedTimestamp: Date.now() }, { merge: true });
            } catch(err) {}
            setIsSkipModalOpen(false);
            setHouseToSkip(null);
        };

        const confirmDeleteHistory = (rowId, assigneeName, houseName) => {
            setHistoryToDelete({ rowId, assigneeName, houseName });
            setIsDeleteHistoryModalOpen(true);
        };

        const executeDeleteHistory = async () => {
            if (!historyToDelete || !isFirebaseLoaded) return;
            const docRef = window.firebaseAPI.doc(window.firebaseDB, "post_tracking", historyToDelete.rowId);
            try {
                await window.firebaseAPI.setDoc(docRef, { [historyToDelete.assigneeName]: null }, { merge: true });
            } catch(err) {}
            setIsDeleteHistoryModalOpen(false);
            setHistoryToDelete(null);
        };

        let activePool = baseSheetData.filter(row => {
            const status = safeTrim(row['สถานะ']);
            const website = safeTrim(row['Website']);
            
            if (status !== 'ว่าง' && status !== 'ยื่นซ้อน') return false;
            if (website.includes('ฝากขาย')) return false;

            if (searchQuery && viewMode === 'daily') {
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(searchQuery.toLowerCase())) return false;
            }
            return true;
        });

        const skippedHouses = [];
        const freshHouses = [];
        activePool.forEach(h => {
             if (postTracking[h.id]?.lastSkippedTimestamp) skippedHouses.push(h);
             else freshHouses.push(h);
        });
        
        skippedHouses.sort((a, b) => (postTracking[a.id].lastSkippedTimestamp || 0) - (postTracking[b.id].lastSkippedTimestamp || 0));
        
        let newestPool = [...freshHouses].reverse().concat(skippedHouses);
        
        let priorityPool = [...freshHouses].sort((a, b) => {
             const expA = parseThaiDate(safeTrim(a['หมดสัญญา']) || safeTrim(a['วันหมดสัญญา']));
             const expB = parseThaiDate(safeTrim(b['หมดสัญญา']) || safeTrim(b['วันหมดสัญญา']));
             const startA = parseThaiDate(safeTrim(a['เริ่มทำ']));
             const startB = parseThaiDate(safeTrim(b['เริ่มทำ']));
             
             const getScore = (exp, start) => {
                 if (exp && !isNaN(exp.getTime())) return exp.getTime();
                 if (start && !isNaN(start.getTime())) return start.getTime() + 10000000000000; 
                 return Infinity;
             };
             
             return getScore(expA, startA) - getScore(expB, startB);
        }).concat(skippedHouses);

        const generalAssignees = ['เพจกลาง', 'Ketar', 'Noey'];
        const specificAssignees = ['May', 'Boom', 'Boat'];
        const allAssigneesList = [...generalAssignees, ...specificAssignees];
        const scheduleData = [];
        const usedHouseIds = new Set();
        
        generalAssignees.forEach(name => {
            const assignedHouses = [];
            for (let i = 0; i < newestPool.length; i++) {
                const h = newestPool[i];
                if (!usedHouseIds.has(h.id)) {
                    assignedHouses.push(h);
                    usedHouseIds.add(h.id);
                    break; 
                }
            }
            for (let i = 0; i < priorityPool.length && assignedHouses.length < 4; i++) {
                const h = priorityPool[i];
                if (!usedHouseIds.has(h.id)) {
                    assignedHouses.push(h);
                    usedHouseIds.add(h.id);
                }
            }
            scheduleData.push({ name, type: 'general', houses: assignedHouses });
        });
        
        specificAssignees.forEach(name => {
            const myHouses = priorityPool.filter(row => {
                const possibleKeys = ['เซลล์', 'เซลล์รับผิดชอบ', 'ผู้รับผิดชอบ', 'เจ้าของบ้าน', 'Sale', 'AS', 'แอดมิน'];
                for (const key of possibleKeys) {
                    if (row[key] && safeTrim(row[key]).toLowerCase().includes(name.toLowerCase())) return true;
                }
                for (const key in row) {
                    if (key !== 'id' && safeTrim(row[key]).toLowerCase() === name.toLowerCase()) return true;
                }
                return false;
            }).slice(0, 4); 
            
            scheduleData.push({ name, type: 'specific', houses: myHouses });
        });

        const getPriorityLabel = (row) => {
            const expStr = safeTrim(row['หมดสัญญา']) || safeTrim(row['วันหมดสัญญา']);
            const startStr = safeTrim(row['เริ่มทำ']);
            
            if (expStr) return <span className="inline-block mt-1.5 text-[11px] font-bold bg-red-50 text-red-600 px-2 py-0.5 rounded border border-red-100"><Icon name="Clock" size={10} className="inline-block mr-1 mb-0.5"/>ใกล้หมดสัญญา: {expStr}</span>;
            if (startStr) return <span className="inline-block mt-1.5 text-[11px] font-bold bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100"><Icon name="CalendarIcon" size={10} className="inline-block mr-1 mb-0.5"/>เริ่มทำ: {startStr}</span>;
            return null;
        };

        const renderPreviousPostInfo = (house, assigneeName) => {
            const lastPost = postTracking[house.id]?.[assigneeName];
            if (!lastPost || lastPost === assignmentTodayStr) return null;
            
            const diffDays = getDaysAgo(lastPost, assignmentTodayStr);
            if (diffDays <= 0) return null;

            return (
                <span className="inline-block mt-1.5 text-[11px] font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded border border-gray-200">
                    <Icon name="RefreshCw" size={10} className="inline-block mr-1 mb-0.5"/>
                    เคยโพสต์ {getFormattedDateThai(lastPost)} ({diffDays} วันที่แล้ว)
                </span>
            );
        };

        const filteredAllData = baseSheetData.filter(row => {
            if (searchQuery && viewMode === 'all') {
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(searchQuery.toLowerCase())) return false;
            }
            if (hiddenValues['สถานะ']?.includes(safeTrim(row['สถานะ']))) return false;
            if (hiddenValues['Website']?.includes(safeTrim(row['Website']))) return false;
            return true;
        });

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                  <div>
                    <div className="flex items-center gap-3">
                        <h2 className="text-[22px] font-bold text-gray-800 flex items-center">
                            <Icon name="FileSignature" className="mr-3 text-brand" size={26}/> 
                            {viewMode === 'daily' ? `ตารางโพสต์ประจำวัน ที่ ${assignmentDisplayStr}` : 'ประวัติโพสต์บ้านทั้งหมด'}
                        </h2>
                        {viewMode === 'all' && (
                            <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full flex items-center shadow-sm">
                                <span className="text-[12px] font-bold text-brand">{filteredAllData.length} รายการ</span>
                            </div>
                        )}
                        <button 
                            onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }}
                            className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm transition-all"
                            title="รีเฟรชข้อมูล"
                        >
                            <Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} />
                        </button>
                    </div>
                    <p className="text-gray-500 text-[13px] mt-1">ระบบจัดคิวโพสต์บ้านอัตโนมัติ (รีเซ็ตรอบ 09:00 น. ของทุกวัน)</p>
                  </div>
               </div>

               <div className="flex bg-gray-100 p-1.5 rounded-xl w-fit mb-6 shrink-0 shadow-sm border border-gray-200">
                    <button onClick={() => setViewMode('daily')} className={`flex items-center px-6 py-2.5 rounded-lg text-[14px] font-bold transition-all ${viewMode === 'daily' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}>
                        <Icon name="ListTodo" size={16} className="mr-2" /> กระดานจ่ายงานวันนี้
                    </button>
                    <button onClick={() => setViewMode('all')} className={`flex items-center px-6 py-2.5 rounded-lg text-[14px] font-bold transition-all ${viewMode === 'all' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}>
                        <Icon name="Building" size={16} className="mr-2" /> บ้านทั้งหมด (ประวัติโพสต์)
                    </button>
               </div>

               <div className="bg-white p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 flex flex-col xl:flex-row items-start xl:items-center relative z-20">
                    <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0">ตัวจัดการข้อมูล:</span>
                    <div className="flex flex-wrap gap-2.5 shrink-0">
                        <div className="relative shrink-0">
                            <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                            <input 
                                type="text" 
                                placeholder="ค้นหาหมู่บ้าน, เลขที่..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"
                            />
                        </div>
                        
                        {viewMode === 'all' && (
                            <div className="relative shrink-0">
                                <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm">
                                    <Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" />
                                </button>
                                {isDropdownOpen && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
