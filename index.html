    const HOURS = Array.from({ length: 24 }, (_, i) => i.toString().padStart(2, '0'));
    const MINUTES = Array.from({ length: 60 }, (_, i) => i.toString().padStart(2, '0'));

    const compressImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width; let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    };

    const safeTrim = (val) => val ? String(val).trim() : '';

    const getValidSheetData = (sheetData) => {
        return sheetData.filter(row => {
            if (row.id === 'test_ping') return false;
            if (row['หมู่บ้าน'] === 'Connected OK!') return false;
            
            let hasActualData = false;
            for (const key in row) {
                if (key !== 'id' && safeTrim(row[key]) !== '') {
                    hasActualData = true; break;
                }
            }
            if (!hasActualData) return false;
            
            const project = safeTrim(row['หมู่บ้าน']);
            const houseNo = safeTrim(row['บ้านเลขที่']);
            if (!project && !houseNo) return false;

            return true;
        }).sort((a, b) => {
            const rowA = parseInt(a.id.replace('row_', '')) || 0;
            const rowB = parseInt(b.id.replace('row_', '')) || 0;
            return rowA - rowB;
        });
    };

    const getFormattedDateThai = (dateStr) => {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        return `${parseInt(d, 10)} ${MONTHS_TH[parseInt(m, 10) - 1]} ${parseInt(y, 10) + 543}`;
    };

    const parseThaiDate = (dateStr) => {
        if (!dateStr) return null;
        const s = String(dateStr).trim();
        if (s.includes('/')) {
            const parts = s.split('/');
            if (parts.length >= 3) {
                let d = parseInt(parts[0], 10);
                let m = parseInt(parts[1], 10);
                let y = parseInt(parts[2], 10);
                if (y > 2500) y -= 543; 
                else if (y < 100) y += 2000; 
                return new Date(y, m - 1, d);
            }
        }
        if (s.includes('-')) return new Date(s);
        return new Date(s);
    };

    const calculateDays = (startStr, endStr) => {
        const startDate = parseThaiDate(startStr);
        if (!startDate || isNaN(startDate.getTime())) return '-';
        
        let endDate;
        if (endStr && endStr.trim() !== '') {
            endDate = new Date(endStr);
        } else {
            endDate = new Date();
        }
        
        if (isNaN(endDate.getTime())) return '-';
        
        startDate.setHours(0,0,0,0);
        endDate.setHours(0,0,0,0);
        const diffTime = endDate.getTime() - startDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        return diffDays >= 0 ? diffDays : 0; 
    };

        const validSheetData = getValidSheetData(sheetData);
        
        const allColumns = ['โครงการ / บ้านเลขที่ / ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];

        const filteredData = validSheetData.filter(row => {
            const rowStatus = safeTrim(row['สถานะ']);
            if (hiddenValues['สถานะ']?.includes(rowStatus)) return false;
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(query)) return false;
            }
            return true;
        });

        const sortOptions = [
            { value: 'default', label: 'ค่าเริ่มต้น' },
            { value: 'start_asc', label: 'เริ่มทำ: เก่า ➔ ใหม่' },
            { value: 'start_desc', label: 'เริ่มทำ: ใหม่ ➔ เก่า' },
            { value: 'finish_asc', label: 'ทำเสร็จเมื่อ: เก่า ➔ ใหม่' },
            { value: 'finish_desc', label: 'ทำเสร็จเมื่อ: ใหม่ ➔ เก่า' },
            { value: 'days_asc', label: 'รวมเวลา: น้อย ➔ มาก' },
            { value: 'days_desc', label: 'รวมเวลา: มาก ➔ น้อย' },
            { value: 'inspect_asc', label: 'การตรวจงาน: น้อย ➔ มาก' },
            { value: 'inspect_desc', label: 'การตรวจงาน: มาก ➔ น้อย' },
        ];

        const sortedData = [...filteredData].sort((a, b) => {
            const progA = constructionProgress[a.id] || {};
            const progB = constructionProgress[b.id] || {};
            switch (sortBy) {
                case 'start_asc': {
                    const da = parseThaiDate(safeTrim(a['เริ่มทำ']));
                    const db = parseThaiDate(safeTrim(b['เริ่มทำ']));
                    return (da ? da.getTime() : Infinity) - (db ? db.getTime() : Infinity);
                }
                case 'start_desc': {
                    const da = parseThaiDate(safeTrim(a['เริ่มทำ']));
                    const db = parseThaiDate(safeTrim(b['เริ่มทำ']));
                    return (db ? db.getTime() : -Infinity) - (da ? da.getTime() : -Infinity);
                }
                case 'finish_asc': {
                    const ta = progA.finishedDate ? new Date(progA.finishedDate).getTime() : Infinity;
                    const tb = progB.finishedDate ? new Date(progB.finishedDate).getTime() : Infinity;
                    return ta - tb;
                }
                case 'finish_desc': {
                    const ta = progA.finishedDate ? new Date(progA.finishedDate).getTime() : -Infinity;
                    const tb = progB.finishedDate ? new Date(progB.finishedDate).getTime() : -Infinity;
                    return tb - ta;
                }
                case 'days_asc': {
                    let da = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate);
                    let db = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    da = da === '-' ? Infinity : Number(da);
                    db = db === '-' ? Infinity : Number(db);
                    return da - db;
                }
                case 'days_desc': {
                    let da = calculateDays(safeTrim(a['เริ่มทำ']), progA.finishedDate);
                    let db = calculateDays(safeTrim(b['เริ่มทำ']), progB.finishedDate);
                    da = da === '-' ? -Infinity : Number(da);
                    db = db === '-' ? -Infinity : Number(db);
                    return db - da;
                }
                case 'inspect_asc': return (progA.inspectionCount || 0) - (progB.inspectionCount || 0);
                case 'inspect_desc': return (progB.inspectionCount || 0) - (progA.inspectionCount || 0);
                default: return 0;
            }
        });

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (column, value) => {
            setHiddenValues(prev => {
                const currentHidden = prev[column] || [];
                return currentHidden.includes(value) ? { ...prev, [column]: currentHidden.filter(v => v !== value) } : { ...prev, [column]: [...currentHidden, value] };
            });
        };

        const handleUpdateProgress = async (rowId, data) => {
            if (!isFirebaseLoaded) return;
            const docRef = window.firebaseAPI.doc(window.firebaseDB, "construction_progress", rowId);
            try { await window.firebaseAPI.setDoc(docRef, data, { merge: true }); } catch(err) {}
        };

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                  <div>
                    <div className="flex items-center gap-3">
                        <h2 className="text-[22px] font-bold text-gray-800 flex items-center">
                            <Icon name="Home" className="mr-3 text-brand" size={26}/> สถานะบ้าน(ยังไม่เสร็จ)
                        </h2>
                        {validSheetData.length > 0 && (
                            <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full flex items-center shadow-sm">
                                <span className="text-[12px] font-bold text-brand">{sortedData.length} รายการ</span>
                            </div>
                        )}
                        <button 
                            onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }}
                            className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm transition-all"
                            title="รีเฟรชข้อมูล"
                        >
                            <Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} />
                        </button>
                    </div>
                  </div>
               </div>

               <div className="bg-white p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 flex flex-col xl:flex-row items-start xl:items-center relative z-20">
                    <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0">ตัวจัดการข้อมูล:</span>
                    <div className="flex flex-wrap gap-2.5 shrink-0">
                        <div className="relative shrink-0">
                            <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                            <input 
                                type="text" 
                                placeholder="ค้นหาโครงการ, เลขที่..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"
                            />
                        </div>
                        {/* 1. เรียงตาม */}
                        <div className="relative shrink-0">
                            <button onClick={() => { setIsSortDropdownOpen(!isSortDropdownOpen); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className={`flex items-center justify-between min-w-[200px] px-4 py-2 bg-white border ${sortBy !== 'default' ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                <div className="flex items-center"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> {sortOptions.find(o => o.value === sortBy)?.label || 'เรียงตาม...'}</div>
                                <Icon name={isSortDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                            </button>
                            {isSortDropdownOpen && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setIsSortDropdownOpen(false)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">เลือกการจัดเรียง</div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {sortOptions.map(opt => (
                                                <label key={opt.value} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="radio" name="sortOption" checked={sortBy === opt.value} onChange={() => { setSortBy(opt.value); setIsSortDropdownOpen(false); }} className="mr-3 w-4 h-4 accent-brand cursor-pointer" />
                                                    <span className={`text-[13px] font-semibold ${sortBy === opt.value ? 'text-brand' : 'text-gray-700'}`}>{opt.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 2. เลือกคอลัมน์ */}
                        <div className="relative shrink-0">
                            <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setIsSortDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm">
                                <Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" />
                            </button>
                            {isDropdownOpen && (
                                <>
                                    <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                    <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                        <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                        <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                            {allColumns.map(col => (
                                                <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                    <input type="checkbox" checked={visibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                    <span className="text-[13px] font-semibold text-gray-700">{col}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 3. สถานะบ้าน */}
                        {uniqueStatuses.length > 0 && (
                            <div className="relative shrink-0">
                                <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between px-4 py-2 bg-white border ${hiddenValues['สถานะ'].length > 0 ? 'border-brand/50 bg-brand/5' : 'border-gray-300'} hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 transition-all shadow-sm`}>
                                    <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะบ้าน 
                                    {hiddenValues['สถานะ'].length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md leading-none">{uniqueStatuses.length - hiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>}
                                    <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                </button>
                                {activeFilterDropdown === 'status' && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                                                <span className="text-[12px] font-bold text-gray-500">ติ๊กออกเพื่อซ่อนข้อมูล</span>
                                                {hiddenValues['สถานะ'].length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'สถานะ': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}
                                            </div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {uniqueStatuses.map(status => (
                                                    <label key={status} className="flex items-center px-3 py-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">
                                                        <input type="checkbox" checked={!hiddenValues['สถานะ'].includes(status)} onChange={() => toggleHideValue('สถานะ', status)} className="mr-3 w-4 h-4 accent-brand rounded cursor-pointer" />
                                                        <span className="text-[13px] font-semibold text-gray-700">{status}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                    <div className="flex-1 overflow-x-auto mt-4 xl:mt-0 xl:ml-4 flex gap-2 horizontal-scrollbar pb-2 xl:pb-0 w-full border-t xl:border-t-0 xl:border-l border-gray-100 pt-3 xl:pt-0 xl:pl-4">
                        {visibleColumns.map((col, idx) => (
                            <span key={col} className="inline-flex items-center px-3 py-1.5 bg-brand/5 text-brand rounded-lg text-[12px] font-bold whitespace-nowrap border border-brand/10">
                                <span className="text-brand/50 mr-1.5">{idx + 1}.</span> {col}
                                <button onClick={() => toggleColumn(col)} className="ml-2 text-brand/50 hover:text-red-500 transition-colors"><Icon name="X" size={12} /></button>
                            </span>
                        ))}
                    </div>
               </div>

               <div className="bg-surface rounded-[20px] shadow-subtle border border-gray-100 flex-1 overflow-hidden flex flex-col z-10">
                 <div className="overflow-auto custom-scrollbar flex-1 relative">
                   <table className="w-full text-left border-collapse min-w-max">
                      <thead className="sticky top-0 z-10 bg-gray-50/95 backdrop-blur-sm shadow-sm border-b border-gray-100">
                          <tr>
                              <th className="p-4 text-[13px] font-bold text-gray-600 text-center w-[60px] border-r border-gray-100">ลำดับ</th>
                              {visibleColumns.map(col => <th key={col} className="p-4 text-[13px] font-bold text-gray-600 tracking-wide">{col}</th>)}
                          </tr>
                      </thead>
                      <tbody>
                          {visibleColumns.length === 0 && validSheetData.length > 0 && <tr><td colSpan={100} className="py-12 text-center text-gray-400 font-medium">กรุณาเลือกคอลัมน์ที่ต้องการแสดงจากตัวจัดการข้อมูลด้านบน</td></tr>}
                          {sortedData.map((row, idx) => {
                              const isDarkBg = ['ยื่นซ้อน', 'ยื่นกู้', 'ประเมิน', 'รอโอน'].includes(safeTrim(row['สถานะ']));
                              let badgeClass = 'bg-white/60 text-gray-800 border border-black/5 shadow-sm';
                              const statusVal = safeTrim(row['สถานะ']);
                              
                              let rowBgStyle = {}; let textClass = 'text-gray-700'; 
                              if (statusVal === 'ว่าง') { rowBgStyle = { backgroundColor: '#fef9c3' }; textClass = 'text-gray-900'; badgeClass = 'bg-white text-yellow-700 border border-yellow-300 shadow-sm'; } 
                              else if (statusVal === 'ยื่นซ้อน') { rowBgStyle = { backgroundColor: '#14532d' }; textClass = 'text-white'; badgeClass = 'bg-white text-[#14532d] shadow-sm font-extrabold border border-transparent'; } 
                              else if (statusVal === 'ยื่นกู้') { rowBgStyle = { backgroundColor: '#166534' }; textClass = 'text-white'; badgeClass = 'bg-white text-[#166534] shadow-sm font-extrabold border border-transparent'; } 
                              else if (statusVal === 'ประเมิน') { rowBgStyle = { backgroundColor: '#0a53a8' }; textClass = 'text-white'; badgeClass = 'bg-white text-[#0a53a8] shadow-sm font-extrabold border border-transparent'; } 
                              else if (statusVal === 'รอโอน') { rowBgStyle = { backgroundColor: '#5a3286' }; textClass = 'text-white'; badgeClass = 'bg-white text-[#5a3286] shadow-sm font-extrabold border border-transparent'; }

                              const rowClassName = `border-b transition-colors hover:opacity-90 ${!isDarkBg ? 'border-gray-50 hover:bg-black/5' : 'border-white/10 bg-[#14532d]'} ${isDarkBg && statusVal === 'ยื่นกู้' ? 'bg-[#166534]' : isDarkBg && statusVal === 'ประเมิน' ? 'bg-[#0a53a8]' : isDarkBg && statusVal === 'รอโอน' ? 'bg-[#5a3286]' : ''}`;
                              const prog = constructionProgress[row.id] || {};

                              return (
                                  <tr key={row.id || idx} style={rowBgStyle} className={rowClassName}>
                                      <td className={`p-4 text-[13px] text-center font-bold border-r ${isDarkBg ? 'border-white/10 bg-black/20 text-white/70' : 'border-gray-50 bg-gray-50/30 text-gray-500'}`}>{idx + 1}</td>
                                      
                                      {visibleColumns.map(col => {
                                          let content = null;
                                          
                                          if (col === 'โครงการ / บ้านเลขที่ / ซอย') {
                                              const proj = safeTrim(row['หมู่บ้าน']);
                                              const hNo = safeTrim(row['บ้านเลขที่']);
                                              const soi = safeTrim(row['ซอย']);
                                              let combined = `${proj} ${hNo}`.trim();
                                              if (soi) combined += ` ${soi}`;
                                              
                                              content = <span className={`text-[14px] font-bold ${!isDarkBg ? 'text-gray-800' : 'text-white'}`}>{combined || '-'}</span>;
                                          } 
                                          else if (col === 'เริ่มทำ') {
                                              const startVal = safeTrim(row['เริ่มทำ']) || '-';
                                              content = <span className={`text-[14px] font-medium ${!isDarkBg ? 'text-gray-700' : 'text-white'}`}>{startVal}</span>;
                                          } 
                                          else if (col === 'ทำเสร็จเมื่อ') {
                                              content = (
                                                  <input 
                                                    type="date" 
                                                    value={prog.finishedDate || ''}
                                                    onChange={(e) => handleUpdateProgress(row.id, { finishedDate: e.target.value })}
                                                    className={`px-3 py-1.5 text-[13px] rounded-lg outline-none transition-all shadow-sm ${isDarkBg ? 'bg-black/30 text-white border border-white/20' : 'bg-white border border-gray-300 focus:border-brand text-gray-700'}`}
                                                  />
                                              );
                                          } 
                                          else if (col === 'รวมเวลา (วัน)' || col === 'ระยะเวลา (วัน)' || col === 'ระยะเวลา' || col === 'รวมทั้งหมด') {
                                              const days = calculateDays(safeTrim(row['เริ่มทำ']), prog.finishedDate);
                                              content = <span className={`text-[14px] font-bold ${!isDarkBg ? 'text-gray-700' : 'text-white'}`}>{days === '-' ? '-' : `${days} วัน`}</span>;
                                          } 
                                          else if (col === 'การตรวจงาน') {
                                              const count = prog.inspectionCount || 0;
                                              content = (
                                                  <div className="flex items-center space-x-3">
                                                      <div className={`flex items-center rounded-lg p-1 border shadow-sm ${isDarkBg ? 'bg-black/30 border-white/20' : 'bg-gray-50 border-gray-200'}`}>
                                                          <button 
                                                              onClick={() => handleUpdateProgress(row.id, { inspectionCount: Math.max(0, count - 1) })}
                                                              disabled={count === 0}
                                                              className={`w-7 h-7 flex items-center justify-center rounded-md disabled:opacity-40 transition-colors shadow-sm ${isDarkBg ? 'bg-white/20 text-white hover:bg-red-500/80' : 'bg-white text-gray-500 hover:text-red-500'}`}
                                                          >
                                                              <Icon name="Minus" size={14} />
                                                          </button>
                                                          <span className={`w-8 text-center text-[13px] font-bold ${isDarkBg ? 'text-white' : 'text-brand'}`}>
                                                              {count}
                                                          </span>
                                                          <button 
                                                              onClick={() => handleUpdateProgress(row.id, { inspectionCount: count + 1 })}
                                                              className={`w-7 h-7 flex items-center justify-center rounded-md transition-colors shadow-sm ${isDarkBg ? 'bg-white/20 text-white hover:bg-white/40' : 'bg-white text-gray-500 hover:text-brand'}`}
                                                          >
                                                              <Icon name="Plus" size={14} />
                                                          </button>
                                                      </div>
                                                      {count > 0 ? (
                                                          <span className="text-[12px] font-bold text-[#065f46] bg-[#d1fae5] border border-[#34d399] px-2.5 py-1 rounded-md shadow-sm whitespace-nowrap">
                                                              ตรวจครั้งที่ {count}
                                                          </span>
                                                      ) : (
                                                          <span className={`text-[12px] font-medium whitespace-nowrap ${isDarkBg ? 'text-white/60' : 'text-gray-400'}`}>
                                                              ยังไม่ได้ตรวจ
                                                          </span>
                                                      )}
                                                  </div>
                                              );
                                          }
                                          else {
                                              content = <span className={`text-[14px] font-medium ${!isDarkBg ? 'text-gray-700' : 'text-white'}`}>{safeTrim(row[col]) || '-'}</span>;
                                          }

                                          return <td key={col} className="p-4 align-middle">{content}</td>;
                                      })}
                                  </tr>
                              )
                          })}
                          {validSheetData.length === 0 && <tr><td colSpan={10} className="py-16 text-center text-gray-400 font-medium">ไม่มีข้อมูลจาก Google Sheet</td></tr>}
                      </tbody>
                   </table>
                 </div>
               </div>
            </div>
        );
    };

    const PostSchedule = ({ sheetData, setManualRefreshKey }) => {
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('startupup_hiddenValues_post');
            return saved ? JSON.parse(saved) : { 'สถานะ': [] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('startupup_visibleColumns_post');
            return saved ? JSON.parse(saved) : ['โครงการ / บ้านเลขที่ / ซอย', 'สถานะบ้าน', 'ลิงก์โพสต์ (Website)'];
        });

        useEffect(() => { localStorage.setItem('startupup_hiddenValues_post', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('startupup_visibleColumns_post', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const validSheetData = getValidSheetData(sheetData);
        
        const allColumns = ['โครงการ / บ้านเลขที่ / ซอย', 'สถานะบ้าน', 'ลิงก์โพสต์ (Website)'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];

        const filteredData = validSheetData.filter(row => {
            const rowStatus = safeTrim(row['สถานะ']);
            if (hiddenValues['สถานะ']?.includes(rowStatus)) return false;
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                const combined = `${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase();
                if (!combined.includes(query)) return false;
            }
            return true;
        });

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (column, value) => {
            setHiddenValues(prev => {
                const currentHidden = prev[column] || [];
                return currentHidden.includes(value) ? { ...prev, [column]: currentHidden.filter(v => v !== value) } : { ...prev, [column]: [...currentHidden, value] };
            });
        };

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                  <div>

                                      })}

    const HouseGallery = ({ houses, sheetData, isFirebaseLoaded }) => {
        const [isAddHouseModalOpen, setIsAddHouseModalOpen] = useState(false);
        const [houseForm, setHouseForm] = useState({ projectName: '', shootDate: '', assignee: '' });
        const [selectedHouse, setSelectedHouse] = useState(null);
        const [activeImageIndex, setActiveImageIndex] = useState(0);
        const [isUploadingImgs, setIsUploadingImgs] = useState(false);
        const [houseSearchQuery, setHouseSearchQuery] = useState('');
        const [isDeleteHouseModalOpen, setIsDeleteHouseModalOpen] = useState(false);

        const handleCreateHouseProject = async (e) => {
            e.preventDefault();
            if (!isFirebaseLoaded) return;
            const { collection, addDoc } = window.firebaseAPI;
            try {
                await addDoc(collection(window.firebaseDB, "houses"), {
                    projectName: houseForm.projectName,
                    shootDate: houseForm.shootDate,
                    assignee: houseForm.assignee,
                    images: [],
                    createdAt: new Date().toISOString()
                });
                setIsAddHouseModalOpen(false);
                setHouseForm({ projectName: '', shootDate: '', assignee: '' });
            } catch (error) { alert("เกิดข้อผิดพลาดในการสร้างโครงการ"); }
        };

        const handleAddImagesToProject = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length || !selectedHouse || !isFirebaseLoaded) return;
            setIsUploadingImgs(true);
            try {
                const newImages = await Promise.all(files.map(file => compressImage(file)));
                const updatedImages = [...(selectedHouse.images || []), ...newImages];
                const { doc, updateDoc } = window.firebaseAPI;
                await updateDoc(doc(window.firebaseDB, "houses", selectedHouse.id), { images: updatedImages });
                setSelectedHouse(prev => ({ ...prev, images: updatedImages }));
            } catch (error) { alert('เกิดข้อผิดพลาดในการอัปโหลดรูปภาพ'); }
            setIsUploadingImgs(false);
        };

        const handleRemoveImageFromProject = async (indexToRemove) => {
            if (!selectedHouse || !isFirebaseLoaded) return;
            const updatedImages = selectedHouse.images.filter((_, idx) => idx !== indexToRemove);
            const { doc, updateDoc } = window.firebaseAPI;
            try {
                await updateDoc(doc(window.firebaseDB, "houses", selectedHouse.id), { images: updatedImages });
                setSelectedHouse(prev => ({ ...prev, images: updatedImages }));
                if (activeImageIndex >= updatedImages.length) setActiveImageIndex(Math.max(0, updatedImages.length - 1));
            } catch(err) { alert("เกิดข้อผิดพลาดในการลบรูปภาพ"); }
        };

        const handleDeleteHouse = async () => {
            if (!selectedHouse || !isFirebaseLoaded) return;
            const { doc, deleteDoc } = window.firebaseAPI;
            try {
                await deleteDoc(doc(window.firebaseDB, "houses", selectedHouse.id));
                setIsDeleteHouseModalOpen(false);
                setSelectedHouse(null);
            } catch (error) { alert("เกิดข้อผิดพลาดในการลบข้อมูล"); }
        };

        const filteredHouses = houses.filter(h => {
            const query = houseSearchQuery.toLowerCase();
            return (h.projectName || '').toLowerCase().includes(query) || (h.assignee || '').toLowerCase().includes(query);
        });

        return (

            <div className="flex-1 p-6 md:p-8 overflow-auto bg-background flex flex-col h-full">

                      <Icon name="Image" size={26} className="mr-3 text-brand"/> รูปบ้านมาใหม่

                                    <span className="text-xs font-medium">ยังไม่มีรูปภาพ</span>

                                        const hNo = safeTrim(row['บ้านเลขที่']);

                                        if (soi) combined += ` ${soi}`;

                                    })}
                                </select>
                                <input type="text" value={houseForm.projectName} onChange={e=>setHouseForm({...houseForm, projectName:e.target.value})} placeholder="หรือพิมพ์ชื่อโครงการใหม่ (ถ้าไม่มีในตัวเลือก)..." className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand text-[14px]" />
                            </div>
                            <div className="mt-4">
                                <label className="block text-[13px] font-bold text-gray-600 mb-1.5">วันที่ไปถ่าย</label>
                                <input type="date" required value={houseForm.shootDate} onChange={e=>setHouseForm({...houseForm, shootDate:e.target.value})} className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand text-[14px]"/>
                            </div>
                            <div className="mt-4">
                                <label className="block text-[13px] font-bold text-gray-600 mb-1.5">ผู้รับผิดชอบ (พิมพ์ชื่อ)</label>
                                <input type="text" required value={houseForm.assignee} onChange={e=>setHouseForm({...houseForm, assignee:e.target.value})} placeholder="ระบุชื่อผู้รับผิดชอบ" className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand text-[14px]"/>
                            </div>
                            <div className="flex justify-end pt-5 border-t border-gray-100 space-x-3 mt-6">
                                <button type="button" onClick={() => setIsAddHouseModalOpen(false)} className="px-5 py-2 text-[14px] font-bold text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">ยกเลิก</button>
                                <button type="submit" className="px-5 py-2 text-[14px] font-bold text-white rounded-lg bg-brand hover:bg-brandLight transition-colors shadow-sm">สร้างโครงการ</button>
                            </div>
                        </form>
                    </div>
                </div>
            )}

            {/* Modal: View & Upload Images */}
            {selectedHouse && !isDeleteHouseModalOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm text-left">
                    <div className="bg-surface rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col md:flex-row shadow-2xl relative border border-gray-100">
                        <button onClick={() => setSelectedHouse(null)} className="absolute top-4 right-4 z-20 w-8 h-8 flex items-center justify-center rounded-full bg-black/50 text-white hover:bg-black/70 backdrop-blur-sm transition-colors">
                            <Icon name="X" size={18}/>
                        </button>
                        
                        {/* Left: Images */}
                        <div className="w-full md:w-1/2 bg-gray-100 flex flex-col shrink-0 border-r border-gray-200">
                            <div className="w-full h-[300px] md:h-[400px] bg-gray-200 flex items-center justify-center relative">
                                {selectedHouse.images && selectedHouse.images.length > 0 ? (
                                    <img src={selectedHouse.images[activeImageIndex]} className="w-full h-full object-contain" alt="House View" />
                                ) : (
                                    <div className="text-gray-400 text-center"><Icon name="Image" size={48} className="mx-auto mb-2 opacity-50"/>ไม่มีรูปภาพ</div>
                                )}
                            </div>
                            {/* Thumbnails */}
                            {selectedHouse.images && selectedHouse.images.length > 1 && (
                                <div className="flex gap-2 p-3 overflow-x-auto horizontal-scrollbar bg-gray-50 border-t border-gray-200">
                                    {selectedHouse.images.map((imgSrc, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => setActiveImageIndex(idx)}
                                            className={`w-16 h-16 rounded-md overflow-hidden shrink-0 border-2 transition-all ${activeImageIndex === idx ? 'border-brand shadow-md scale-105' : 'border-transparent hover:border-brand/50 opacity-80 hover:opacity-100'}`}
                                        >
                                            <img src={imgSrc} className="w-full h-full object-cover" alt={`thumb ${idx}`} />
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Right: Details and Upload */}
                        <div className="w-full md:w-1/2 p-6 md:p-8 flex flex-col bg-white overflow-y-auto custom-scrollbar">
                            <h2 className="text-2xl font-bold text-gray-800 mb-5 leading-tight">{selectedHouse.projectName}</h2>
                            <div className="space-y-3 text-sm mb-8">
                                <div className="flex items-center text-gray-600"><Icon name="User" size={16} className="mr-2 opacity-70"/> <span className="w-20">ผู้รับผิดชอบ:</span> <span className="font-bold text-gray-800 bg-gray-100 px-2.5 py-1 rounded-md">{selectedHouse.assignee}</span></div>
                                <div className="flex items-center text-gray-600"><Icon name="CalendarIcon" size={16} className="mr-2 opacity-70"/> <span className="w-20">วันที่ถ่าย:</span> <span className="font-bold text-gray-800 bg-gray-100 px-2.5 py-1 rounded-md">{getFormattedDateThai(selectedHouse.shootDate)}</span></div>
                            </div>
                            
                            <div className="border-t border-gray-100 pt-6">
                                <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-[12px] cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                                    <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                        {isUploadingImgs ? (
                                            <span className="text-sm font-semibold text-gray-500 flex items-center"><Icon name="RefreshCw" className="animate-spin mr-2" size={16}/> กำลังอัปโหลด...</span>
                                        ) : (
                                            <>
                                                <Icon name="Plus" size={24} className="mb-2 text-brand" />
                                                <p className="text-sm text-gray-500 font-semibold text-center px-4">คลิกเพิ่มรูปภาพ (รวมสูงสุด 20 รูป)</p>
                                            </>
                                        )}
                                    </div>
                                    <input type="file" multiple accept="image/*" className="hidden" onChange={handleAddImagesToProject} disabled={isUploadingImgs || (selectedHouse.images?.length || 0) >= 20} />
                                </label>
                            </div>

                            <div className="mt-auto pt-8 flex justify-end border-t border-gray-100 mt-8">
                                <button onClick={() => setIsDeleteHouseModalOpen(true)} className="flex items-center text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-bold text-sm transition-colors">
                                    <Icon name="Trash" size={16} className="mr-1.5" /> ลบโครงการนี้ทิ้ง
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* Delete House Confirm Modal */}
            {isDeleteHouseModalOpen && (
              <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                  <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Icon name="Trash" size={24}/>
                  </div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบโครงการ</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบข้อมูลบ้าน <b>{selectedHouse?.projectName || 'นี้'}</b> พร้อมรูปภาพทั้งหมดออกจากระบบอย่างถาวรใช่หรือไม่?</p>
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => setIsDeleteHouseModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">ยกเลิก</button>
                    <button onClick={handleDeleteHouse} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700 transition-colors">ลบข้อมูลถาวร</button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
    };

    // ==========================================
    // 4. MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [activeApp, setActiveApp] = useState('calendar');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // Calendar States
      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState([]);
      const [departments, setDepartments] = useState([]); 
      const [selectedUser, setSelectedUser] = useState('All');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingEventId, setEditingEventId] = useState(null);
      const [isDayViewOpen, setIsDayViewOpen] = useState(false);
      const [selectedDayString, setSelectedDayString] = useState('');
      
      const [isDeleteMonthModalOpen, setIsDeleteMonthModalOpen] = useState(false);
      const [deleteMonthText, setDeleteMonthText] = useState('');
      const [isAddDeptModalOpen, setIsAddDeptModalOpen] = useState(false);
      const [newDeptName, setNewDeptName] = useState('');
      const [isAddMemberModalOpen, setIsAddMemberModalOpen] = useState(false);
      const [targetDeptForMember, setTargetDeptForMember] = useState('');
      const [newMemberName, setNewMemberName] = useState('');
      const [isDeleteDeptModalOpen, setIsDeleteDeptModalOpen] = useState(false);
      const [deptToDelete, setDeptToDelete] = useState('');
      const [isDeleteMemberModalOpen, setIsDeleteMemberModalOpen] = useState(false);
      const [memberToDelete, setMemberToDelete] = useState('');
      const [deptOfMemberToDelete, setDeptOfMemberToDelete] = useState('');
      
      const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
      const [contentChecklists, setContentChecklists] = useState({});
      const [constructionProgress, setConstructionProgress] = useState({});
      const [formData, setFormData] = useState({
        type: 'event', date: '', hour: '09', minute: '00', activity: '', note: '', assignee: ''
      });

      // House Gallery States
      const [houses, setHouses] = useState([]);
      
      // Google Sheet Data States
      const [sheetData, setSheetData] = useState([]);
      const [sheetError, setSheetError] = useState(null);
      const [manualRefreshKey, setManualRefreshKey] = useState(0);

      useEffect(() => {
        if (window.firebaseDB) setIsFirebaseLoaded(true);
        else {
          const handleLoad = () => setIsFirebaseLoaded(true);
          window.addEventListener('firebaseLoaded', handleLoad);
          return () => window.removeEventListener('firebaseLoaded', handleLoad);
        }
      }, []);

      useEffect(() => {
        if (!isFirebaseLoaded) return;
        const { collection, onSnapshot, setDoc, doc } = window.firebaseAPI;
        
        const unsubscribeEvents = onSnapshot(collection(window.firebaseDB, "events"), (snapshot) => {
          const loadedEvents = [];
          snapshot.forEach((doc) => loadedEvents.push({ id: doc.id, ...doc.data() }));
          setEvents(loadedEvents);
        });

        const unsubscribeDeps = onSnapshot(collection(window.firebaseDB, "departments"), (snapshot) => {
          if (snapshot.empty) {
            const initial = [
              { id: 'MARKETING', members: ['Peth', 'Beau', 'Noey', 'Ketar', 'Perth', 'Ter', 'Bumb', 'Weerwi'], order: 0 },
              { id: 'SALE', members: ['May', 'Boom', 'Boat'], order: 1 },
              { id: 'วิศวกร', members: ['ไม้'], order: 2 }
            ];
            initial.forEach(async (dept) => {
              try { await setDoc(doc(window.firebaseDB, "departments", dept.id), { members: dept.members, order: dept.order }); } catch(e) {}
            });
          } else {
            const depsArray = [];
            snapshot.forEach((d) => depsArray.push({ id: d.id, ...d.data() }));
            depsArray.sort((a, b) => (a.order || 0) - (b.order || 0));
            setDepartments(depsArray);
          }
        });

        const unsubscribeHouses = onSnapshot(collection(window.firebaseDB, "houses"), (snapshot) => {
          const loadedHouses = [];
          snapshot.forEach((doc) => loadedHouses.push({ id: doc.id, ...doc.data() }));
          setHouses(loadedHouses.reverse());
        });

        const unsubscribeChecklists = onSnapshot(collection(window.firebaseDB, "content_checklists"), (snapshot) => {
          const loaded = {};
          snapshot.forEach((doc) => { loaded[doc.id] = doc.data(); });
          setContentChecklists(loaded);
        });

        const unsubscribeProgress = onSnapshot(collection(window.firebaseDB, "construction_progress"), (snapshot) => {
          const loaded = {};
          snapshot.forEach((doc) => { loaded[doc.id] = doc.data(); });
          setConstructionProgress(loaded);
        });

        const unsubscribeSheet = onSnapshot(collection(window.firebaseDB, "google_sheet_data"), 
          (snapshot) => {
            const loadedData = [];
            snapshot.forEach((doc) => loadedData.push({ id: doc.id, ...doc.data() }));
            setSheetData(loadedData);
            setSheetError(null);
          },
          (error) => {
            console.error("Firebase Read Error:", error);
            setSheetError(error.message);
          }
        );

        return () => { unsubscribeEvents(); unsubscribeDeps(); unsubscribeHouses(); unsubscribeSheet(); unsubscribeChecklists(); unsubscribeProgress(); };
      }, [isFirebaseLoaded, manualRefreshKey]);

      const moveDeptUp = async (index) => {
        if (index === 0 || !isFirebaseLoaded) return;
        const newDeps = [...departments];
        const temp = newDeps[index - 1];
        newDeps[index - 1] = newDeps[index];
        newDeps[index] = temp;
        const { updateDoc, doc } = window.firebaseAPI;
        try {
           await updateDoc(doc(window.firebaseDB, "departments", newDeps[index - 1].id), { order: index - 1 });
           await updateDoc(doc(window.firebaseDB, "departments", newDeps[index].id), { order: index });
        } catch (e) {}
      };

      const moveDeptDown = async (index) => {
        if (index === departments.length - 1 || !isFirebaseLoaded) return;
        const newDeps = [...departments];
        const temp = newDeps[index + 1];
        newDeps[index + 1] = newDeps[index];
        newDeps[index] = temp;
        const { updateDoc, doc } = window.firebaseAPI;
        try {
           await updateDoc(doc(window.firebaseDB, "departments", newDeps[index + 1].id), { order: index + 1 });
           await updateDoc(doc(window.firebaseDB, "departments", newDeps[index].id), { order: index });
        } catch (e) {}
      };

      const moveMemberUp = async (deptIndex, memberIndex) => {
        if (memberIndex === 0 || !isFirebaseLoaded) return;
        const dept = departments[deptIndex];
        const newMembers = [...dept.members];
        const temp = newMembers[memberIndex - 1];
        newMembers[memberIndex - 1] = newMembers[memberIndex];
        newMembers[memberIndex] = temp;
        const { updateDoc, doc } = window.firebaseAPI;
        try { await updateDoc(doc(window.firebaseDB, "departments", dept.id), { members: newMembers }); } catch (e) {}
      };

      const moveMemberDown = async (deptIndex, memberIndex) => {
        if (memberIndex === departments[deptIndex].members.length - 1 || !isFirebaseLoaded) return;
        const dept = departments[deptIndex];
        const newMembers = [...dept.members];
        const temp = newMembers[memberIndex + 1];
        newMembers[memberIndex + 1] = newMembers[memberIndex];
        newMembers[memberIndex] = temp;
        const { updateDoc, doc } = window.firebaseAPI;
        try { await updateDoc(doc(window.firebaseDB, "departments", dept.id), { members: newMembers }); } catch (e) {}
      };

      const handleAddDept = async () => {
        if (!newDeptName.trim() || !isFirebaseLoaded) return;
        const { setDoc, doc } = window.firebaseAPI;
        try {
          await setDoc(doc(window.firebaseDB, "departments", newDeptName.trim()), { members: [], order: departments.length });
          setNewDeptName(''); setIsAddDeptModalOpen(false);
        } catch(e) {}
      };

      const handleAddMember = async () => {
        if (!newMemberName.trim() || !isFirebaseLoaded || !targetDeptForMember) return;
        const dept = departments.find(d => d.id === targetDeptForMember);
        if (!dept) return;
        const newMembers = [...dept.members, newMemberName.trim()];
        const { updateDoc, doc } = window.firebaseAPI;
        try {
          await updateDoc(doc(window.firebaseDB, "departments", targetDeptForMember), { members: newMembers });
          setNewMemberName(''); setIsAddMemberModalOpen(false);
        } catch(e) {}
      };

      const handleDeleteDept = async () => {
        if (!deptToDelete || !isFirebaseLoaded) return;
        const { deleteDoc, doc } = window.firebaseAPI;
        try {
          await deleteDoc(doc(window.firebaseDB, "departments", deptToDelete));
          setIsDeleteDeptModalOpen(false); setDeptToDelete('');
        } catch(e) {}
      };

      const handleDeleteMember = async () => {
        if (!memberToDelete || !deptOfMemberToDelete || !isFirebaseLoaded) return;
        const dept = departments.find(d => d.id === deptOfMemberToDelete);
        if (!dept) return;
        const newMembers = dept.members.filter(m => m !== memberToDelete);
        const { updateDoc, doc } = window.firebaseAPI;
        try {
          await updateDoc(doc(window.firebaseDB, "departments", deptOfMemberToDelete), { members: newMembers });
          setIsDeleteMemberModalOpen(false); setMemberToDelete(''); setDeptOfMemberToDelete('');
        } catch(e) {}
      };

      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => { const day = new Date(year, month, 1).getDay(); return (day + 6) % 7; };
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);
      const startDayIndex = (firstDay + 6) % 7; 
      const totalCells = startDayIndex + daysInMonth;
      const emptyEndCells = (7 - (totalCells % 7)) % 7;

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const goToToday = () => setCurrentDate(new Date());

      const getEventsForDay = (dateStr) => {
        const dayData = events.filter(ev => ev.date === dateStr);
        const filteredEvents = dayData.filter(ev => {
          if (activeApp === 'calendar') {
            if (selectedUser === 'All') return ev.type === 'event'; 
            else return ev.assignee === selectedUser; 
          } else if (activeApp === 'holidays') {
            const isHol = ev.type === 'holiday' || ev.type === 'leave' || ev.type === 'public_holiday';
            if (selectedUser === 'All') return isHol;
            return isHol && ev.assignee === selectedUser;
          }
          return true;
        });

        return {
          normalEvents: filteredEvents.filter(ev => ev.type === 'event').sort((a, b) => a.time.localeCompare(b.time)),
          holidays: filteredEvents.filter(ev => ev.type === 'holiday'),
          leaves: filteredEvents.filter(ev => ev.type === 'leave'),
          publicHolidays: filteredEvents.filter(ev => ev.type === 'public_holiday')
        };
      };

      const handleDayClick = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const { normalEvents, holidays, leaves, publicHolidays } = getEventsForDay(dateStr);
        if (normalEvents.length > 0 || holidays.length > 0 || leaves.length > 0 || publicHolidays.length > 0) {
          setSelectedDayString(dateStr); setIsDayViewOpen(true);
        } else { handleOpenModal(day); }
      };

      const handleOpenModal = (day = null, eventToEdit = null, prefillAssignee = '', prefillType = '') => {
        if (eventToEdit) {
          setFormData({
            type: eventToEdit.type || 'event', date: eventToEdit.date, hour: eventToEdit.time ? eventToEdit.time.split(':')[0] : '09', minute: eventToEdit.time ? eventToEdit.time.split(':')[1] : '00', activity: eventToEdit.activity || '', note: eventToEdit.note || '', assignee: eventToEdit.assignee || ''
          });
          setEditingEventId(eventToEdit.id); setIsModalOpen(true); return;
        }
        let dateStr = day ? `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` : selectedDayString || `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
        let initialType = prefillType || (activeApp === 'holidays' ? 'holiday' : 'event');
        setFormData({ ...formData, type: initialType, date: dateStr, assignee: prefillAssignee || (selectedUser !== 'All' ? selectedUser : ''), activity: '' });
        setEditingEventId(null); setIsModalOpen(true);
      };

      const handleCloseModal = () => {
        setIsModalOpen(false); setEditingEventId(null); setSelectedDayString('');
        setFormData({ type: 'event', date: '', hour: '09', minute: '00', activity: '', note: '', assignee: '' });
      };

      const handleSaveEvent = async (e) => {
        e.preventDefault();
        if (!isFirebaseLoaded) return;
        const eventData = { ...formData, time: (formData.type === 'holiday' || formData.type === 'leave' || formData.type === 'public_holiday') ? '' : `${formData.hour}:${formData.minute}`, activity: formData.type === 'holiday' ? 'วันหยุด' : formData.type === 'leave' ? 'วันลางาน' : formData.type === 'public_holiday' ? 'นักขัตฤกษ์' : formData.activity };
        const { collection, addDoc, updateDoc, doc } = window.firebaseAPI;
        try {
          if (editingEventId) await updateDoc(doc(window.firebaseDB, "events", editingEventId), eventData);
          else await addDoc(collection(window.firebaseDB, "events"), eventData);
        } catch (error) { alert("พบข้อผิดพลาด กรุณาลองใหม่"); }
        handleCloseModal();
      };

      const handleDeleteEvent = async () => {
        if (!isFirebaseLoaded || !editingEventId) return;
        const { doc, deleteDoc } = window.firebaseAPI;
        try { await deleteDoc(doc(window.firebaseDB, "events", editingEventId)); } catch (error) {}
        handleCloseModal();
      };

      const handleDeleteMonth = async () => {
        if (!isFirebaseLoaded) return;
        const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const eventsToDelete = events.filter(ev => ev.date.startsWith(monthPrefix));
        const { doc, deleteDoc } = window.firebaseAPI;
        try { await Promise.all(eventsToDelete.map(ev => deleteDoc(doc(window.firebaseDB, "events", ev.id)))); } catch (error) {}
        setIsDeleteMonthModalOpen(false);
      };

      const renderCalendarTab = () => (
        <div className="flex-1 flex overflow-hidden">
          <div className="w-[240px] bg-white border-r border-gray-200 flex flex-col overflow-hidden hidden md:flex shrink-0">
             <div className="p-5 border-b border-gray-100 flex items-center justify-between shrink-0">
                <span className="font-bold text-gray-800 text-[15px]">ตัวกรองทีมงาน</span>
                <button onClick={() => setIsAddDeptModalOpen(true)} className="text-brand hover:text-brandLight p-1"><Icon name="Plus" size={16}/></button>
             </div>
             <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <button onClick={() => setSelectedUser('All')} className={`w-full text-left px-4 py-2.5 rounded-xl mb-3 text-[14px] font-bold transition-colors ${selectedUser === 'All' ? 'bg-brand/10 text-brand' : 'text-gray-600 hover:bg-gray-50'}`}>ดูทั้งหมด</button>
                
                {departments.map((deptObj, tIdx) => {
                  const dept = deptObj.id;
                  const members = deptObj.members || [];
                  
                  return (
                    <div key={dept} className="mb-4">
                       <div className="px-2 py-1 text-[12px] font-bold text-brand uppercase tracking-widest flex justify-between items-center group">
                          <div className="flex items-center">
                            <Icon name="User" size={14} className="mr-1.5 opacity-40" /> ทีม {dept}
                          </div>
                          <div className="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                             <button onClick={() => moveDeptUp(tIdx)} disabled={tIdx === 0} className="text-gray-400 hover:text-brand disabled:opacity-20 transition-colors"><Icon name="ChevronUp" size={14}/></button>
                             <button onClick={() => moveDeptDown(tIdx)} disabled={tIdx === departments.length - 1} className="text-gray-400 hover:text-brand disabled:opacity-20 transition-colors"><Icon name="ChevronDown" size={14}/></button>
                             <button onClick={() => {setIsAddMemberModalOpen(true); setTargetDeptForMember(dept)}} className="text-gray-400 hover:text-brand transition-colors"><Icon name="Plus" size={14}/></button>

            const { normalEvents, holidays, leaves, publicHolidays } = getEventsForDay(selectedDayString);
            let itemsToShow = normalEvents;
            if (activeApp === 'holidays') itemsToShow = [...holidays, ...leaves, ...publicHolidays, ...normalEvents];
            
            const timeCounts = {};
            itemsToShow.forEach(ev => { if (ev.type === 'event' && ev.time) { timeCounts[ev.time] = (timeCounts[ev.time] || 0) + 1; } });

            return (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                 <div className="bg-surface rounded-2xl w-full max-w-4xl p-6 md:p-8 shadow-2xl flex flex-col border border-gray-100 relative">
                   <button onClick={() => setIsDayViewOpen(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors">
                     <Icon name="X" size={18}/>
                   </button>
                   
                   <div className="mb-6 border-b border-transparent">
                     <div className="inline-block border-b-[3px] border-[#ef4444] pb-2 pr-4">
                       <h3 className="text-xl md:text-2xl font-bold flex items-center text-brand">
                         <Icon name="CalendarIcon" className="mr-3" size={24}/> 
                         กิจกรรมประจำวันที่ {getFormattedDateThai(selectedDayString)}
                       </h3>
                     </div>
                   </div>

                   <div className="max-h-[70vh] overflow-y-auto custom-scrollbar border border-gray-100 rounded-[12px] overflow-hidden">
                     {itemsToShow.length > 0 ? (
                       <table className="w-full text-left border-collapse">
                         <thead>
                           <tr className="bg-gray-50 border-b border-gray-100">
                             <th className="p-4 text-[13px] font-bold text-gray-500 w-[120px]">เวลา</th>
                             <th className="p-4 text-[13px] font-bold text-gray-500 w-[140px]">ผู้รับผิดชอบ</th>
                             <th className="p-4 text-[13px] font-bold text-gray-500 w-[200px]">สิ่งที่ต้องทำ</th>
                             <th className="p-4 text-[13px] font-bold text-gray-500">หมายเหตุ</th>
                           </tr>
                         </thead>
                         <tbody>
                           {itemsToShow.map((ev, idx) => {
                             const isDuplicateTime = ev.type === 'event' && ev.time && timeCounts[ev.time] > 1;

                             return (
                               <tr key={ev.id || idx} onClick={() => {setIsDayViewOpen(false); handleOpenModal(null, ev)}} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                                 <td className="p-4 align-top">
                                    {ev.type !== 'event' ? '-' : (
                                       <span className={`inline-flex px-2.5 py-1 rounded-[6px] text-[13px] font-bold ${isDuplicateTime ? 'border border-[#ef4444] text-[#ef4444] bg-red-50' : 'text-gray-800'}`}>
                                          {ev.time} น.
                                       </span>
                                    )}
                                 </td>
                                 <td className="p-4 align-top font-bold text-[14px] text-gray-700">{ev.assignee}</td>
                                 <td className="p-4 align-top text-[14px] text-gray-700">
                                    <div className="flex items-center">
                                      {ev.type === 'public_holiday' ? <span className="text-yellow-600 font-bold">นักขัตฤกษ์</span>
                                       : ev.type === 'holiday' ? <span className="text-red-500 font-bold">วันหยุด</span> 
                                       : ev.type === 'leave' ? <span className="text-orange-500 font-bold">ลางาน</span>
                                       : <><span className="mr-2">{getActivityIcon(ev.activity)}</span> {ev.activity}</>}
                                    </div>
                                 </td>
                                 <td className="p-4 align-top text-[13px] text-gray-600 whitespace-pre-wrap leading-relaxed">
                                    {ev.note || '-'}
                                 </td>
                               </tr>
                             );
                           })}
                         </tbody>
                       </table>
                     ) : (
                       <div className="py-16 text-center text-gray-400 font-medium">ไม่มีข้อมูลในวันนี้</div>
                     )}
                   </div>
                   
                   <div className="mt-6 flex justify-end items-center space-x-4">
                     <button onClick={() => setIsDayViewOpen(false)} className="px-4 py-2 text-[14px] font-bold text-gray-500 hover:text-gray-800 transition-all">ปิด</button>
                     <button onClick={() => {setIsDayViewOpen(false); handleOpenModal()}} className="px-5 py-2.5 text-[14px] font-bold bg-[#0b3d1b] text-white rounded-lg hover:bg-brandLight transition-colors flex items-center shadow-sm">
                       <Icon name="Plus" size={16} className="mr-1.5" /> เพิ่มข้อมูล
                     </button>
                   </div>
                 </div>
              </div>
            );
          })()}

          {/* Department Modals */}
          {isAddDeptModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-surface rounded-2xl shadow-xl w-full max-w-sm p-6 border border-gray-100">
                <h3 className="text-lg font-bold text-gray-800 mb-4">เพิ่มทีมใหม่</h3>
                <input type="text" value={newDeptName} onChange={(e) => setNewDeptName(e.target.value)} placeholder="ชื่อทีม..." className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-6 outline-none focus:border-brand text-sm" />
                <div className="flex justify-end space-x-2">
                  <button onClick={() => setIsAddDeptModalOpen(false)} className="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-lg">ยกเลิก</button>
                  <button onClick={handleAddDept} className="px-4 py-2 text-sm font-bold bg-brand text-white rounded-lg hover:bg-brandLight transition-colors">บันทึก</button>
                </div>
              </div>
            </div>
          )}

          {isAddMemberModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-surface rounded-2xl shadow-xl w-full max-w-sm p-6 border border-gray-100">
                <h3 className="text-lg font-bold text-gray-800 mb-4">เพิ่มพนักงานทีม {targetDeptForMember}</h3>
                <input type="text" value={newMemberName} onChange={(e) => setNewMemberName(e.target.value)} placeholder="ชื่อพนักงาน..." className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-6 outline-none focus:border-brand text-sm" />
                <div className="flex justify-end space-x-2">
                  <button onClick={() => setIsAddMemberModalOpen(false)} className="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-lg">ยกเลิก</button>
                  <button onClick={handleAddMember} className="px-4 py-2 text-sm font-bold bg-brand text-white rounded-lg hover:bg-brandLight transition-colors">บันทึก</button>
                </div>
              </div>
            </div>
          )}

          {isDeleteDeptModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="Trash" size={24}/>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">ลบทีม {deptToDelete}</h3>
                <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบทีมนี้ใช่หรือไม่?</p>
                <div className="flex justify-center space-x-2">
                  <button onClick={() => setIsDeleteDeptModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                  <button onClick={handleDeleteDept} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700">ยืนยัน</button>
                </div>
              </div>
            </div>
          )}

          {isDeleteMemberModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="User" size={24}/>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">ลบรายชื่อ {memberToDelete}</h3>
                <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบรายชื่อพนักงานนี้ออกจากระบบใช่หรือไม่?</p>
                <div className="flex justify-center space-x-2">
                  <button onClick={() => setIsDeleteMemberModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                  <button onClick={handleDeleteMember} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700">ยืนยัน</button>
                </div>
              </div>
            </div>
          )}

          {isDeleteMonthModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="Trash" size={24}/>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">ลบข้อมูลเดือนนี้</h3>
                <p className="text-sm text-gray-500 mb-5 leading-relaxed">หากต้องการลบ ให้พิมพ์ <b>"ลบข้อมูล"</b></p>
                <input type="text" value={deleteMonthText} onChange={(e) => setDeleteMonthText(e.target.value)} placeholder="ลบข้อมูล" className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-5 outline-none focus:border-red-500 text-center font-bold text-sm" />
                <div className="flex justify-center space-x-2">
                  <button onClick={() => { setIsDeleteMonthModalOpen(false); setDeleteMonthText(''); }} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                  <button onClick={handleDeleteMonth} disabled={deleteMonthText !== 'ลบข้อมูล'} className={`px-5 py-2.5 text-sm font-bold text-white rounded-lg ${deleteMonthText === 'ลบข้อมูล' ? 'bg-red-600 hover:bg-red-700' : 'bg-red-300'}`}>ยืนยัน</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
