                  <h3 className="text-xl font-bold text-gray-800 mb-2">ลบข้อมูลเดือนนี้</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">หากต้องการลบ ให้พิมพ์ <b>"ลบข้อมูล"</b></p>
                  <input type="text" value={deleteMonthText} onChange={(e) => setDeleteMonthText(e.target.value)} placeholder="ลบข้อมูล" className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-5 outline-none focus:border-red-500 text-center font-bold text-sm" />
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => { setIsDeleteMonthModalOpen(false); setDeleteMonthText(''); }} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                    <button onClick={handleDeleteMonth} disabled={deleteMonthText !== 'ลบข้อมูล'} className={`px-5 py-2.5 text-sm font-bold text-white rounded-lg ${deleteMonthText === 'ลบข้อมูล' ? 'bg-red-600 hover:bg-red-700' : 'bg-red-300'}`}>ยืนยัน</button>
                  </div>
                </div>
              </div>
            )}

            {/* Modal ดูรายละเอียดการลา */}
            {leaveDetailsData && (() => {
              const titleType = leaveDetailsData.type === 'all' ? 'การลางานทั้งหมด' : (leaveDetailsData.type === 'ไม่ระบุ' ? 'การลาที่รอระบุประเภท' : leaveDetailsData.type);
              
              return (
              <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-surface rounded-2xl shadow-xl w-full max-w-md flex flex-col border border-gray-100 overflow-hidden max-h-[85vh]">
                  <div className="flex justify-between items-center p-4 md:p-5 border-b border-gray-100 bg-gray-50 shrink-0">
                    <h3 className="text-[16px] font-bold text-gray-800 flex items-center">
                      <Icon name="CalendarIcon" className="mr-2 text-brand" size={18} /> 
                      ประวัติ{titleType} : {leaveDetailsData.empName}
                    </h3>
                    <button onClick={() => setLeaveDetailsData(null)} className="p-1.5 text-gray-400 hover:bg-gray-200 rounded-full transition-colors"><Icon name="X" size={16}/></button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar bg-background">
                    {leaveDetailsData.leaves.length > 0 ? (
                      <div className="space-y-3">
                        {leaveDetailsData.leaves.map((lv, idx) => {
                           const badgeStyle = lv.leaveType ? 'bg-orange-100 text-orange-800 border-orange-200' : 'bg-red-100 text-red-800 border-red-200';
                           const badgeLabel = lv.leaveType || 'รอระบุประเภท';
                           
                           return (
                              <div key={idx} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex flex-col gap-2 relative group">
                                <div className="flex justify-between items-start">
                                  <span className="text-[14px] font-extrabold text-brand flex items-center"><Icon name="CalendarIcon" size={14} className="mr-1.5 text-brand/70"/>{getFormattedDateThai(lv.date)}</span>
                                  <span className={`text-[11px] font-bold px-2 py-0.5 rounded border ${badgeStyle}`}>{badgeLabel} {lv.leaveDuration === 'half' ? '(ครึ่งวัน)' : ''}</span>
                                </div>
                                <div className="text-[13px] text-gray-600 mt-1 bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                                  <span className="font-bold text-gray-700">หมายเหตุ: </span>
                                  {lv.image && (
                                   <div className="mt-2.5 flex flex-col items-start border-t border-gray-100 pt-2.5">
                                      <span className="text-[11px] font-bold text-gray-500 mb-1">เอกสารแนบ:</span>
                                      <img src={lv.image} onClick={() => setFullScreenImg(lv.image)} className="h-16 w-16 object-cover rounded-xl border border-gray-200 cursor-pointer hover:shadow-md transition-all hover:opacity-80" alt="ใบลา" />
                                   </div>
                                )}
                                  {lv.note ? <span className="whitespace-pre-wrap leading-relaxed">{lv.note}</span> : <span className="text-gray-400 italic">ไม่มีการระบุหมายเหตุเพิ่มเติม</span>}
                                </div>
                                <button onClick={() => { setLeaveDetailsData(null); handleOpenModal(null, lv); }} className="absolute bottom-4 right-4 text-gray-400 hover:text-brand bg-white p-1 rounded-md transition-colors opacity-0 group-hover:opacity-100 shadow-sm" title="แก้ไข">
                                   <Icon name="Edit" size={14} />
                                </button>
                              </div>
                           );
                        })}
                      </div>
                    ) : (
                      <div className="py-12 flex flex-col items-center text-center text-gray-400 text-[13px] bg-white rounded-xl border border-dashed border-gray-200">
                         <Icon name="CheckSquare" size={32} className="mb-2 opacity-30" />
                         ไม่มีประวัติในหมวดหมู่นี้ค่ะ
                      </div>
                    )}
                  </div>
                </div>
              </div>
              );
            })()}

          </div>
          {/* 💡 หน้าต่างสรุปรายละเอียดกิจกรรม/การลา (แบบอ่านอย่างเดียว) */}
            {viewingEvent && (
              <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                <div className="bg-white rounded-[24px] shadow-2xl w-full max-w-sm overflow-hidden border border-gray-100 animate-[slideUp_0.3s_ease-out]">
                  
                  {/* หัวสีตามประเภท */}
                  <div className={`p-6 text-center relative ${viewingEvent.type === 'leave' ? 'bg-orange-500' : 'bg-brand'}`}>
                    <button onClick={() => setViewingEvent(null)} className="absolute top-4 right-4 text-white/70 hover:text-white transition-colors"><Icon name="X" size={24} /></button>
                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg">
                      <Icon name={viewingEvent.type === 'leave' ? 'CalendarIcon' : 'Clock'} size={32} className={viewingEvent.type === 'leave' ? 'text-orange-500' : 'text-brand'} />
                    </div>
                    <h3 className="text-xl font-black text-white">{viewingEvent.type === 'leave' ? 'แจ้งข้อมูลการลา' : 'รายละเอียดนัดหมาย'}</h3>
                  </div>

                  <div className="p-6 space-y-5">
                    {/* ชื่อผู้ลา/ผู้รับผิดชอบ */}
                    <div className="text-center">
                      <p className="text-[14px] font-bold text-gray-400 uppercase tracking-widest">ผู้แจ้งเรื่อง</p>
                      <p className="text-[20px] font-black text-gray-800">{viewingEvent.assignee}</p>
                    </div>

                    <div className="bg-gray-50 rounded-2xl p-5 border border-gray-100 space-y-4 shadow-inner">
                      <div className="flex justify-between items-center border-b border-gray-200 pb-3">
                        <span className="text-[13px] font-bold text-gray-500">ประเภท</span>
                        <span className={`text-[14px] font-black ${viewingEvent.type === 'leave' ? 'text-orange-600' : 'text-brand'}`}>
                          {viewingEvent.activity}
                        </span>
                      </div>
                      <div className="flex justify-between items-center border-b border-gray-200 pb-3">
                        <span className="text-[13px] font-bold text-gray-500">วันที่</span>
                        <span className="text-[14px] font-bold text-gray-800">{getFormattedDateThai(viewingEvent.date)}</span>
                      </div>
                      {viewingEvent.time && (
                        <div className="flex justify-between items-center border-b border-gray-200 pb-3">
                          <span className="text-[13px] font-bold text-gray-500">เวลา</span>
                          <span className="text-[14px] font-bold text-gray-800">{viewingEvent.time} น.</span>
                        </div>
                      )}
                      <div className="flex flex-col gap-1">
                        <span className="text-[13px] font-bold text-gray-500">หมายเหตุ / เหตุผล</span>
                        <p className="text-[14px] text-gray-700 leading-relaxed bg-white p-3 rounded-xl border border-gray-100 min-h-[60px]">
                          {viewingEvent.note || '- ไม่ระบุ -'}
                        </p>
                      </div>
                      
                      {/* รูปแนบถ้ามี */}
                      {viewingEvent.image && (
                        <div className="flex flex-col gap-2 pt-2">
                          <span className="text-[13px] font-bold text-gray-500">หลักฐานแนบ</span>
                          <img src={viewingEvent.image} onClick={() => setFullScreenImg(viewingEvent.image)} className="w-full h-32 object-cover rounded-xl border border-gray-200 cursor-pointer hover:opacity-90 transition-opacity shadow-sm" alt="หลักฐาน" />
                        </div>
                      )}
                    </div>

                    <div className="flex gap-2">
                      <button onClick={() => setViewingEvent(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-[14px] transition-colors">ปิด</button>
                      <button onClick={() => { setViewingEvent(null); handleOpenModal(null, viewingEvent); }} className="flex-1 py-3 bg-gray-800 hover:bg-black text-white rounded-xl font-bold text-[14px] transition-colors flex items-center justify-center gap-2">
                        <Icon name="Edit" size={16} /> แก้ไขข้อมูล
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          {fullScreenImg && (
                <div className="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-4 backdrop-blur-sm" onClick={() => setFullScreenImg(null)}>
                    <button className="absolute top-4 right-4 sm:top-6 sm:right-6 text-white bg-white/10 p-2.5 rounded-full hover:bg-red-500 transition-colors shadow-lg border border-white/20 z-10"><Icon name="X" size={20} /></button>
                    <img src={fullScreenImg} className="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl" onClick={(e) => e.stopPropagation()} alt="Full Screen" />
                </div>
            )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    
async function sendNotification(leaveData) {
    try {
        await fetch('/api/trigger', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'leave',
                data: leaveData
            })
        });
        console.log("Notification sent!");
    } catch (e) {
        console.error("Notification failed", e);
    }
}
  </script>
</body>
</html>
