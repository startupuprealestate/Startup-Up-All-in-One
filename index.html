    .init-splash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background-color: #0b3d1b; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    const firebaseConfig = { apiKey: "AIzaSyDYhao1y-8YpWHsjualiimZc8CJei7xbDY", authDomain: "startupuprealestate-e4b0a.firebaseapp.com", projectId: "startupuprealestate-e4b0a", storageBucket: "startupuprealestate-e4b0a.firebasestorage.app", messagingSenderId: "966000130004", appId: "1:966000130004:web:5318ddaf6d2225b0cc8841" };

</head>
<body class="text-gray-800 transition-colors duration-200">

    const Icon = ({ name, size = 20, className = '', ...props }) => {
      const icons = {
        ChevronLeft: '<path d="m15 18-6-6 6-6"/>', ChevronRight: '<path d="m9 18 6-6-6-6"/>', ChevronUp: '<path d="m18 15-6-6-6 6"/>', ChevronDown: '<path d="m6 9 6 6 6-6"/>',

        Sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
        Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>', Plus: '<path d="M5 12h14"/><path d="M12 5v14"/>', Minus: '<path d="M5 12h14"/>',
        Search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
        CalendarIcon: '<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>',
        MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
        FileSignature: '<path d="M20 19.5v.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h5.5"/><path d="M8 18h1"/><path d="M18.4 9.6a2 2 0 1 1 3 3L17 17l-4 1 1-4Z"/>',
        Home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        Video: '<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>',
        ListTodo: '<rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>',
        User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
        CheckSquare: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
        Check: '<polyline points="20 6 9 17 4 12"/>',
        Trash: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
        Building: '<rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/>',
        MessageCircle: '<path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>',
        Image: '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
        Bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
        Send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
        RefreshCw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
        Square: '<rect width="18" height="18" x="3" y="3" rx="2"/>',
        Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
        Eye: '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
        Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
        Edit: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
        Bed: '<path d="M3 20v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8"/><path d="M5 10V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/><path d="M3 14h18"/>',
        Bath: '<path d="M9 6 6.5 9.5 3 10l1.46 3.16M15 6l2.5 3.5L21 10l-1.46 3.16"/><path d="M2 12h20"/><path d="M4 12v4a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-4"/><path d="M12 7v5"/><path d="M12 2a2 2 0 0 0-2 2c0 1.1.9 2 2 2h.5"/>',
        Maximize: '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>'
      };
      return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: icons[name] }} {...props} />;
    };

    const getActivityIcon = (a) => {
      switch(a) {
        case 'โอนบ้าน': case 'เปิดบ้าน': return <Icon name="Home" size={14} className="mr-1.5 inline-block text-gray-500" />;
        case 'เซ็นสัญญายื่นสินกู้': return <Icon name="FileSignature" size={14} className="mr-1.5 inline-block text-gray-500" />;
        case 'เซ็นสัญญารับบ้าน': case 'ตรวจบ้าน': return <Icon name="CheckSquare" size={14} className="mr-1.5 inline-block text-gray-500" />;
        case 'ถ่ายคลิปหรือคอนเทนต์': return <Icon name="Video" size={14} className="mr-1.5 inline-block text-gray-500" />;
        default: return <Icon name="ListTodo" size={14} className="mr-1.5 inline-block text-gray-500" />;
      }
    };

    const MAIN_MENUS = [
      { id: 'calendar', label: 'ปฏิทินการทำงาน', icon: 'CalendarIcon' }, { id: 'holidays', label: 'ปฏิทินวันหยุด', icon: 'CalendarIcon' },
      { id: 'content', label: 'เช็คลิสต์คอนเทนต์', icon: 'CheckSquare' }, { id: 'schedule', label: 'สถานะบ้าน(ยังไม่เสร็จ)', icon: 'Home' },
      { id: 'post', label: 'ตารางโพสต์บ้าน', icon: 'FileSignature' }, { id: 'gallery', label: 'รูปบ้านมาใหม่', icon: 'Image' },
      { id: 'company', label: 'ข้อมูลบริษัท', icon: 'Building' }, { id: 'ai', label: 'AI ผู้ช่วยบริษัท', icon: 'MessageCircle' },
    ];

    const ACTIVITIES = ['เปิดบ้าน', 'เซ็นสัญญายื่นสินกู้', 'เซ็นสัญญารับบ้าน', 'โอนบ้าน', 'ตรวจบ้าน', 'ถ่ายคลิปหรือคอนเทนต์', 'อื่นๆ'];
    const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
    const DIRECTIONS = ['เหนือ', 'ตะวันออกเฉียงเหนือ', 'ตะวันออก', 'ตะวันออกเฉียงใต้', 'ใต้', 'ตะวันตกเฉียงใต้', 'ตะวันตก', 'ตะวันตกเฉียงเหนือ'];
    const HOURS = Array.from({ length: 24 }, (_, i) => i.toString().padStart(2, '0'));
    const MINUTES = Array.from({ length: 60 }, (_, i) => i.toString().padStart(2, '0'));

    const compressImage = (f) => new Promise((res) => {
        const reader = new FileReader(); reader.readAsDataURL(f);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                let w = img.width, h = img.height;
                if (w > h) { if (w > 800) { h *= 800 / w; w = 800; } } else { if (h > 800) { w *= 800 / h; h = 800; } }
                cvs.width = w; cvs.height = h; ctx.drawImage(img, 0, 0, w, h); res(cvs.toDataURL('image/jpeg', 0.6));
            };
        };
    });

    const safeTrim = (v) => v ? String(v).trim() : '';
    const getValidSheetData = (d) => d.filter(r => r.id !== 'test_ping' && r['หมู่บ้าน'] !== 'Connected OK!' && Object.keys(r).some(k => k !== 'id' && safeTrim(r[k]) !== '') && (safeTrim(r['หมู่บ้าน']) || safeTrim(r['บ้านเลขที่']))).sort((a, b) => (parseInt(a.id.replace('row_', '')) || 0) - (parseInt(b.id.replace('row_', '')) || 0));
    const getFormattedDateThai = (dStr) => { if (!dStr) return ''; const [y, m, d] = dStr.split('-'); return `${parseInt(d, 10)} ${MONTHS_TH[parseInt(m, 10) - 1]} ${parseInt(y, 10) + 543}`; };
    const parseThaiDate = (dStr) => {
        if (!dStr) return null; const s = String(dStr).trim();
        if (s.includes('/')) {
            const p = s.split('/');
            if (p.length >= 3) { let d=parseInt(p[0],10), m=parseInt(p[1],10), y=parseInt(p[2],10); if(y>2500) y-=543; else if(y<100) y+=2000; return new Date(y, m-1, d); }
        }
        return new Date(s);
    };
    const calculateDays = (sStr, eStr) => {
        const sD = parseThaiDate(sStr); if (!sD || isNaN(sD.getTime())) return '-';
        let eD = (eStr && eStr.trim() !== '') ? new Date(eStr) : new Date(); if (isNaN(eD.getTime())) return '-';
        sD.setHours(0,0,0,0); eD.setHours(0,0,0,0);
        const diff = Math.floor((eD.getTime() - sD.getTime()) / (1000*60*60*24)); return diff >= 0 ? diff : 0; 
    };
    const formatPriceInput = (val) => {
        if (!val) return ''; const raw = String(val).replace(/,/g, '');
        if (!isNaN(raw) && raw.trim() !== '') { const p = raw.split('.'); p[0] = parseInt(p[0] || 0, 10).toLocaleString('en-US'); return p.length > 1 ? `${p[0]}.${p[1]}` : p[0]; }
        return val;
    };
    const getAssignmentDateInfo = () => {
        const now = new Date(); if (now.getHours() < 9) now.setDate(now.getDate() - 1);
        const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
        return { dateStr: `${y}-${m}-${d}`, displayStr: `${parseInt(d, 10)} ${MONTHS_TH[parseInt(m, 10) - 1]} ${y + 543}` };
    };
    const getDaysAgo = (dStr, tStr) => {
        const d = new Date(dStr); d.setHours(0,0,0,0); const [y, m, day] = tStr.split('-'); const t = new Date(y, m-1, day); t.setHours(0,0,0,0);
        return Math.floor((t.getTime() - d.getTime()) / (1000*60*60*24));
    };

    const getRowStyleClasses = (s) => {
        const br = "bg-white hover:bg-gray-50 cursor-pointer transition-colors";
        if (s === 'ว่าง') return { row: br, badge: "bg-yellow-100 text-yellow-800 border border-yellow-200" };
        if (s === 'ยื่นซ้อน' || s === 'ยื่นซ้อนได้') return { row: br, badge: "bg-[#14532d] text-white shadow-sm font-extrabold" };
        if (s === 'ยื่นกู้') return { row: br, badge: "bg-[#166534] text-white shadow-sm font-extrabold" };
        if (s === 'ประเมิน') return { row: br, badge: "bg-[#0a53a8] text-white shadow-sm font-extrabold" };
        if (s === 'รอโอน') return { row: br, badge: "bg-[#5a3286] text-white shadow-sm font-extrabold" };
        return { row: br, badge: "bg-gray-100 text-gray-600 border border-gray-200" };
    };

    const getAvatarColor = (n) => {
        switch(n.toLowerCase()) {
            case 'เพจกลาง': return 'bg-red-500 text-white border-red-600'; case 'ketar': return 'bg-purple-500 text-white border-purple-600'; 
            case 'noey': return 'bg-green-500 text-white border-green-600'; case 'may': return 'bg-pink-200 text-pink-800 border-pink-300'; 
            case 'boom': return 'bg-red-800 text-white border-red-900'; case 'boat': return 'bg-blue-300 text-blue-900 border-blue-400'; 
            default: return 'bg-gray-200 text-gray-700 border-gray-300';
        }
    };

    const getAvatarLetter = (n) => n === 'เพจกลาง' ? 'ก' : n.charAt(0).toUpperCase();

    const DatePickerFixed = ({ value, onChange, className, required }) => {
        const inputRef = useRef(null);
        const displayValue = value ? value.split('-').reverse().join('/') : '';
        const cleanedClassName = className ? className.replace('text-gray-700', '') : '';
        
        return (
            <div 
                className={`relative flex items-center overflow-hidden cursor-pointer ${cleanedClassName} focus-within:ring-1 focus-within:ring-brand focus-within:border-brand`}
                onClick={() => {
                    if (inputRef.current) {
                        try { inputRef.current.showPicker(); } catch(e) { inputRef.current.focus(); }
                    }
                }}
            >
                <input
                    ref={inputRef}
                    type="date"
                    value={value || ''}
                    onChange={onChange}
                    required={required}
                    className="absolute inset-0 w-full h-full cursor-pointer z-10 date-picker-overlay"
                />
                <div className={`w-full pointer-events-none flex items-center h-full ${className && className.includes('text-center') ? 'justify-center' : 'justify-start'} ${value ? 'text-gray-800' : 'text-gray-400 font-medium'}`}>
                    {displayValue || 'dd/mm/yyyy'}
                </div>
            </div>
        );
    };

    // --- CHECKBOX COMPONENTS ---
    const CheckboxItem = ({ rowId, taskKey, label, checklist, isFirebaseLoaded }) => {
        const isChecked = !!checklist[taskKey];
        return (
            <label className="flex items-center space-x-3 cursor-pointer group w-fit" onClick={(e) => e.stopPropagation()}>
                <input type="checkbox" checked={isChecked} onChange={async (e) => {
                    if (!isFirebaseLoaded) return;
                    try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "content_checklists", rowId), { [taskKey]: e.target.checked }, { merge: true }); } catch(err) {}
                }} className="w-[18px] h-[18px] accent-brand rounded border-gray-300 cursor-pointer" />
                <span className={`text-[14px] font-medium transition-colors ${isChecked ? 'text-gray-400 line-through' : 'text-gray-700 group-hover:text-brand'}`}>{label}</span>
            </label>
        );
    };

    const OtherCheckboxItem = ({ rowId, checklist, isFirebaseLoaded }) => {
        const isChecked = !!checklist['other_checked'];
        const [text, setText] = useState(checklist['other_text'] || '');
        useEffect(() => { setText(checklist['other_text'] || ''); }, [checklist['other_text']]);
        const handleTextBlur = async () => { if (!isFirebaseLoaded) return; try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "content_checklists", rowId), { other_text: text }, { merge: true }); } catch(e) {} };

        return (
            <div className="flex flex-col space-y-2 mt-2" onClick={(e) => e.stopPropagation()}>
                <label className="flex items-center space-x-3 cursor-pointer group w-fit">
                    <input type="checkbox" checked={isChecked} onChange={async (e) => {
                        if (!isFirebaseLoaded) return;
                        await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "content_checklists", rowId), { other_checked: e.target.checked }, { merge: true });
                    }} className="w-[18px] h-[18px] accent-brand rounded border-gray-300 cursor-pointer" />

        const [isSortDropdownOpen, setIsSortDropdownOpen] = useState(false);
        const [sortBy, setSortBy] = useState('default');
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [showFilters, setShowFilters] = useState(false);
        
        // เพิ่ม State สำหรับจัดการประวัติ
        const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
        const [historyToDelete, setHistoryToDelete] = useState(null);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('s_h_val_const_v6');
            return saved ? JSON.parse(saved) : { 'สถานะ': ['ว่าง', 'ยื่นซ้อน', 'ยื่นซ้อนได้', 'ยื่นกู้', 'ประเมิน', 'รอโอน', 'โอนแล้ว', 'ขายแล้ว'], 'Website': ['ฝากขาย'] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('s_v_col_const_v6');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        });

        useEffect(() => { localStorage.setItem('s_h_val_const_v6', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('s_v_col_const_v6', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const validSheetData = getValidSheetData(sheetData);
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'เริ่มทำ', 'ทำเสร็จเมื่อ', 'รวมเวลา (วัน)', 'การตรวจงาน'];
        const uniqueStatuses = [...new Set(validSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(validSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const filteredData = validSheetData.filter(row => {
            if (hiddenValues['สถานะ']?.includes(safeTrim(row['สถานะ']))) return false;
            if (hiddenValues['Website']?.includes(safeTrim(row['Website']))) return false;
            if (searchQuery && !`${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            return true;
        });

        const sortOptions = [
            { value: 'default', label: 'ค่าเริ่มต้น' }, { value: 'start_asc', label: 'เริ่มทำ: เก่า ➔ ใหม่' }, { value: 'start_desc', label: 'เริ่มทำ: ใหม่ ➔ เก่า' },
            { value: 'finish_asc', label: 'ทำเสร็จเมื่อ: เก่า ➔ ใหม่' }, { value: 'finish_desc', label: 'ทำเสร็จเมื่อ: ใหม่ ➔ เก่า' },
            { value: 'days_asc', label: 'รวมเวลา: น้อย ➔ มาก' }, { value: 'days_desc', label: 'รวมเวลา: มาก ➔ น้อย' }
        ];

        const sortedData = [...filteredData].sort((a, b) => {
            const progA = constructionProgress[a.id] || {}, progB = constructionProgress[b.id] || {};
            switch (sortBy) {
                case 'start_asc': return (parseThaiDate(safeTrim(a['เริ่มทำ']))?.getTime()||Infinity) - (parseThaiDate(safeTrim(b['เริ่มทำ']))?.getTime()||Infinity);
                case 'start_desc': return (parseThaiDate(safeTrim(b['เริ่มทำ']))?.getTime()||-Infinity) - (parseThaiDate(safeTrim(a['เริ่มทำ']))?.getTime()||-Infinity);
                case 'finish_asc': return (progA.finishedDate ? new Date(progA.finishedDate).getTime() : Infinity) - (progB.finishedDate ? new Date(progB.finishedDate).getTime() : Infinity);
                case 'finish_desc': return (progB.finishedDate ? new Date(progB.finishedDate).getTime() : -Infinity) - (progA.finishedDate ? new Date(progA.finishedDate).getTime() : -Infinity);
                default: return 0;
            }
        });

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (col, val) => setHiddenValues(prev => {
            const arr = prev[col] || [];
            return { ...prev, [col]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
        });

        const handleUpdateProgress = async (rowId, data) => {
            if (!isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "construction_progress", rowId), data, { merge: true }); } catch(err) {}
        };

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                    <div className="flex items-center gap-3">
                        <h2 className="text-[22px] font-bold text-gray-800 flex items-center"><Icon name="Home" className="mr-3 text-brand" size={26}/> สถานะบ้าน(ยังไม่เสร็จ)</h2>
                        {validSheetData.length > 0 && <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full shadow-sm"><span className="text-[12px] font-bold text-brand">{sortedData.length} รายการ</span></div>}
                        <button onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }} className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm transition-all"><Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} /></button>
                        <button onClick={() => setIsHistoryModalOpen(true)} className="ml-1 px-3 py-1.5 text-brand bg-brand/10 border border-brand/20 rounded-lg shadow-sm hover:bg-brand/20 transition-all font-bold text-[13px] flex items-center">
                            <Icon name="Clock" size={14} className="mr-1.5" /> ประวัติ
                        </button>
                    </div>
               </div>

               <div className="bg-white p-4 xl:p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 relative z-20">
                    <div className="flex justify-between items-center xl:hidden cursor-pointer" onClick={() => setShowFilters(!showFilters)}>
                        <div className="flex items-center text-[14px] font-bold text-gray-700"><Icon name="Search" size={16} className="mr-2 text-brand" /> ค้นหาและจัดการข้อมูล</div>
                        <div className="bg-gray-50 p-1.5 rounded-lg text-gray-500"><Icon name={showFilters ? "ChevronUp" : "ChevronDown"} size={16} /></div>
                    </div>

                    <div className={`flex-col xl:flex-row items-start xl:items-center w-full ${showFilters ? 'flex mt-4' : 'hidden xl:flex'}`}>
                        <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0 hidden xl:block">ตัวจัดการข้อมูล:</span>
                        <div className="flex flex-wrap gap-2.5 shrink-0 w-full xl:w-auto">
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                <input type="text" placeholder="ค้นหาโครงการ, เลขที่..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full sm:w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand transition-all text-[13px] shadow-sm"/>
                            </div>
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <button onClick={() => { setIsSortDropdownOpen(!isSortDropdownOpen); setIsDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-full sm:min-w-[200px] px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm"><div className="flex items-center"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> {sortOptions.find(o => o.value === sortBy)?.label || 'เรียงตาม...'}</div><Icon name={isSortDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" /></button>
                                {isSortDropdownOpen && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setIsSortDropdownOpen(false)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">เลือกการจัดเรียง</div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {sortOptions.map(opt => (
                                                    <label key={opt.value} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="radio" checked={sortBy === opt.value} onChange={() => { setSortBy(opt.value); setIsSortDropdownOpen(false); }} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{opt.label}</span></label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setIsSortDropdownOpen(false); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-full sm:w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 shadow-sm"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" /></button>
                                {isDropdownOpen && (
                                    <>
                                        <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                        <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                            <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                            <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                {allColumns.map(col => (
                                                    <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={visibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{col}</span></label>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                            {uniqueStatuses.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between w-full px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm ${hiddenValues['สถานะ']?.length > 0 ? 'border-brand/50 bg-brand/5' : ''}`}>
                                        <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะ {hiddenValues['สถานะ']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md">{uniqueStatuses.length - hiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>} <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                    </button>
                                    {activeFilterDropdown === 'status' && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="text-[12px] font-bold text-gray-500">ซ่อน/แสดง</span>{hiddenValues['สถานะ']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'สถานะ': []}))} className="text-[11px] text-brand hover:underline font-bold">แสดงทั้งหมด</button>}</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {uniqueStatuses.map(st => (
                                                        <label key={st} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={!hiddenValues['สถานะ']?.includes(st)} onChange={() => toggleHideValue('สถานะ', st)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{st}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}
                            {uniqueWebsites.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'website' ? null : 'website'); setIsDropdownOpen(false); setIsSortDropdownOpen(false); }} className={`flex items-center justify-between w-full px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm ${hiddenValues['Website']?.length > 0 ? 'border-brand/50 bg-brand/5' : ''}`}>
                                        <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> Website {hiddenValues['Website']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md">{uniqueWebsites.length - hiddenValues['Website'].length}/{uniqueWebsites.length}</span>} <Icon name={activeFilterDropdown === 'website' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                    </button>
                                    {activeFilterDropdown === 'website' && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="text-[12px] font-bold text-gray-500">ซ่อน/แสดง</span>{hiddenValues['Website']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'Website': []}))} className="text-[11px] text-brand font-bold">แสดงทั้งหมด</button>}</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {uniqueWebsites.map(web => (
                                                        <label key={web} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={!hiddenValues['Website']?.includes(web)} onChange={() => toggleHideValue('Website', web)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{web}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                        <div className="flex-1 overflow-x-auto mt-4 xl:mt-0 xl:ml-4 flex gap-2 horizontal-scrollbar pb-2 xl:pb-0 w-full border-t xl:border-t-0 xl:border-l border-gray-100 pt-3 xl:pt-0 xl:pl-4">
                            {visibleColumns.map((col, idx) => (
                                <span key={col} className="inline-flex items-center px-3 py-1.5 bg-brand/5 text-brand rounded-lg text-[12px] font-bold whitespace-nowrap border border-brand/10"><span className="text-brand/50 mr-1.5">{idx + 1}.</span> {col} <button onClick={() => toggleColumn(col)} className="ml-2 text-brand/50 hover:text-red-500"><Icon name="X" size={12} /></button></span>
                            ))}
                        </div>
                    </div>
               </div>

               <div className="bg-surface rounded-[20px] shadow-sm border border-gray-100 flex-1 overflow-hidden flex flex-col z-10">
                 <div className="overflow-auto custom-scrollbar flex-1 relative strict-scroll">
                   <table className="w-full text-left border-collapse min-w-max">
                      <thead className="sticky top-0 z-10 bg-gray-50/90 backdrop-blur-md shadow-sm border-b border-gray-100">
                        <tr>
                          <th className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider text-center border-r border-gray-100">ลำดับ</th>
                          {visibleColumns.map(col => <th key={col} className="py-4 px-5 text-[12px] font-extrabold text-gray-400 uppercase tracking-wider border border-gray-200">{col}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {visibleColumns.length === 0 && validSheetData.length > 0 && <tr><td colSpan={100} className="py-12 text-center text-gray-400 font-medium">กรุณาเลือกคอลัมน์ที่ต้องการแสดงจากตัวจัดการข้อมูลด้านบน</td></tr>}
                        {filteredData.map((row, idx) => {
                          const statusVal = safeTrim(row['สถานะ']);
                          const style = getRowStyleClasses(statusVal);
                          const prog = constructionProgress[row.id] || {};

                          return (
                              <tr key={row.id || idx} className={`border-b cursor-pointer transition-colors ${style.row}`}>
                                  <td className="py-4 px-5 align-middle text-center text-[13px] font-bold border border-gray-200 text-gray-400">{idx + 1}</td>
                                  {visibleColumns.map(col => {
                                      let content = null;
                                      if (col === 'หมู่บ้าน') content = <span className={`text-[15px] font-extrabold ${style.text}`}>{safeTrim(row['หมู่บ้าน']) || '-'}</span>;
                                      else if (col === 'บ้านเลขที่' || col === 'ซอย') content = <span className="text-[14px] font-medium text-gray-700">{safeTrim(row[col]) || '-'}</span>;
                                      else if (col === 'เริ่มทำ') content = <span className="text-[14px] font-medium text-gray-500">{safeTrim(row['เริ่มทำ']) || '-'}</span>;
                                      else if (col === 'ทำเสร็จเมื่อ') content = <DatePickerFixed value={prog.finishedDate || ''} onChange={(e) => handleUpdateProgress(row.id, { finishedDate: e.target.value })} className="px-3 py-1.5 text-[13px] rounded-lg outline-none bg-white border border-gray-300 focus:border-brand w-[110px] text-center" />;
                                      else if (col === 'รวมเวลา (วัน)' || col === 'ระยะเวลา') { const days = calculateDays(safeTrim(row['เริ่มทำ']), prog.finishedDate); content = <span className="text-[14px] font-bold text-gray-600 bg-gray-50 px-3 py-1 rounded-md">{days === '-' ? '-' : `${days} วัน`}</span>; }
                                      else if (col === 'การตรวจงาน') {
                                          const count = prog.inspectionCount || 0;
                                          content = (
                                              <div className="flex items-center space-x-3">
                                                  <div className="flex items-center bg-white rounded-lg p-1 border border-gray-200">
                                                      <button onClick={() => handleUpdateProgress(row.id, { inspectionCount: Math.max(0, count - 1) })} disabled={count === 0} className="w-7 h-7 flex items-center justify-center rounded-md text-gray-500 hover:text-red-500 disabled:opacity-40"><Icon name="Minus" size={14} /></button>
                                                      <span className="w-8 text-center text-[14px] font-extrabold text-brand">{count}</span>
                                                      <button onClick={() => handleUpdateProgress(row.id, { inspectionCount: count + 1 })} className="w-7 h-7 flex items-center justify-center rounded-md text-gray-500 hover:text-brand"><Icon name="Plus" size={14} /></button>
                                                  </div>
                                                  {count > 0 ? <span className="text-[12px] font-bold text-emerald-800 bg-emerald-100 px-2.5 py-1 rounded-full">ตรวจครั้งที่ {count}</span> : <span className="text-[12px] text-gray-400 bg-gray-50 px-2.5 py-1 rounded-full">ยังไม่ได้ตรวจ</span>}
                                              </div>
                                          );
                                      }
                                      else if (col === 'สถานะ' || col === 'สถานะบ้าน') content = <span className={`px-3 py-1 rounded-full text-[12px] font-bold ${style.badge}`}>{statusVal || '-'}</span>;
                                      else content = <span className="text-[14px] font-medium text-gray-500">{safeTrim(row[col]) || '-'}</span>;
                                      return <td key={col} className="py-4 px-5 align-middle border border-gray-200">{content}</td>;
                                  })}
                              </tr>
                          )
                        })}
                        {filteredData.length === 0 && <tr><td colSpan={100} className="py-16 text-center text-gray-400">ไม่มีข้อมูลที่ค้นหา</td></tr>}
                      </tbody>
                   </table>
                 </div>
               </div>

               {/* History Modal */}
               {isHistoryModalOpen && (() => {
                    const completedHouses = validSheetData.filter(row => constructionProgress[row.id]?.finishedDate).sort((a, b) => new Date(constructionProgress[b.id].finishedDate).getTime() - new Date(constructionProgress[a.id].finishedDate).getTime());
                    return (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm text-left">
                            <div className="bg-surface rounded-2xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl relative border border-gray-100">
                                <div className="flex justify-between items-center p-4 md:p-5 border-b border-gray-100 shrink-0">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center"><Icon name="Clock" className="mr-2 text-brand" size={20} /> ประวัติบ้านที่ทำเสร็จแล้ว</h3>
                                    <button onClick={() => setIsHistoryModalOpen(false)} className="p-2 bg-gray-100 text-gray-500 rounded-full hover:bg-gray-200 transition-colors"><Icon name="X" size={16}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                                    {completedHouses.length > 0 ? (
                                        <div className="border border-gray-200 rounded-xl overflow-hidden">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-gray-50 border-b border-gray-200">
                                                    <tr>
                                                        <th className="p-3 text-[12px] font-extrabold text-gray-500 uppercase">โครงการ</th>
                                                        <th className="p-3 text-[12px] font-extrabold text-gray-500 uppercase">บ้านเลขที่</th>
                                                        <th className="p-3 text-[12px] font-extrabold text-gray-500 uppercase">วันที่ทำเสร็จ</th>
                                                        <th className="p-3 text-[12px] font-extrabold text-gray-500 uppercase text-center w-[80px]">ลบ</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {completedHouses.map((row, idx) => {
                                                        const pName = safeTrim(row['หมู่บ้าน']), hNo = safeTrim(row['บ้านเลขที่']);
                                                        return (
                                                            <tr key={row.id} className={`hover:bg-gray-50 transition-colors ${idx !== completedHouses.length - 1 ? 'border-b border-gray-100' : ''}`}>
                                                                <td className="p-3 text-[14px] font-bold text-gray-800">{pName || '-'}</td>
                                                                <td className="p-3 text-[14px] text-gray-600">{hNo || '-'}</td>
                                                                <td className="p-3 text-[13px] font-bold text-emerald-600">{getFormattedDateThai(constructionProgress[row.id].finishedDate)}</td>
                                                                <td className="p-3 text-center">
                                                                    <button onClick={() => setHistoryToDelete({ id: row.id, label: `${pName} ${hNo}`.trim() })} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Icon name="Trash" size={16} /></button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div className="py-16 flex flex-col items-center justify-center text-gray-400"><Icon name="CheckSquare" size={40} className="opacity-30 mb-3" /><p className="font-medium text-[14px]">ยังไม่มีประวัติบ้านที่ทำเสร็จ</p></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
               })()}

               {/* Delete History Confirm Modal */}
               {historyToDelete && (
                 <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                   <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                     <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash" size={24}/></div>
                     <h3 className="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบประวัติ?</h3>
                     <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบประวัติการทำเสร็จของ <b>{historyToDelete.label}</b> ใช่หรือไม่? <br/>(สถานะวันทำเสร็จจะถูกล้างค่าเป็นค่าว่าง)</p>
                     <div className="flex justify-center space-x-2">
                       <button onClick={() => setHistoryToDelete(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">ยกเลิก</button>
                       <button onClick={async () => { await handleUpdateProgress(historyToDelete.id, { finishedDate: "" }); setHistoryToDelete(null); }} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700 transition-colors">ลบประวัติ</button>
                     </div>
                   </div>
                 </div>
               )}
            </div>
        );
    };

    const PostSchedule = ({ sheetData, setManualRefreshKey, postTracking, isFirebaseLoaded }) => {
        const [viewMode, setViewMode] = useState('daily');
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [activeFilterDropdown, setActiveFilterDropdown] = useState(null);
        const [searchQuery, setSearchQuery] = useState('');
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [postMenuOpen, setPostMenuOpen] = useState(null);
        const [isSkipModalOpen, setIsSkipModalOpen] = useState(false);
        const [houseToSkip, setHouseToSkip] = useState(null);
        const [isDeleteHistoryModalOpen, setIsDeleteHistoryModalOpen] = useState(false);
        const [historyToDelete, setHistoryToDelete] = useState(null);
        const [showFilters, setShowFilters] = useState(false);

        const [hiddenValues, setHiddenValues] = useState(() => {
            const saved = localStorage.getItem('s_h_val_post_v6');
            return saved ? JSON.parse(saved) : { 'สถานะ': ['ขายแล้ว'], 'Website': ['ฝากขาย'] };
        }); 
        const [visibleColumns, setVisibleColumns] = useState(() => {
            const saved = localStorage.getItem('s_v_col_post_v6');
            return saved ? JSON.parse(saved) : ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        });

        useEffect(() => { localStorage.setItem('s_h_val_post_v6', JSON.stringify(hiddenValues)); }, [hiddenValues]);
        useEffect(() => { localStorage.setItem('s_v_col_post_v6', JSON.stringify(visibleColumns)); }, [visibleColumns]);

        const baseSheetData = getValidSheetData(sheetData);
        const allColumns = ['หมู่บ้าน', 'บ้านเลขที่', 'ซอย', 'สถานะบ้าน', 'ประวัติการโพสต์'];
        const uniqueStatuses = [...new Set(baseSheetData.map(item => safeTrim(item['สถานะ'])).filter(Boolean))];
        const uniqueWebsites = [...new Set(baseSheetData.map(item => safeTrim(item['Website'])).filter(Boolean))];

        const toggleColumn = (col) => setVisibleColumns(prev => prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]);
        const toggleHideValue = (col, val) => setHiddenValues(prev => {
            const arr = prev[col] || [];
            return { ...prev, [col]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
        });

        const { dateStr: assignmentTodayStr, displayStr: assignmentDisplayStr } = getAssignmentDateInfo();

        const handleTogglePost = async (rowId, isChecked, assigneeName) => {
            if (!isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", rowId), { [assigneeName]: isChecked ? assignmentTodayStr : null }, { merge: true }); } catch(err) {}
        };

        const confirmSkip = (houseId, houseName) => { setHouseToSkip({ id: houseId, name: houseName }); setIsSkipModalOpen(true); };
        const executeSkip = async () => {
            if (!houseToSkip || !isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", houseToSkip.id), { lastSkippedTimestamp: Date.now() }, { merge: true }); } catch(err) {}
            setIsSkipModalOpen(false); setHouseToSkip(null);
        };

        const confirmDeleteHistory = (rowId, assigneeName, houseName) => { setHistoryToDelete({ rowId, assigneeName, houseName }); setIsDeleteHistoryModalOpen(true); };
        const executeDeleteHistory = async () => {
            if (!historyToDelete || !isFirebaseLoaded) return;
            try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "post_tracking", historyToDelete.rowId), { [historyToDelete.assigneeName]: null }, { merge: true }); } catch(err) {}
            setIsDeleteHistoryModalOpen(false); setHistoryToDelete(null);
        };

        let activePool = baseSheetData.filter(row => {
            const status = safeTrim(row['สถานะ']), website = safeTrim(row['Website']);
            if (status !== 'ว่าง' && status !== 'ยื่นซ้อน') return false;
            if (website.includes('ฝากขาย')) return false;
            if (searchQuery && viewMode === 'daily') {
                if (!`${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            }
            return true;
        });

        const skippedHouses = [], freshHouses = [];
        activePool.forEach(h => { postTracking[h.id]?.lastSkippedTimestamp ? skippedHouses.push(h) : freshHouses.push(h); });
        skippedHouses.sort((a, b) => (postTracking[a.id].lastSkippedTimestamp || 0) - (postTracking[b.id].lastSkippedTimestamp || 0));
        let newestPool = [...freshHouses].reverse().concat(skippedHouses);
        
        let priorityPool = [...freshHouses].sort((a, b) => {
             const expA = parseThaiDate(safeTrim(a['หมดสัญญา']) || safeTrim(a['วันหมดสัญญา'])), expB = parseThaiDate(safeTrim(b['หมดสัญญา']) || safeTrim(b['วันหมดสัญญา']));
             const startA = parseThaiDate(safeTrim(a['เริ่มทำ'])), startB = parseThaiDate(safeTrim(b['เริ่มทำ']));
             const getScore = (exp, start) => {
                 if (exp && !isNaN(exp.getTime())) return exp.getTime();
                 if (start && !isNaN(start.getTime())) return start.getTime() + 10000000000000; return Infinity;
             };
             return getScore(expA, startA) - getScore(expB, startB);
        }).concat(skippedHouses);

        const generalAssignees = ['เพจกลาง', 'Ketar', 'Noey'], specificAssignees = ['May', 'Boom', 'Boat'], allAssigneesList = [...generalAssignees, ...specificAssignees];
        const scheduleData = [], usedHouseIds = new Set();
        
        generalAssignees.forEach(name => {
            const assignedHouses = [];
            for (let i = 0; i < newestPool.length; i++) {
                if (!usedHouseIds.has(newestPool[i].id)) { assignedHouses.push(newestPool[i]); usedHouseIds.add(newestPool[i].id); break; }
            }
            for (let i = 0; i < priorityPool.length && assignedHouses.length < 4; i++) {
                if (!usedHouseIds.has(priorityPool[i].id)) { assignedHouses.push(priorityPool[i]); usedHouseIds.add(priorityPool[i].id); }
            }
            scheduleData.push({ name, type: 'general', houses: assignedHouses });
        });
        
        specificAssignees.forEach(name => {
            const myHouses = priorityPool.filter(row => {
                const possibleKeys = ['เซลล์', 'เซลล์รับผิดชอบ', 'ผู้รับผิดชอบ', 'เจ้าของบ้าน', 'Sale', 'AS', 'แอดมิน'];
                for (const key of possibleKeys) { if (row[key] && safeTrim(row[key]).toLowerCase().includes(name.toLowerCase())) return true; }
                for (const key in row) { if (key !== 'id' && safeTrim(row[key]).toLowerCase() === name.toLowerCase()) return true; }
                return false;
            }).slice(0, 4); 
            scheduleData.push({ name, type: 'specific', houses: myHouses });
        });

        const getPriorityLabel = (row) => {
            const expStr = safeTrim(row['หมดสัญญา']) || safeTrim(row['วันหมดสัญญา']), startStr = safeTrim(row['เริ่มทำ']);
            if (expStr) return <span className="inline-block mt-1.5 text-[11px] font-bold bg-red-50 text-red-600 px-2 py-0.5 rounded border border-red-100"><Icon name="Clock" size={10} className="inline-block mr-1 mb-0.5"/>ใกล้หมดสัญญา: {expStr}</span>;
            if (startStr) return <span className="inline-block mt-1.5 text-[11px] font-bold bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100"><Icon name="CalendarIcon" size={10} className="inline-block mr-1 mb-0.5"/>เริ่มทำ: {startStr}</span>;
            return null;
        };

        const renderPreviousPostInfo = (house, assigneeName) => {
            const lastPost = postTracking[house.id]?.[assigneeName];
            if (!lastPost || lastPost === assignmentTodayStr) return null;
            const diffDays = getDaysAgo(lastPost, assignmentTodayStr);
            if (diffDays <= 0) return null;
            return <span className="inline-block mt-1.5 text-[11px] font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded border border-gray-200"><Icon name="RefreshCw" size={10} className="inline-block mr-1 mb-0.5"/>เคยโพสต์ {getFormattedDateThai(lastPost)} ({diffDays} วันที่แล้ว)</span>;
        };

        const filteredAllData = baseSheetData.filter(row => {
            if (searchQuery && viewMode === 'all') { if (!`${safeTrim(row['หมู่บ้าน'])} ${safeTrim(row['บ้านเลขที่'])} ${safeTrim(row['ซอย'])}`.toLowerCase().includes(searchQuery.toLowerCase())) return false; }
            if (hiddenValues['สถานะ']?.includes(safeTrim(row['สถานะ']))) return false;
            if (hiddenValues['Website']?.includes(safeTrim(row['Website']))) return false;
            return true;
        });

        return (
            <div className="flex-1 p-4 md:p-8 overflow-auto bg-background flex flex-col h-full">
               <div className="flex justify-between items-center mb-6 shrink-0">
                    <div className="flex items-center gap-3">
                        <h2 className="text-[22px] font-bold text-gray-800 flex items-center"><Icon name="FileSignature" className="mr-3 text-brand" size={26}/> {viewMode === 'daily' ? `ตารางโพสต์ประจำวัน ที่ ${assignmentDisplayStr}` : 'ประวัติโพสต์บ้านทั้งหมด'}</h2>
                        {viewMode === 'all' && <div className="px-3 py-1 bg-brand/10 border border-brand/20 rounded-full shadow-sm"><span className="text-[12px] font-bold text-brand">{filteredAllData.length} รายการ</span></div>}
                        <button onClick={() => { setIsRefreshing(true); setManualRefreshKey(k => k + 1); setTimeout(() => setIsRefreshing(false), 800); }} className="ml-2 p-1.5 text-gray-400 hover:text-brand bg-white border border-gray-200 rounded-lg shadow-sm"><Icon name="RefreshCw" size={16} className={isRefreshing ? 'animate-spin text-brand' : ''} /></button>
                    </div>
               </div>

               <div className="flex bg-gray-100 p-1.5 rounded-xl w-fit mb-6 shrink-0 shadow-sm border border-gray-200">
                    <button onClick={() => setViewMode('daily')} className={`flex items-center px-6 py-2.5 rounded-lg text-[14px] font-bold transition-all ${viewMode === 'daily' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}><Icon name="ListTodo" size={16} className="mr-2" /> กระดานจ่ายงานวันนี้</button>
                    <button onClick={() => setViewMode('all')} className={`flex items-center px-6 py-2.5 rounded-lg text-[14px] font-bold transition-all ${viewMode === 'all' ? 'bg-white text-brand shadow-sm border border-gray-200/50' : 'text-gray-500 hover:text-gray-800'}`}><Icon name="Building" size={16} className="mr-2" /> บ้านทั้งหมด (ประวัติโพสต์)</button>
               </div>

               <div className="bg-white p-4 xl:p-5 rounded-[20px] border border-gray-100 shadow-sm mb-6 shrink-0 relative z-20">
                    <div className="flex justify-between items-center xl:hidden cursor-pointer" onClick={() => setShowFilters(!showFilters)}>
                        <div className="flex items-center text-[14px] font-bold text-gray-700"><Icon name="Search" size={16} className="mr-2 text-brand" /> ค้นหาและจัดการข้อมูล</div>
                        <div className="bg-gray-50 p-1.5 rounded-lg text-gray-500"><Icon name={showFilters ? "ChevronUp" : "ChevronDown"} size={16} /></div>
                    </div>

                    <div className={`flex-col xl:flex-row items-start xl:items-center w-full ${showFilters ? 'flex mt-4' : 'hidden xl:flex'}`}>
                        <span className="text-[14px] font-bold text-gray-700 mr-4 mb-3 xl:mb-0 shrink-0 hidden xl:block">ตัวจัดการข้อมูล:</span>
                        <div className="flex flex-wrap gap-2.5 shrink-0 w-full xl:w-auto">
                            <div className="relative shrink-0 w-full sm:w-auto">
                                <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                <input type="text" placeholder="ค้นหาหมู่บ้าน, เลขที่..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full sm:w-[200px] pl-9 pr-4 py-2 bg-white border border-gray-300 hover:border-brand rounded-xl outline-none focus:border-brand text-[13px] shadow-sm"/>
                            </div>
                            
                            {viewMode === 'all' && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setIsDropdownOpen(!isDropdownOpen); setActiveFilterDropdown(null); }} className="flex items-center justify-between w-full sm:w-[200px] px-4 py-2 bg-gray-50 border border-gray-200 hover:border-brand rounded-xl text-[13px] font-bold text-gray-700 shadow-sm"><Icon name="ListTodo" size={14} className="mr-1.5 text-gray-400" /> เลือกคอลัมน์ <Icon name={isDropdownOpen ? "ChevronUp" : "ChevronDown"} size={16} className="text-gray-400" /></button>
                                    {isDropdownOpen && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setIsDropdownOpen(false)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 text-[12px] font-bold text-gray-500">ติ๊กเพื่อแสดงบนตาราง</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {allColumns.map(col => (
                                                        <label key={col} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={visibleColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{col}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {viewMode === 'all' && uniqueStatuses.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'status' ? null : 'status'); setIsDropdownOpen(false); }} className={`flex items-center justify-between w-full px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm ${hiddenValues['สถานะ']?.length > 0 ? 'border-brand/50 bg-brand/5' : ''}`}>
                                        <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> สถานะ {hiddenValues['สถานะ']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md">{uniqueStatuses.length - hiddenValues['สถานะ'].length}/{uniqueStatuses.length}</span>} <Icon name={activeFilterDropdown === 'status' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                    </button>
                                    {activeFilterDropdown === 'status' && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="text-[12px] font-bold text-gray-500">ซ่อน/แสดง</span>{hiddenValues['สถานะ']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'สถานะ': []}))} className="text-[11px] text-brand font-bold">แสดงทั้งหมด</button>}</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {uniqueStatuses.map(st => (
                                                        <label key={st} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={!hiddenValues['สถานะ']?.includes(st)} onChange={() => toggleHideValue('สถานะ', st)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{st}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {viewMode === 'all' && uniqueWebsites.length > 0 && (
                                <div className="relative shrink-0 w-full sm:w-auto">
                                    <button onClick={() => { setActiveFilterDropdown(activeFilterDropdown === 'website' ? null : 'website'); setIsDropdownOpen(false); }} className={`flex items-center justify-between w-full px-4 py-2 bg-white border rounded-xl text-[13px] font-bold text-gray-700 shadow-sm ${hiddenValues['Website']?.length > 0 ? 'border-brand/50 bg-brand/5' : ''}`}>
                                        <Icon name="Search" size={14} className="mr-1.5 text-gray-400" /> Website {hiddenValues['Website']?.length > 0 && <span className="ml-1.5 px-1.5 py-0.5 bg-brand text-white text-[10px] rounded-md">{uniqueWebsites.length - hiddenValues['Website'].length}/{uniqueWebsites.length}</span>} <Icon name={activeFilterDropdown === 'website' ? "ChevronUp" : "ChevronDown"} size={16} className="ml-1.5 text-gray-400" />
                                    </button>
                                    {activeFilterDropdown === 'website' && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setActiveFilterDropdown(null)}></div>
                                            <div className="absolute top-full left-0 mt-2 w-[220px] bg-white border border-gray-100 shadow-xl rounded-xl z-20 overflow-hidden flex flex-col max-h-[300px]">
                                                <div className="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="text-[12px] font-bold text-gray-500">ซ่อน/แสดง</span>{hiddenValues['Website']?.length > 0 && <button onClick={() => setHiddenValues(p => ({...p, 'Website': []}))} className="text-[11px] text-brand font-bold">แสดงทั้งหมด</button>}</div>
                                                <div className="overflow-y-auto custom-scrollbar p-2 space-y-1">
                                                    {uniqueWebsites.map(web => (
                                                        <label key={web} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer"><input type="checkbox" checked={!hiddenValues['Website']?.includes(web)} onChange={() => toggleHideValue('Website', web)} className="mr-3 w-4 h-4 accent-brand" /><span className="text-[13px] font-semibold">{web}</span></label>
                                                    ))}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        {viewMode === 'all' && (
                            <div className="flex-1 overflow-x-auto mt-4 xl:mt-0 xl:ml-4 flex gap-2 horizontal-scrollbar pb-2 xl:pb-0 w-full border-t xl:border-t-0 xl:border-l border-gray-100 pt-3 xl:pt-0 xl:pl-4">
                                {visibleColumns.map((col, idx) => (
                                    <span key={col} className="inline-flex items-center px-3 py-1.5 bg-brand/5 text-brand rounded-lg text-[12px] font-bold whitespace-nowrap border border-brand/10"><span className="text-brand/50 mr-1.5">{idx + 1}.</span> {col} <button onClick={() => toggleColumn(col)} className="ml-2 text-brand/50 hover:text-red-500"><Icon name="X" size={12} /></button></span>
                                ))}
                            </div>
                        )}
                    </div>
               </div>

               {viewMode === 'daily' ? (
                   <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-6">
                        {scheduleData.map((assignee, idx) => {
                            const completedCount = assignee.houses.filter(h => postTracking[h.id]?.[assignee.name] === assignmentTodayStr).length;
                            const avatarClass = getAvatarColor(assignee.name);
                            const avatarLetter = getAvatarLetter(assignee.name);

                            return (
                                <div key={idx} className="bg-white rounded-[20px] shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                                    <div className="bg-gray-50/80 border-b border-gray-100 p-4 flex items-center justify-between">
                                        <div className="flex items-center space-x-3">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-[18px] border shadow-sm ${avatarClass}`}>{avatarLetter}</div>
                                            <div>
                                                <h3 className="font-extrabold text-gray-800 text-[16px]">{assignee.name}</h3>
                                                <p className="text-[11px] text-gray-500 font-medium">{assignee.type === 'general' ? 'โพสต์บ้านทั่วไป' : 'โพสต์บ้านของตนเอง'}</p>
                                            </div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-[12px] font-bold shadow-sm border ${completedCount === 4 ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-white text-gray-600 border-gray-200'}`}>{completedCount}/4 โพสต์</span>
                                    </div>
                                    <div className="p-4 flex-1">
                                        {assignee.houses.length > 0 ? (
                                            <ul className="space-y-3">
                                                {assignee.houses.map((house, hIdx) => {
                                                    const combined = `${safeTrim(house['หมู่บ้าน'])} ${safeTrim(house['บ้านเลขที่'])} ${safeTrim(house['ซอย'])}`.trim();
