                                            <button key={idx} onClick={() => setActiveImageIndex(idx)} className={`w-16 h-16 rounded-md overflow-hidden shrink-0 border-2 transition-all ${activeImageIndex === idx ? 'border-brand shadow-[0_0_10px_rgba(11,61,27,0.5)] scale-105' : 'border-transparent opacity-60 hover:opacity-100'}`}><img src={imgSrc} className="w-full h-full object-cover" alt={`thumb ${idx}`} /></button>
                                        ))}
                                    </div>
                                    {h.images.length > 1 && (
                                        <button onClick={() => handleDownloadAll(h.images, h.projectName)} className="ml-4 shrink-0 bg-brand text-white flex flex-col items-center justify-center h-16 px-3 rounded-lg hover:bg-brandLight transition-colors shadow-lg"><Icon name="Download" size={18} className="mb-1"/><span className="text-[10px] font-bold">โหลดทั้งหมด</span></button>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="w-full md:w-2/5 flex flex-col bg-white overflow-hidden border-l border-gray-200">
                            <div className="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <span className="inline-block bg-brand/10 text-brand px-2.5 py-1 rounded-md text-[11px] font-extrabold tracking-wide mb-2">บ้านมาใหม่</span>
                                        <h2 className="text-2xl font-extrabold text-gray-900 leading-tight">{h.projectName || 'ไม่ระบุชื่อโครงการ'}</h2>
                                    </div>
                                </div>
                                {h.price && <div className="text-2xl font-black text-brand mb-6">{h.price}</div>}
                                <div className="space-y-4 mb-8">
                                    <div className="flex items-start text-[14px]">
                                        <Icon name="MapPin" size={18} className="text-gray-400 mr-3 mt-0.5 shrink-0"/>
                                        <div><div className="font-bold text-gray-800">{h.location || 'ไม่ระบุทำเล'}</div>{fullAddress && <div className="text-gray-500 mt-0.5">บ้านเลขที่ {fullAddress}</div>}</div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-6 border-y border-gray-100 py-6">
                                    {h.bedrooms && <div className="bg-gray-50 p-3 rounded-xl flex items-center border border-gray-100"><Icon name="Bed" size={20} className="text-blue-500 mr-3 shrink-0"/><div><div className="text-[11px] text-gray-500 font-bold">ห้องนอน</div><div className="text-[14px] font-extrabold text-gray-800">{h.bedrooms}</div></div></div>}
                                    {h.bathrooms && <div className="bg-gray-50 p-3 rounded-xl flex items-center border border-gray-100"><Icon name="Bath" size={20} className="text-cyan-500 mr-3 shrink-0"/><div><div className="text-[11px] text-gray-500 font-bold">ห้องน้ำ</div><div className="text-[14px] font-extrabold text-gray-800">{h.bathrooms}</div></div></div>}
                                    {h.parking && <div className="bg-gray-50 p-3 rounded-xl flex items-center border border-gray-100"><Icon name="CheckSquare" size={20} className="text-gray-400 mr-3 shrink-0"/><div><div className="text-[11px] text-gray-500 font-bold">ที่จอดรถ</div><div className="text-[14px] font-extrabold text-gray-800">{h.parking}</div></div></div>}
                                    {h.floors && <div className="bg-gray-50 p-3 rounded-xl flex items-center border border-gray-100"><Icon name="Building" size={20} className="text-gray-400 mr-3 shrink-0"/><div><div className="text-[11px] text-gray-500 font-bold">จำนวนชั้น</div><div className="text-[14px] font-extrabold text-gray-800">{h.floors}</div></div></div>}
                                    {h.area && <div className="bg-brand/5 p-3 rounded-xl flex items-center border border-brand/10 col-span-2"><Icon name="Maximize" size={20} className="text-brand mr-3 shrink-0"/><div><div className="text-[11px] text-brand/70 font-bold">พื้นที่</div><div className="text-[14px] font-extrabold text-brand">{h.area}</div></div></div>}
                                </div>
                                {h.direction && (
                                    <div className="flex justify-between items-center bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 mb-2">
                                        <span className="text-[13px] font-bold text-gray-500">ทิศหน้าบ้าน</span><span className="text-[14px] font-extrabold text-gray-800">{h.direction}</span>
                                    </div>
                                )}
                            </div>

                            <div className="p-5 border-t border-gray-100 bg-gray-50 shrink-0">
                                <div className="flex justify-between items-center">
                                    <button onClick={() => setIsDeleteHouseModalOpen(true)} className="p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors" title="ลบข้อมูลบ้านหลังนี้"><Icon name="Trash" size={20} /></button>
                                    <button onClick={handleOpenEdit} className="flex items-center px-6 py-2.5 bg-gray-800 text-white rounded-xl hover:bg-black transition-colors font-bold text-[14px] shadow-md"><Icon name="Edit" size={16} className="mr-2" /> แก้ไขข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        return (
          <>
            <div className="flex-1 p-6 md:p-8 overflow-auto bg-background flex flex-col h-full">
              <div className="flex justify-between items-center mb-6 shrink-0">
                <div><h2 className="text-2xl font-bold text-gray-800 flex items-center"><Icon name="Image" size={26} className="mr-3 text-brand"/> รูปบ้านมาใหม่</h2><p className="text-gray-500 text-sm mt-1">คลังรูปภาพและรายละเอียดโครงการ</p></div>
                <button onClick={handleOpenAdd} className="bg-brand text-white px-5 py-2.5 rounded-xl flex items-center shadow-subtle hover:bg-brandLight transition-all font-bold shrink-0 ml-4"><Icon name="Plus" size={18} className="mr-2" /> เพิ่มโครงการ</button>
              </div>
              
              <div className="mb-8 relative max-w-md shrink-0">
                 <Icon name="Search" size={18} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                 <input type="text" placeholder="ค้นหาชื่อโครงการ, ผู้รับผิดชอบ..." value={houseSearchQuery} onChange={(e) => setHouseSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl outline-none focus:border-brand transition-all text-sm shadow-sm" />
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                 {filteredHouses.map(house => {
                     const fullAddress = `${house.houseNo || ''} ${house.soi || ''}`.trim();
                     return (
                        <div key={house.id} onClick={() => handleOpenView(house)} className="w-full bg-white rounded-[20px] overflow-hidden shadow-subtle border border-gray-100 flex flex-col hover:-translate-y-1 transition-all cursor-pointer group mx-auto sm:mx-0">
                            <div className="h-[200px] w-full bg-gray-100 relative overflow-hidden shrink-0 flex items-center justify-center">
                                {house.images && house.images.length > 0 ? (
                                    <img src={house.images[0]} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt={house.projectName} />
                                ) : (
                                    <div className="flex flex-col items-center text-gray-400"><Icon name="Image" size={40} className="mb-2 opacity-30"/><span className="text-[11px] font-medium">ไม่มีรูปภาพ</span></div>
                                )}
                                <div className="absolute top-3 right-3 bg-black/70 text-white text-[11px] font-bold px-2 py-1 rounded backdrop-blur-md flex items-center"><Icon name="Image" size={10} className="mr-1" /> {house.images?.length || 0}</div>
                                {house.price && <div className="absolute bottom-3 left-3 bg-brand text-white text-[12px] font-extrabold px-2.5 py-1 rounded shadow-md">{house.price}</div>}
                            </div>
                            <div className="p-4 flex-1 flex flex-col">
                                <h3 className="font-extrabold text-[15px] text-gray-800 truncate mb-1" title={house.projectName}>{house.projectName || 'ไม่ระบุชื่อ'}</h3>
                                <p className="text-[12px] text-gray-500 truncate mb-3 flex items-center"><Icon name="MapPin" size={12} className="mr-1"/> {house.location || '-'} {fullAddress && `| ${fullAddress}`}</p>
                                <div className="mt-auto grid grid-cols-3 gap-1 pt-3 border-t border-gray-100">
                                    <div className="flex flex-col items-center justify-center text-gray-500" title="ห้องนอน"><Icon name="Bed" size={14} className="mb-0.5 opacity-60"/><span className="text-[11px] font-bold">{house.bedrooms || '-'}</span></div>
                                    <div className="flex flex-col items-center justify-center text-gray-500 border-x border-gray-100" title="ห้องน้ำ"><Icon name="Bath" size={14} className="mb-0.5 opacity-60"/><span className="text-[11px] font-bold">{house.bathrooms || '-'}</span></div>
                                    <div className="flex flex-col items-center justify-center text-brand" title="พื้นที่"><Icon name="Maximize" size={14} className="mb-0.5 opacity-60"/><span className="text-[11px] font-bold truncate max-w-full px-1">{house.area ? house.area.replace(' ตร.ว.','') : '-'}</span></div>
                                </div>
                            </div>
                        </div>
                     )
                 })}
                 {filteredHouses.length === 0 && (
                    <div className="col-span-full py-16 text-center text-gray-400 bg-surface rounded-2xl border border-gray-100 border-dashed"><Icon name="Image" size={40} className="mx-auto mb-3 opacity-30" /><p>{houses.length === 0 ? 'ยังไม่มีข้อมูลโครงการรูปภาพในระบบ' : 'ไม่พบข้อมูลที่ค้นหา'}</p></div>
                 )}
              </div>
            </div>

            {/* Modals */}
            {modalMode === 'add' || modalMode === 'edit' ? renderAddEditModal() : null}
            {modalMode === 'view' ? renderViewModal() : null}

            {/* Delete House Confirm Modal */}
            {isDeleteHouseModalOpen && (
              <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                  <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash" size={24}/></div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบโครงการ</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบข้อมูลบ้าน <b>{activeHouse?.projectName || 'นี้'}</b> พร้อมรูปภาพทั้งหมดออกจากระบบอย่างถาวรใช่หรือไม่?</p>
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => setIsDeleteHouseModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">ยกเลิก</button>
                    <button onClick={handleDeleteHouse} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700 transition-colors">ลบข้อมูลถาวร</button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
    };

    function App() {
      const [activeApp, setActiveApp] = useState('calendar');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [showSplash, setShowSplash] = useState(true);
      const [splashFade, setSplashFade] = useState(false);

      useEffect(() => {
        const timer1 = setTimeout(() => setSplashFade(true), 800);
        const timer2 = setTimeout(() => setShowSplash(false), 1300);
        return () => { clearTimeout(timer1); clearTimeout(timer2); };
      }, []);

      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState([]);
      const [departments, setDepartments] = useState([]); 
      const [selectedUser, setSelectedUser] = useState('All');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingEventId, setEditingEventId] = useState(null);
      const [isDayViewOpen, setIsDayViewOpen] = useState(false);
      const [selectedDayString, setSelectedDayString] = useState('');
      
      const [isDeleteMonthModalOpen, setIsDeleteMonthModalOpen] = useState(false);
      const [deleteMonthText, setDeleteMonthText] = useState('');
      const [isAddDeptModalOpen, setIsAddDeptModalOpen] = useState(false);
      const [newDeptName, setNewDeptName] = useState('');
      const [isAddMemberModalOpen, setIsAddMemberModalOpen] = useState(false);
      const [targetDeptForMember, setTargetDeptForMember] = useState('');
      const [newMemberName, setNewMemberName] = useState('');
      const [isDeleteDeptModalOpen, setIsDeleteDeptModalOpen] = useState(false);
      const [deptToDelete, setDeptToDelete] = useState('');
      const [isDeleteMemberModalOpen, setIsDeleteMemberModalOpen] = useState(false);
      const [memberToDelete, setMemberToDelete] = useState('');
      const [deptOfMemberToDelete, setDeptOfMemberToDelete] = useState('');
      
      const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
      const [contentChecklists, setContentChecklists] = useState({});
      const [constructionProgress, setConstructionProgress] = useState({});
      const [postTracking, setPostTracking] = useState({});
      const [formData, setFormData] = useState({ type: 'event', date: '', hour: '09', minute: '00', activity: '', note: '', assignee: '' });
      const [houses, setHouses] = useState([]);
      const [aiMessages, setAiMessages] = useState([{ role: 'ai', text: 'สวัสดีค่า! น้อง Up ยินดีให้บริการค่ะ 💕' }]);
      const [sheetData, setSheetData] = useState([]);
      const [sheetError, setSheetError] = useState(null);
      const [manualRefreshKey, setManualRefreshKey] = useState(0);

      useEffect(() => {
        if (window.firebaseDB) setIsFirebaseLoaded(true);
        else {
          const handleLoad = () => setIsFirebaseLoaded(true);
          window.addEventListener('firebaseLoaded', handleLoad);
          return () => window.removeEventListener('firebaseLoaded', handleLoad);
        }
      }, []);

      useEffect(() => {
        if (!isFirebaseLoaded) return;
        const { collection, onSnapshot, setDoc, doc } = window.firebaseAPI;
        
        const unsubscribeEvents = onSnapshot(collection(window.firebaseDB, "events"), (snapshot) => {
          const loadedEvents = []; snapshot.forEach((doc) => loadedEvents.push({ id: doc.id, ...doc.data() })); setEvents(loadedEvents);
        });

        const unsubscribeDeps = onSnapshot(collection(window.firebaseDB, "departments"), (snapshot) => {
          if (snapshot.empty) {
            const initial = [ { id: 'MARKETING', members: ['Peth', 'Beau', 'Noey', 'Ketar', 'Perth', 'Ter', 'Bumb', 'Weerwi'], order: 0 }, { id: 'SALE', members: ['May', 'Boom', 'Boat'], order: 1 }, { id: 'วิศวกร', members: ['ไม้'], order: 2 } ];
            initial.forEach(async (dept) => { try { await setDoc(doc(window.firebaseDB, "departments", dept.id), { members: dept.members, order: dept.order }); } catch(e) {} });
          } else {
            const depsArray = []; snapshot.forEach((d) => depsArray.push({ id: d.id, ...d.data() })); depsArray.sort((a, b) => (a.order || 0) - (b.order || 0)); setDepartments(depsArray);
          }
        });

        const unsubscribeHouses = onSnapshot(collection(window.firebaseDB, "houses"), (snapshot) => {
          const loadedHouses = []; snapshot.forEach((doc) => loadedHouses.push({ id: doc.id, ...doc.data() })); setHouses(loadedHouses.reverse());
        });

        const unsubscribeChecklists = onSnapshot(collection(window.firebaseDB, "content_checklists"), (snapshot) => {
          const loaded = {}; snapshot.forEach((doc) => { loaded[doc.id] = doc.data(); }); setContentChecklists(loaded);
        });

        const unsubscribeProgress = onSnapshot(collection(window.firebaseDB, "construction_progress"), (snapshot) => {
          const loaded = {}; snapshot.forEach((doc) => { loaded[doc.id] = doc.data(); }); setConstructionProgress(loaded);
        });

        const unsubscribePostTracking = onSnapshot(collection(window.firebaseDB, "post_tracking"), (snapshot) => {
          const loaded = {}; snapshot.forEach((doc) => { loaded[doc.id] = doc.data(); }); setPostTracking(loaded);
        });

        const unsubscribeSheet = onSnapshot(collection(window.firebaseDB, "google_sheet_data"), 
          (snapshot) => { const loadedData = []; snapshot.forEach((doc) => loadedData.push({ id: doc.id, ...doc.data() })); setSheetData(loadedData); setSheetError(null); },
          (error) => { console.error("Firebase Read Error:", error); setSheetError(error.message); }
        );

        return () => { unsubscribeEvents(); unsubscribeDeps(); unsubscribeHouses(); unsubscribeSheet(); unsubscribeChecklists(); unsubscribeProgress(); unsubscribePostTracking(); };
      }, [isFirebaseLoaded, manualRefreshKey]);

      const moveDeptUp = async (index) => {
        if (index === 0 || !isFirebaseLoaded) return;
        const newDeps = [...departments]; const temp = newDeps[index - 1]; newDeps[index - 1] = newDeps[index]; newDeps[index] = temp;
        try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", newDeps[index - 1].id), { order: index - 1 }); await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", newDeps[index].id), { order: index }); } catch (e) {}
      };
      const moveDeptDown = async (index) => {
        if (index === departments.length - 1 || !isFirebaseLoaded) return;
        const newDeps = [...departments]; const temp = newDeps[index + 1]; newDeps[index + 1] = newDeps[index]; newDeps[index] = temp;
        try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", newDeps[index + 1].id), { order: index + 1 }); await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", newDeps[index].id), { order: index }); } catch (e) {}
      };
      const moveMemberUp = async (deptIndex, memberIndex) => {
        if (memberIndex === 0 || !isFirebaseLoaded) return;
        const dept = departments[deptIndex], newMembers = [...dept.members]; const temp = newMembers[memberIndex - 1]; newMembers[memberIndex - 1] = newMembers[memberIndex]; newMembers[memberIndex] = temp;
        try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", dept.id), { members: newMembers }); } catch (e) {}
      };
      const moveMemberDown = async (deptIndex, memberIndex) => {
        if (memberIndex === departments[deptIndex].members.length - 1 || !isFirebaseLoaded) return;
        const dept = departments[deptIndex], newMembers = [...dept.members]; const temp = newMembers[memberIndex + 1]; newMembers[memberIndex + 1] = newMembers[memberIndex]; newMembers[memberIndex] = temp;
        try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", dept.id), { members: newMembers }); } catch (e) {}
      };

      const handleAddDept = async () => { if (!newDeptName.trim() || !isFirebaseLoaded) return; try { await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", newDeptName.trim()), { members: [], order: departments.length }); setNewDeptName(''); setIsAddDeptModalOpen(false); } catch(e) {} };
      const handleAddMember = async () => { if (!newMemberName.trim() || !isFirebaseLoaded || !targetDeptForMember) return; const dept = departments.find(d => d.id === targetDeptForMember); if (!dept) return; const newMembers = [...dept.members, newMemberName.trim()]; try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", targetDeptForMember), { members: newMembers }); setNewMemberName(''); setIsAddMemberModalOpen(false); } catch(e) {} };
      const handleDeleteDept = async () => { if (!deptToDelete || !isFirebaseLoaded) return; try { await window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", deptToDelete)); setIsDeleteDeptModalOpen(false); setDeptToDelete(''); } catch(e) {} };
      const handleDeleteMember = async () => { if (!memberToDelete || !deptOfMemberToDelete || !isFirebaseLoaded) return; const dept = departments.find(d => d.id === deptOfMemberToDelete); if (!dept) return; const newMembers = dept.members.filter(m => m !== memberToDelete); try { await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(window.firebaseDB, "departments", deptOfMemberToDelete), { members: newMembers }); setIsDeleteMemberModalOpen(false); setMemberToDelete(''); setDeptOfMemberToDelete(''); } catch(e) {} };

      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => { const day = new Date(year, month, 1).getDay(); return (day + 6) % 7; };
      const year = currentDate.getFullYear(), month = currentDate.getMonth(), daysInMonth = getDaysInMonth(year, month);
      const startDayIndex = (getFirstDayOfMonth(year, month) + 6) % 7; 
      const totalCells = startDayIndex + daysInMonth;
      const emptyEndCells = (7 - (totalCells % 7)) % 7;

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const goToToday = () => setCurrentDate(new Date());

      const getEventsForDay = (dateStr) => {
        const filteredEvents = events.filter(ev => ev.date === dateStr).filter(ev => {
          if (activeApp === 'calendar') return selectedUser === 'All' ? ev.type === 'event' : ev.assignee === selectedUser;
          if (activeApp === 'holidays') { const isHol = ev.type === 'holiday' || ev.type === 'leave' || ev.type === 'public_holiday'; return selectedUser === 'All' ? isHol : isHol && ev.assignee === selectedUser; }
          return true;
        });
        return {
          normalEvents: filteredEvents.filter(ev => ev.type === 'event').sort((a, b) => a.time.localeCompare(b.time)),
          holidays: filteredEvents.filter(ev => ev.type === 'holiday'),
          leaves: filteredEvents.filter(ev => ev.type === 'leave'),
          publicHolidays: filteredEvents.filter(ev => ev.type === 'public_holiday')
        };
      };

      const handleDayClick = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const { normalEvents, holidays, leaves, publicHolidays } = getEventsForDay(dateStr);
        if (normalEvents.length > 0 || holidays.length > 0 || leaves.length > 0 || publicHolidays.length > 0) { setSelectedDayString(dateStr); setIsDayViewOpen(true); } 
        else handleOpenModal(day);
      };

      const handleOpenModal = (day = null, eventToEdit = null, prefillAssignee = '', prefillType = '') => {
        if (eventToEdit) {
          setFormData({ type: eventToEdit.type || 'event', date: eventToEdit.date, hour: eventToEdit.time ? eventToEdit.time.split(':')[0] : '09', minute: eventToEdit.time ? eventToEdit.time.split(':')[1] : '00', activity: eventToEdit.activity || '', note: eventToEdit.note || '', assignee: eventToEdit.assignee || '' });
          setEditingEventId(eventToEdit.id); setIsModalOpen(true); return;
        }
        let dateStr = day ? `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` : selectedDayString || `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
        setFormData({ ...formData, type: prefillType || (activeApp === 'holidays' ? 'holiday' : 'event'), date: dateStr, assignee: prefillAssignee || (selectedUser !== 'All' ? selectedUser : ''), activity: '' });
        setEditingEventId(null); setIsModalOpen(true);
      };

      const handleCloseModal = () => { setIsModalOpen(false); setEditingEventId(null); setSelectedDayString(''); setFormData({ type: 'event', date: '', hour: '09', minute: '00', activity: '', note: '', assignee: '' }); };

      const handleSaveEvent = async (e) => {
        e.preventDefault(); if (!isFirebaseLoaded) return;

                        <div>
                          <label className="block text-[13px] font-bold text-gray-600 mb-1.5">วันที่</label>
                          <DatePickerFixed required value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand transition-all text-[14px] text-gray-700"/>
                        </div>
                        <div>
                          <label className="block text-[13px] font-bold text-gray-600 mb-1.5">ผู้รับผิดชอบ</label>
                          <select required value={formData.assignee} onChange={e=>setFormData({...formData, assignee:e.target.value})} className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand transition-all text-[14px] text-gray-700">
                            <option value="" disabled hidden>ระบุผู้รับผิดชอบ</option>
                            {departments.map((dept) => <optgroup key={dept.id} label={`ทีม ${dept.id}`}>{dept.members.map(name => <option key={name}>{name}</option>)}</optgroup>)}
                          </select>
                        </div>
                      </div>
                      {formData.type === 'event' && (
                        <>
                          <div className="w-full">
                            <label className="block text-[13px] font-bold text-gray-600 mb-1.5">เวลา (ชั่วโมง : นาที)</label>
                            <div className="flex space-x-2 items-center">
                              <select value={formData.hour} onChange={e=>setFormData({...formData, hour:e.target.value})} className="px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] flex-1 outline-none focus:border-brand text-center text-[14px] text-gray-700">{HOURS.map(h=><option key={h}>{h}</option>)}</select><span className="font-bold text-gray-400">:</span>
                              <select value={formData.minute} onChange={e=>setFormData({...formData, minute:e.target.value})} className="px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] flex-1 outline-none focus:border-brand text-center text-[14px] text-gray-700">{MINUTES.map(m=><option key={m}>{m}</option>)}</select>
                            </div>
                          </div>
                          <div>
                            <label className="block text-[13px] font-bold text-gray-600 mb-1.5">สิ่งที่ต้องทำ</label>
                            <select required value={formData.activity} onChange={e=>setFormData({...formData, activity:e.target.value})} className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand transition-all text-[14px] text-gray-700">
                              <option value="" disabled hidden>ระบุสิ่งที่ต้องทำ</option>{ACTIVITIES.map(a => <option key={a}>{a}</option>)}
                            </select>
                          </div>
                        </>
                      )}
                      <div>
                        <label className="block text-[13px] font-bold text-gray-600 mb-1.5">หมายเหตุ / รายละเอียดเพิ่มเติม</label>
                        <textarea rows="3" value={formData.note} onChange={e=>setFormData({...formData, note:e.target.value})} placeholder="กรุณาระบุรายละเอียด" className="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-[8px] outline-none focus:border-brand transition-all text-[14px] text-gray-700 resize-none"></textarea>
                      </div>
                      <div className="flex justify-between pt-6 border-t border-gray-100">
                        {editingEventId ? <button type="button" onClick={handleDeleteEvent} className="text-red-500 text-[14px] font-bold hover:bg-red-50 px-3 py-2 rounded-lg transition-colors">ลบข้อมูล</button> : <div></div>}
                        <div className="space-x-3 flex items-center">
                          <button type="button" onClick={handleCloseModal} className="px-4 py-2.5 text-[14px] font-bold text-gray-500 hover:text-gray-800 transition-all">ยกเลิก</button>
                          <button type="submit" className={`px-5 py-2.5 text-[14px] font-bold text-white rounded-lg shadow-sm transition-all flex items-center ${btnColor}`}><Icon name="Plus" size={16} className="mr-1.5" /> บันทึกข้อมูล</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
               );
            })()}

            {/* ตารางแสดงรายละเอียดของวัน */}
            {isDayViewOpen && selectedDayString && (() => {
              const { normalEvents, holidays, leaves, publicHolidays } = getEventsForDay(selectedDayString);
              let itemsToShow = normalEvents;
              if (activeApp === 'holidays') itemsToShow = [...holidays, ...leaves, ...publicHolidays, ...normalEvents];
              const timeCounts = {}; itemsToShow.forEach(ev => { if (ev.type === 'event' && ev.time) { timeCounts[ev.time] = (timeCounts[ev.time] || 0) + 1; } });

              return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                   <div className="bg-surface rounded-2xl w-full max-w-4xl p-6 md:p-8 shadow-2xl flex flex-col border border-gray-100 relative">
                     <button onClick={() => setIsDayViewOpen(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors"><Icon name="X" size={18}/></button>
                     <div className="mb-6 border-b border-transparent">
                       <div className="inline-block border-b-[3px] border-[#ef4444] pb-2 pr-4"><h3 className="text-xl md:text-2xl font-bold flex items-center text-brand"><Icon name="CalendarIcon" className="mr-3" size={24}/> กิจกรรมประจำวันที่ {getFormattedDateThai(selectedDayString)}</h3></div>
                     </div>
                     <div className="max-h-[70vh] overflow-y-auto custom-scrollbar border border-gray-100 rounded-[12px] overflow-hidden">
                       {itemsToShow.length > 0 ? (
                         <table className="w-full text-left border-collapse">
                           <thead>
                             <tr className="bg-gray-50 border-b border-gray-100">
                               <th className="p-4 text-[13px] font-bold text-gray-500 w-[120px]">เวลา</th><th className="p-4 text-[13px] font-bold text-gray-500 w-[140px]">ผู้รับผิดชอบ</th><th className="p-4 text-[13px] font-bold text-gray-500 w-[200px]">สิ่งที่ต้องทำ</th><th className="p-4 text-[13px] font-bold text-gray-500">หมายเหตุ</th>
                             </tr>
                           </thead>
                           <tbody>
                             {itemsToShow.map((ev, idx) => {
                               const isDuplicateTime = ev.type === 'event' && ev.time && timeCounts[ev.time] > 1;
                               return (
                                 <tr key={ev.id || idx} onClick={() => {setIsDayViewOpen(false); handleOpenModal(null, ev)}} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                                   <td className="p-4 align-top">{ev.type !== 'event' ? '-' : (<span className={`inline-flex px-2.5 py-1 rounded-[6px] text-[13px] font-bold ${isDuplicateTime ? 'border border-[#ef4444] text-[#ef4444] bg-red-50' : 'text-gray-800'}`}>{ev.time} น.</span>)}</td>
                                   <td className="p-4 align-top font-bold text-[14px] text-gray-700">{ev.assignee}</td>
                                   <td className="p-4 align-top text-[14px] text-gray-700">
                                      <div className="flex items-center">
                                        {ev.type === 'public_holiday' ? <span className="text-yellow-600 font-bold">นักขัตฤกษ์</span> : ev.type === 'holiday' ? <span className="text-red-500 font-bold">วันหยุด</span> : ev.type === 'leave' ? <span className="text-orange-500 font-bold">ลางาน</span> : <><span className="mr-2">{getActivityIcon(ev.activity)}</span> {ev.activity}</>}
                                      </div>
                                   </td>
                                   <td className="p-4 align-top text-[13px] text-gray-600 whitespace-pre-wrap leading-relaxed">{ev.note || '-'}</td>
                                 </tr>
                               );
                             })}
                           </tbody>
                         </table>
                       ) : (<div className="py-16 text-center text-gray-400 font-medium">ไม่มีข้อมูลในวันนี้</div>)}
                     </div>
                     <div className="mt-6 flex justify-end items-center space-x-4">
                       <button onClick={() => setIsDayViewOpen(false)} className="px-4 py-2 text-[14px] font-bold text-gray-500 hover:text-gray-800 transition-all">ปิด</button>
                       <button onClick={() => {setIsDayViewOpen(false); handleOpenModal()}} className="px-5 py-2.5 text-[14px] font-bold bg-[#0b3d1b] text-white rounded-lg hover:bg-brandLight transition-colors flex items-center shadow-sm"><Icon name="Plus" size={16} className="mr-1.5" /> เพิ่มข้อมูล</button>
                     </div>
                   </div>
                </div>
              );
            })()}

            {/* Department Modals */}
            {isAddDeptModalOpen && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-surface rounded-2xl shadow-xl w-full max-w-sm p-6 border border-gray-100">
                  <h3 className="text-lg font-bold text-gray-800 mb-4">เพิ่มทีมใหม่</h3>
                  <input type="text" value={newDeptName} onChange={(e) => setNewDeptName(e.target.value)} placeholder="ชื่อทีม..." className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-6 outline-none focus:border-brand text-sm" />
                  <div className="flex justify-end space-x-2">
                    <button onClick={() => setIsAddDeptModalOpen(false)} className="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-lg">ยกเลิก</button>
                    <button onClick={handleAddDept} className="px-4 py-2 text-sm font-bold bg-brand text-white rounded-lg hover:bg-brandLight transition-colors">บันทึก</button>
                  </div>
                </div>
              </div>
            )}

            {isAddMemberModalOpen && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-surface rounded-2xl shadow-xl w-full max-w-sm p-6 border border-gray-100">
                  <h3 className="text-lg font-bold text-gray-800 mb-4">เพิ่มพนักงานทีม {targetDeptForMember}</h3>
                  <input type="text" value={newMemberName} onChange={(e) => setNewMemberName(e.target.value)} placeholder="ชื่อพนักงาน..." className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-6 outline-none focus:border-brand text-sm" />
                  <div className="flex justify-end space-x-2">
                    <button onClick={() => setIsAddMemberModalOpen(false)} className="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-lg">ยกเลิก</button>
                    <button onClick={handleAddMember} className="px-4 py-2 text-sm font-bold bg-brand text-white rounded-lg hover:bg-brandLight transition-colors">บันทึก</button>
                  </div>
                </div>
              </div>
            )}

            {isDeleteDeptModalOpen && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                  <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash" size={24}/></div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ลบทีม {deptToDelete}</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบทีมนี้ใช่หรือไม่?</p>
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => setIsDeleteDeptModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                    <button onClick={handleDeleteDept} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700">ยืนยัน</button>
                  </div>
                </div>
              </div>
            )}

            {isDeleteMemberModalOpen && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                  <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="User" size={24}/></div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ลบรายชื่อ {memberToDelete}</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">คุณต้องการลบรายชื่อพนักงานนี้ออกจากระบบใช่หรือไม่?</p>
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => setIsDeleteMemberModalOpen(false)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                    <button onClick={handleDeleteMember} className="px-5 py-2.5 text-sm font-bold text-white rounded-lg bg-red-600 hover:bg-red-700">ยืนยัน</button>
                  </div>
                </div>
              </div>
            )}

            {isDeleteMonthModalOpen && (
              <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center border border-gray-100">
                  <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash" size={24}/></div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ลบข้อมูลเดือนนี้</h3>
                  <p className="text-sm text-gray-500 mb-5 leading-relaxed">หากต้องการลบ ให้พิมพ์ <b>"ลบข้อมูล"</b></p>
                  <input type="text" value={deleteMonthText} onChange={(e) => setDeleteMonthText(e.target.value)} placeholder="ลบข้อมูล" className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg mb-5 outline-none focus:border-red-500 text-center font-bold text-sm" />
                  <div className="flex justify-center space-x-2">
                    <button onClick={() => { setIsDeleteMonthModalOpen(false); setDeleteMonthText(''); }} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">ยกเลิก</button>
                    <button onClick={handleDeleteMonth} disabled={deleteMonthText !== 'ลบข้อมูล'} className={`px-5 py-2.5 text-sm font-bold text-white rounded-lg ${deleteMonthText === 'ลบข้อมูล' ? 'bg-red-600 hover:bg-red-700' : 'bg-red-300'}`}>ยืนยัน</button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
